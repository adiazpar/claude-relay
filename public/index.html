<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1915">
  <title>Claude Relay</title>
  <link rel="stylesheet" href="global.css">
  <style>
    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      touch-action: none;
    }

    body {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: none;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
    }

    /* Pane tabs */
    .pane-tabs {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 49;
      scrollbar-width: none;
    }

    .pane-tabs::-webkit-scrollbar {
      display: none;
    }

    .pane-tabs.hidden {
      display: none;
    }

    .pane-tab {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      color: var(--text-secondary);
      /* Prevent text selection on long press */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .pane-tab:active {
      transform: scale(0.97);
    }

    /* Long press feedback animation */
    @keyframes longPressPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    .pane-tab.long-press-feedback {
      animation: longPressPulse 0.2s ease-out;
    }

    .pane-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    @media (hover: hover) {
      .pane-tab:hover:not(.active) {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .pane-tab-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    /* Add window button - matches shortcut-btn style */
    .pane-tab-add {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .pane-tab-add:active {
      transform: scale(0.97);
    }

    @media (hover: hover) {
      .pane-tab-add:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    /* Tab action sheet */
    .tab-action-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
    }

    .tab-action-sheet.open {
      transform: translateY(0);
    }

    .tab-action-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .tab-action-sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .tab-action-sheet-content {
      background: var(--bg-secondary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .tab-action-sheet-header {
      text-align: center;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .tab-action-sheet-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .tab-action-sheet-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .tab-action-sheet-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tab-action-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-action-option:active {
      transform: scale(0.98);
    }

    .tab-action-option svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .tab-action-option.danger {
      color: #e53935;
    }

    .tab-action-option.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    @media (hover: hover) {
      .tab-action-option:hover {
        border-color: var(--accent);
        background: rgba(215, 118, 85, 0.1);
      }
      .tab-action-option.danger:hover {
        border-color: #e53935;
        background: rgba(229, 57, 53, 0.1);
      }
    }

    /* Rename input mode */
    .tab-rename-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }

    .tab-rename-input:focus {
      border-color: var(--accent);
    }

    .tab-rename-actions {
      display: flex;
      gap: 8px;
    }

    .tab-rename-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-rename-cancel {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .tab-rename-save {
      background: var(--accent);
      border: none;
      color: white;
    }

    .tab-rename-save:active,
    .tab-rename-cancel:active {
      transform: scale(0.98);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #D77655;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(215, 118, 85, 0.3);
      padding: 6px;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Output area - virtual scrolling container */
    .output-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-primary);
      color: #e6edf3;
      -webkit-overflow-scrolling: touch;
      position: relative;
      padding-top: 60px; /* Space for fixed header - adjusted by JS when tabs visible */
      /* padding-bottom is set dynamically by JS based on input area height */
      touch-action: pan-y; /* Allow vertical scroll only in this container */
      overscroll-behavior: contain; /* Prevent scroll chaining to parent */
    }

    .output-container.with-tabs {
      padding-top: 104px; /* 60px header + 44px tabs */
    }

    .output-container::-webkit-scrollbar {
      width: 6px;
    }

    .output-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .output-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    @media (hover: hover) {
      .output-container::-webkit-scrollbar-thumb:hover {
        background: var(--border-light);
      }
    }

    /* Virtual scroll spacer - creates scrollable height */
    .virtual-spacer {
      width: 100%;
      pointer-events: none;
    }

    /* Visible rows container - positioned absolutely */
    .virtual-content {
      position: absolute;
      left: 0;
      right: 0;
      padding: 0 16px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
    }

    /* Individual terminal line */
    .terminal-line {
      min-height: 16.8px; /* 12px * 1.4 line-height */
    }


    /* Input area - extends .fixed-bar-bottom from global.css */
    .input-area {
      padding: 24px 16px 12px 16px;
      touch-action: none; /* Prevent dragging */
    }

    /* Extra padding when keyboard is closed - need safe area for home indicator */
    .input-area.keyboard-closed {
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    /* Shortcuts row above textarea */
    .shortcuts-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .shortcut-btn {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .shortcut-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .shortcut-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .shortcut-btn:active {
      transform: scale(0.97);
    }


    /* Input row - this IS the styled input field */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px 6px 6px 14px;
      border: 1px solid transparent;
      border-radius: 22px;
      background: var(--bg-input);
      box-shadow: 0 2px 8px var(--shadow);
      transition: all 0.2s ease;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      min-height: 28px;
      max-height: 120px;
      padding: 2px 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.1px;
      line-height: 24px;
      resize: none;
      outline: none;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 28px;
      flex-shrink: 0;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #FCF2EE; /* Match Claude icon color */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(215, 118, 85, 0.3);
      position: relative;
      /* Prevent text selection on long press */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .send-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .send-btn:hover {
        background: var(--accent-hover);
      }
    }

    .send-btn:active {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      border-color: var(--border);
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Voice recording state */
    .send-btn.recording {
      background: #e53935;
      animation: recording-pulse 1.2s ease-in-out infinite;
    }

    @keyframes recording-pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(229, 57, 53, 0);
      }
    }

    .send-btn .icon-send,
    .send-btn .icon-mic {
      position: absolute;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .send-btn .icon-send {
      opacity: 1;
      transform: scale(1);
    }

    .send-btn .icon-mic {
      opacity: 0;
      transform: scale(0.8);
    }

    .send-btn.show-mic .icon-send {
      opacity: 0;
      transform: scale(0.8);
    }

    .send-btn.show-mic .icon-mic {
      opacity: 1;
      transform: scale(1);
    }

    /* Command palette button */
    .commands-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (hover: hover) {
      .commands-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .commands-btn:active {
      transform: scale(0.97);
    }

    .commands-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(215, 118, 85, 0.15);
    }

    /* Command palette drawer - using grid for smooth height animation */
    .command-palette {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s ease-out, opacity 0.2s ease-out;
      opacity: 0;
      margin-bottom: 0;
    }

    .command-palette.open {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-bottom: 10px;
    }

    .command-palette-inner {
      overflow: hidden;
    }

    .command-palette-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      /* Max height is set dynamically by JS to account for keyboard and input height */
      max-height: 300px;
    }

    .command-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 0;
    }

    .command-list::-webkit-scrollbar {
      width: 6px;
    }

    .command-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .command-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .command-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    @media (hover: hover) {
      .command-item:hover {
        background: var(--bg-tertiary);
      }
    }

    .command-item:active {
      background: var(--bg-tertiary);
    }

    .command-name {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .command-description {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .command-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Language action sheet */
    .language-action-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
    }

    .language-action-sheet.open {
      transform: translateY(0);
    }

    .language-action-sheet-content {
      background: var(--bg-secondary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .language-action-sheet-header {
      text-align: center;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .language-action-sheet-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .language-action-sheet-current {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .language-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    .language-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 15px;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
    }

    .language-item:active {
      transform: scale(0.98);
    }

    .language-item.selected {
      border-color: var(--accent);
      background: rgba(215, 118, 85, 0.15);
    }

    @media (hover: hover) {
      .language-item:hover {
        border-color: var(--accent);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .language-flag {
      font-size: 20px;
    }

    .language-name {
      color: var(--text-primary);
      flex: 1;
    }

    .language-check {
      color: var(--accent);
      opacity: 0;
    }

    .language-item.selected .language-check {
      opacity: 1;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">

  <script>
    // ============================================
    // POLYFILLS & ANSI CONVERTER
    // ============================================
    window.requestIdleCallback = window.requestIdleCallback || function(callback, options) {
      const start = Date.now();
      return setTimeout(() => {
        callback({
          didTimeout: false,
          timeRemaining: () => Math.max(0, 50 - (Date.now() - start))
        });
      }, options?.timeout ? Math.min(100, options.timeout) : 1);
    };
    window.cancelIdleCallback = window.cancelIdleCallback || function(id) {
      clearTimeout(id);
    };

    // Escape untrusted strings for safe use inside HTML text and attribute values.
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // localStorage wrapper that swallows quota/private-mode errors instead of crashing.
    const storage = {
      get(key) { try { return storage.get(key); } catch { return null; } },
      set(key, val) { try { storage.set(key, val); } catch (e) { console.warn('localStorage set failed:', e); } },
      remove(key) { try { storage.remove(key); } catch {} }
    };

    // ANSI to HTML converter - handles 256 colors and common codes
    const ANSI_COLORS = [
      '#000000', '#cd0000', '#00cd00', '#cdcd00', '#0000ee', '#cd00cd', '#00cdcd', '#e5e5e5',
      '#7f7f7f', '#ff0000', '#00ff00', '#ffff00', '#5c5cff', '#ff00ff', '#00ffff', '#ffffff',
      // 216 color cube (16-231)
      ...(() => {
        const colors = [];
        for (let r = 0; r < 6; r++)
          for (let g = 0; g < 6; g++)
            for (let b = 0; b < 6; b++)
              colors.push(`#${[r,g,b].map(c => (c ? c * 40 + 55 : 0).toString(16).padStart(2,'0')).join('')}`);
        return colors;
      })(),
      // 24 grayscale (232-255)
      ...Array.from({length: 24}, (_, i) => {
        const v = (i * 10 + 8).toString(16).padStart(2, '0');
        return `#${v}${v}${v}`;
      })
    ];

    function ansiToHtml(text) {
      if (!text) return '';

      let result = '';
      let fg = null, bg = null, bold = false, italic = false, underline = false;
      let i = 0;

      function openSpan() {
        const styles = [];
        if (fg) styles.push(`color:${fg}`);
        if (bg) styles.push(`background-color:${bg}`);
        if (bold) styles.push('font-weight:bold');
        if (italic) styles.push('font-style:italic');
        if (underline) styles.push('text-decoration:underline');
        return styles.length ? `<span style="${styles.join(';')}">` : '';
      }

      function closeSpan() {
        return (fg || bg || bold || italic || underline) ? '</span>' : '';
      }

      while (i < text.length) {
        if (text[i] === '\x1b' && text[i+1] === '[') {
          let j = i + 2;
          while (j < text.length && !/[A-Za-z]/.test(text[j])) j++;

          if (text[j] === 'm') {
            result += closeSpan();
            const codes = text.slice(i+2, j).split(';').map(Number);

            for (let k = 0; k < codes.length; k++) {
              const c = codes[k];
              if (c === 0) { fg = bg = null; bold = italic = underline = false; }
              else if (c === 1) bold = true;
              else if (c === 3) italic = true;
              else if (c === 4) underline = true;
              else if (c === 22) bold = false;
              else if (c === 23) italic = false;
              else if (c === 24) underline = false;
              else if (c >= 30 && c <= 37) fg = ANSI_COLORS[c - 30];
              else if (c === 38 && codes[k+1] === 5) { fg = ANSI_COLORS[codes[k+2]] || fg; k += 2; }
              else if (c === 38 && codes[k+1] === 2) { fg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 39) fg = null;
              else if (c >= 40 && c <= 47) bg = ANSI_COLORS[c - 40];
              else if (c === 48 && codes[k+1] === 5) { bg = ANSI_COLORS[codes[k+2]] || bg; k += 2; }
              else if (c === 48 && codes[k+1] === 2) { bg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 49) bg = null;
              else if (c >= 90 && c <= 97) fg = ANSI_COLORS[c - 90 + 8];
              else if (c >= 100 && c <= 107) bg = ANSI_COLORS[c - 100 + 8];
            }
            result += openSpan();
            i = j + 1;
            continue;
          }
          // Skip other escape sequences
          i = j + 1;
          continue;
        }

        // Escape HTML
        const ch = text[i];
        if (ch === '&') result += '&amp;';
        else if (ch === '<') result += '&lt;';
        else if (ch === '>') result += '&gt;';
        else result += ch;
        i++;
      }

      result += closeSpan();
      return result;
    }

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const output = document.getElementById('output');
    const virtualSpacer = document.getElementById('virtualSpacer');
    const virtualContent = document.getElementById('virtualContent');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const commandPalette = document.getElementById('commandPalette');
    const commandPaletteContent = document.getElementById('commandPaletteContent');
    const commandList = document.getElementById('commandList');
    const commandsBtn = document.getElementById('commandsBtn');
    const paneTabs = document.getElementById('paneTabs');

    // ============================================
    // PANE STATE MANAGEMENT
    // ============================================
    // Per-pane state class
    class PaneState {
      constructor(paneId, cwd) {
        this.paneId = paneId;
        this.cwd = cwd;
        this.inputText = '';
        this.selectedLanguage = null;  // Set to languages[0] when restored
        this.allLines = [];
        this.commands = [];
        this.scrollPosition = 0;
      }
    }

    // Global pane state
    let paneStates = new Map();  // paneId -> PaneState
    let activePaneId = null;
    let activePaneTarget = null;
    let allPanes = [];  // List of all panes from server

    // ============================================
    // PWA DETECTION
    // ============================================
    // Detect if running as installed PWA (standalone mode)
    // Voice input doesn't work in iOS PWA mode due to WebKit limitations
    const isPWA = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true  // iOS Safari
      || document.referrer.includes('android-app://');

    if (isPWA) {
      console.log('Running in PWA mode - voice input disabled');
    }

    // ============================================
    // VIRTUAL SCROLLING STATE
    // ============================================
    const ROW_HEIGHT = 16.8; // 12px font * 1.4 line-height
    const BUFFER_ROWS = 5;   // Extra rows above/below viewport

    // allLines is now stored per-pane in PaneState
    // Helper to get current pane's lines
    function getAllLines() {
      if (!activePaneId) return [];
      const state = paneStates.get(activePaneId);
      return state ? state.allLines : [];
    }

    let renderedRange = { start: 0, end: 0 };
    let followMode = true;   // Auto-scroll to bottom
    let scrollRAF = null;    // RequestAnimationFrame for scroll handling

    // ============================================
    // CONNECTION STATE
    // ============================================
    let ws = null;
    let connected = false;
    let lastCols = 0;
    let resizeTimeout = null;
    let lastRxTime = Date.now(); // updated on any inbound WS message (incl. pings)

    // ============================================
    // MOBILE DETECTION
    // ============================================
    // Detect if this is a real mobile touch device (not desktop with touch screen)
    function isMobileDevice() {
      // Check for touch capability AND small screen (rules out touch laptops)
      const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const isSmallScreen = window.innerWidth <= 768;
      // Also check user agent for mobile keywords
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return hasTouch && (isSmallScreen || mobileUA);
    }

    const isMobile = isMobileDevice();

    // ============================================
    // COMMAND PALETTE STATE
    // ============================================
    let allCommands = [];
    let paletteOpen = false;

    // Fetch commands from server (optionally for a specific cwd)
    async function fetchCommands(cwd) {
      try {
        const url = cwd ? `/api/commands?cwd=${encodeURIComponent(cwd)}` : '/api/commands';
        const res = await fetch(url);
        const data = await res.json();
        allCommands = data.commands || [];
        // Also store in current pane state
        if (activePaneId && paneStates.has(activePaneId)) {
          paneStates.get(activePaneId).commands = allCommands;
        }
      } catch (error) {
        console.error('Failed to fetch commands:', error);
        allCommands = [];
      }
    }

    // Update palette max-height based on available space
    function updatePaletteHeight() {
      const headerHeight = 60;
      const shortcutsHeight = 38;
      const inputRowHeight = document.querySelector('.input-row').offsetHeight;
      const paletteMargin = 20; // padding/margin allowance

      // Use visual viewport if available (accounts for keyboard on mobile)
      const viewportHeight = (isMobile && window.visualViewport) ? window.visualViewport.height : window.innerHeight;

      // Calculate available space: viewport - header - shortcuts - input row - margins
      const availableHeight = viewportHeight - headerHeight - shortcutsHeight - inputRowHeight - paletteMargin - 60;

      // Cap between 150px and 400px
      const maxHeight = Math.max(150, Math.min(400, availableHeight));
      commandPaletteContent.style.maxHeight = maxHeight + 'px';
    }

    // Render command list
    function renderCommands() {
      commandList.replaceChildren();
      if (allCommands.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'command-empty';
        empty.textContent = 'No commands available';
        commandList.appendChild(empty);
        return;
      }

      for (const cmd of allCommands) {
        const item = document.createElement('div');
        item.className = 'command-item';
        item.dataset.command = cmd.name;

        const name = document.createElement('span');
        name.className = 'command-name';
        name.textContent = '/' + cmd.name;

        const desc = document.createElement('span');
        desc.className = 'command-description';
        desc.textContent = cmd.description;

        item.appendChild(name);
        item.appendChild(desc);
        item.addEventListener('click', () => selectCommand(cmd.name));
        commandList.appendChild(item);
      }
    }

    // Select a command and fill input
    function selectCommand(cmdName) {
      messageInput.value = '/' + cmdName + ' ';
      messageInput.focus();
      // Trigger input event to resize textarea
      messageInput.dispatchEvent(new Event('input'));
      closeCommandPalette();
    }

    // Toggle palette open/close
    function toggleCommandPalette() {
      if (paletteOpen) {
        closeCommandPalette();
      } else {
        openCommandPalette();
      }
    }

    // Open palette
    function openCommandPalette() {
      paletteOpen = true;
      commandPalette.classList.add('open');
      commandsBtn.classList.add('active');
      renderCommands();
      updatePaletteHeight();
      updateOutputPadding();
    }

    // Close palette
    function closeCommandPalette() {
      paletteOpen = false;
      commandPalette.classList.remove('open');
      commandsBtn.classList.remove('active');
      // Wait for the 200ms grid animation to complete before updating padding
      setTimeout(() => updateOutputPadding(), 220);
    }

    // Close palette when clicking outside
    document.addEventListener('click', (e) => {
      if (paletteOpen && !commandPalette.contains(e.target) && e.target !== commandsBtn) {
        closeCommandPalette();
      }
    });

    // Update palette height on viewport changes (keyboard open/close)
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (paletteOpen) {
          updatePaletteHeight();
        }
      });
    }

    // ============================================
    // VIRTUAL SCROLLING FUNCTIONS
    // ============================================
    // PADDING_TOP is dynamic based on whether tabs are visible
    function getPaddingTop() {
      return output.classList.contains('with-tabs') ? 104 : 60;
    }

    function getVisibleRange() {
      const scrollTop = output.scrollTop;
      const viewportHeight = output.clientHeight;
      const paddingTop = getPaddingTop();
      const lines = getAllLines();

      const startRow = Math.max(0, Math.floor((scrollTop - paddingTop) / ROW_HEIGHT) - BUFFER_ROWS);
      const endRow = Math.min(lines.length, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT) + BUFFER_ROWS);

      return { start: startRow, end: endRow };
    }

    let lastContentVersion = 0; // Track when content changes

    function renderVisibleLines(forceRender = false) {
      const range = getVisibleRange();
      const lines = getAllLines();

      // Skip if range hasn't changed AND we're not forcing a render
      if (!forceRender &&
          range.start === renderedRange.start &&
          range.end === renderedRange.end) {
        return;
      }

      renderedRange = range;

      // Build HTML for visible lines only (convert ANSI to HTML client-side)
      const visibleLines = lines.slice(range.start, range.end);
      const html = visibleLines.map(line =>
        `<div class="terminal-line">${ansiToHtml(line)}</div>`
      ).join('');

      // Position the content
      const paddingTop = getPaddingTop();
      virtualContent.style.top = (paddingTop + range.start * ROW_HEIGHT) + 'px';
      virtualContent.innerHTML = html;
    }

    function updateVirtualHeight() {
      // Don't add PADDING_TOP here - the CSS padding-top on the container already creates that space
      // Adding it here creates a 60px gap at the bottom of the content
      const lines = getAllLines();
      const totalHeight = lines.length * ROW_HEIGHT;
      virtualSpacer.style.height = totalHeight + 'px';
    }

    function handleScroll() {
      // Cancel any pending RAF
      if (scrollRAF) cancelAnimationFrame(scrollRAF);

      // Use RAF to batch scroll handling
      scrollRAF = requestAnimationFrame(() => {
        // Check if user scrolled away from bottom
        const scrollBottom = output.scrollHeight - output.scrollTop - output.clientHeight;
        followMode = scrollBottom < 50; // Within 50px of bottom = follow mode

        renderVisibleLines();
      });
    }

    function scrollToBottom() {
      if (followMode) {
        output.scrollTop = output.scrollHeight;
      }
    }

    // ============================================
    // OUTPUT UPDATE FUNCTIONS
    // ============================================
    function trimEmptyLines(lines) {
      // Remove leading and trailing empty lines from tmux output
      let start = 0;
      let end = lines.length;
      while (start < end && lines[start].trim() === '') {
        start++;
      }
      while (end > start && lines[end - 1].trim() === '') {
        end--;
      }
      return lines.slice(start, end);
    }

    function applyLinesUpdate(lines, mode, paneId) {
      const trimmedLines = trimEmptyLines(lines);

      // Store lines in the appropriate pane state
      const targetPaneId = paneId || activePaneId;
      if (targetPaneId && paneStates.has(targetPaneId)) {
        paneStates.get(targetPaneId).allLines = trimmedLines;
      }

      // Only update display if this is for the active pane
      if (targetPaneId === activePaneId) {
        updateVirtualHeight();
        renderVisibleLines(true); // Force re-render since content changed
        scrollToBottom();
      }
    }

    function scheduleOutputUpdate(lines, mode, paneId) {
      // Apply immediately - virtual scrolling is efficient
      applyLinesUpdate(lines, mode, paneId);
    }

    // ============================================
    // UI FUNCTIONS
    // ============================================

    function calculateColumns() {
      const padding = 32;
      const availableWidth = output.clientWidth - padding;
      const charWidth = 7.22;
      const cols = Math.floor(availableWidth / charWidth);
      return Math.max(40, cols);
    }

    function sendResize() {
      if (!ws || !connected) return;
      const cols = calculateColumns();
      if (cols !== lastCols) {
        lastCols = cols;
        ws.send(JSON.stringify({ type: 'resize', cols: cols }));
      }
    }

    function handleResize() {
      if (resizeTimeout) clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        sendResize();
        renderVisibleLines(); // Re-render on resize
      }, 150);
    }

    function updateStatus() {
      if (!connected) {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Reconnecting...';
      } else {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
      }
    }

    // ============================================
    // WEBSOCKET & MESSAGE HANDLING
    // ============================================
    let reconnectDelay = 500;
    const RECONNECT_MIN = 500;
    const RECONNECT_MAX = 30000;
    let reconnectTimer = null;

    function connect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        connected = true;
        reconnectDelay = RECONNECT_MIN;
        lastRxTime = Date.now();
        updateStatus();
        sendResize();
      };

      ws.onclose = () => {
        connected = false;
        updateStatus();
        // Exponential backoff with cap — avoids hammering the server on outage.
        reconnectTimer = setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };

      ws.onmessage = (event) => {
        lastRxTime = Date.now();
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (err) {
          console.error('Invalid WS message:', err);
          return;
        }
        if (msg && msg.type === 'ping') return; // heartbeat only
        handleMessage(msg);
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'paneList':
          // Server sent list of available panes
          handlePaneList(msg.panes);
          break;

        case 'output':
          if (msg.lines) {
            scheduleOutputUpdate(msg.lines, msg.mode, msg.paneId);
          }
          break;

        case 'sent':
          if (!msg.success) {
            console.error('Failed to send message');
          }
          break;
      }
    }

    // Handle pane list from server
    function handlePaneList(panes) {
      allPanes = panes || [];

      // Create state for any new panes
      for (const pane of allPanes) {
        if (!paneStates.has(pane.id)) {
          paneStates.set(pane.id, new PaneState(pane.id, pane.cwd));
        } else {
          // Update cwd in case it changed
          paneStates.get(pane.id).cwd = pane.cwd;
        }
      }

      // Remove state for panes that no longer exist
      const currentPaneIds = new Set(allPanes.map(p => p.id));
      for (const paneId of paneStates.keys()) {
        if (!currentPaneIds.has(paneId)) {
          paneStates.delete(paneId);
        }
      }

      // Set initial active pane if not set
      if (!activePaneId && allPanes.length > 0) {
        // Try to restore from localStorage
        const savedPaneId = storage.get(STORAGE_KEYS.activePane);
        const savedPane = savedPaneId && allPanes.find(p => p.id === savedPaneId);
        if (savedPane) {
          activePaneId = savedPane.id;
          activePaneTarget = savedPane.target;
        } else {
          activePaneId = allPanes[0].id;
          activePaneTarget = allPanes[0].target;
        }
        // Restore per-pane state from localStorage
        restorePaneState(activePaneId);
      }

      // Handle pane closure - switch to first available
      if (activePaneId && !currentPaneIds.has(activePaneId) && allPanes.length > 0) {
        switchPane(allPanes[0].id);
      }

      renderPaneTabs();
    }

    // Render pane tabs
    function renderPaneTabs() {
      // Always show tabs (even with one pane, to allow adding more)
      paneTabs.classList.remove('hidden');
      output.classList.add('with-tabs');
      paneTabs.replaceChildren();

      for (const pane of allPanes) {
        const dirName = pane.cwd.split('/').pop() || pane.cwd;
        const customName = storage.get(STORAGE_KEYS.tabName(pane.id));
        const displayName = customName || dirName;
        const isActive = pane.id === activePaneId;

        const tab = document.createElement('div');
        tab.className = 'pane-tab' + (isActive ? ' active' : '');
        tab.dataset.paneId = pane.id;
        tab.dataset.paneTarget = pane.target;
        tab.dataset.dirName = dirName;

        const name = document.createElement('span');
        name.className = 'pane-tab-name';
        name.textContent = displayName;
        tab.appendChild(name);

        const paneId = pane.id;
        const paneTarget = pane.target;
        let longPressTimer = null;
        let isLongPress = false;

        const startLongPress = () => {
          isLongPress = false;
          longPressTimer = setTimeout(() => {
            isLongPress = true;
            triggerHaptic();
            tab.classList.add('long-press-feedback');
            setTimeout(() => tab.classList.remove('long-press-feedback'), 200);
            openTabActionSheet(paneId, paneTarget, dirName);
          }, 500);
        };

        const cancelLongPress = () => clearTimeout(longPressTimer);

        tab.addEventListener('touchstart', startLongPress, { passive: true });
        tab.addEventListener('touchend', () => {
          cancelLongPress();
          if (!isLongPress && paneId !== activePaneId) {
            animateButton(tab);
            switchPane(paneId);
          }
        });
        tab.addEventListener('touchmove', cancelLongPress, { passive: true });
        tab.addEventListener('touchcancel', cancelLongPress);

        tab.addEventListener('mousedown', startLongPress);
        tab.addEventListener('mouseup', () => {
          cancelLongPress();
          if (!isLongPress && paneId !== activePaneId) {
            animateButton(tab);
            switchPane(paneId);
          }
        });
        tab.addEventListener('mouseleave', cancelLongPress);

        paneTabs.appendChild(tab);
      }

      // Add the + button at the end (SVG built with namespaced createElementNS to avoid innerHTML)
      const addBtn = document.createElement('button');
      addBtn.className = 'pane-tab-add';
      addBtn.title = 'New window';
      addBtn.setAttribute('aria-label', 'New window');

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('width', '14');
      svg.setAttribute('height', '14');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      const p1 = document.createElementNS(SVG_NS, 'path');
      p1.setAttribute('d', 'M12 5v14');
      const p2 = document.createElementNS(SVG_NS, 'path');
      p2.setAttribute('d', 'M5 12h14');
      svg.appendChild(p1);
      svg.appendChild(p2);
      addBtn.appendChild(svg);

      const addLabel = document.createElement('span');
      addLabel.textContent = 'New';
      addBtn.appendChild(addLabel);

      addBtn.addEventListener('click', () => {
        animateButton(addBtn);
        createNewWindow();
      });
      paneTabs.appendChild(addBtn);
    }

    // ============================================
    // HAPTIC FEEDBACK
    // ============================================
    function triggerHaptic() {
      // Try Vibration API first (Android)
      if (navigator.vibrate) {
        navigator.vibrate(10);
        return;
      }

      // iOS 18+ workaround: create switch checkbox, toggle it, remove it
      // Based on https://github.com/tijnjh/ios-haptics
      // Note: May not work on iOS 26.x due to system haptic bugs
      try {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.setAttribute('switch', '');
        label.appendChild(input);
        label.style.cssText = 'position:fixed;left:-9999px;top:-9999px;pointer-events:none;';
        document.body.appendChild(label);
        input.checked = !input.checked;
        input.dispatchEvent(new Event('change', { bubbles: true }));
        document.body.removeChild(label);
      } catch (e) {
        // Silently fail - haptics are nice-to-have
      }
    }

    // ============================================
    // TAB ACTION SHEET
    // ============================================
    const tabActionSheet = document.getElementById('tabActionSheet');
    const tabActionBackdrop = document.getElementById('tabActionBackdrop');
    const tabActionName = document.getElementById('tabActionName');
    const tabActionOptions = document.getElementById('tabActionOptions');
    let currentActionPaneId = null;
    let currentActionPaneTarget = null;

    const SVG_NS = 'http://www.w3.org/2000/svg';
    function svgEl(attrs, pathDs) {
      const svg = document.createElementNS(SVG_NS, 'svg');
      for (const [k, v] of Object.entries(attrs)) svg.setAttribute(k, v);
      for (const d of pathDs) {
        const p = document.createElementNS(SVG_NS, 'path');
        p.setAttribute('d', d);
        svg.appendChild(p);
      }
      return svg;
    }

    function openTabActionSheet(paneId, paneTarget, dirName) {
      currentActionPaneId = paneId;
      currentActionPaneTarget = paneTarget;

      // Get current display name
      const customName = storage.get(STORAGE_KEYS.tabName(paneId));
      const displayName = customName || dirName;
      tabActionName.textContent = displayName;

      // Build options
      const canClose = allPanes.length > 1;
      tabActionOptions.replaceChildren();

      const renameOpt = document.createElement('div');
      renameOpt.className = 'tab-action-option';
      renameOpt.id = 'tabActionRename';
      renameOpt.appendChild(svgEl(
        { viewBox: '0 0 24 24', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' },
        ['M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z', 'm15 5 4 4']
      ));
      renameOpt.appendChild(document.createTextNode('Rename'));
      renameOpt.addEventListener('click', () => {
        showRenameMode(paneId, displayName, dirName);
      });
      tabActionOptions.appendChild(renameOpt);

      const closeOpt = document.createElement('div');
      closeOpt.className = 'tab-action-option danger' + (canClose ? '' : ' disabled');
      closeOpt.id = 'tabActionClose';
      closeOpt.appendChild(svgEl(
        { viewBox: '0 0 24 24', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' },
        ['M18 6 6 18', 'm6 6 12 12']
      ));
      closeOpt.appendChild(document.createTextNode('Close Tab'));
      if (canClose) {
        closeOpt.addEventListener('click', () => {
          closeTabActionSheet();
          closeWindow(paneTarget);
        });
      }
      tabActionOptions.appendChild(closeOpt);

      // Show sheet
      tabActionSheet.classList.add('open');
      tabActionBackdrop.classList.add('open');
    }

    function closeTabActionSheet() {
      tabActionSheet.classList.remove('open');
      tabActionBackdrop.classList.remove('open');
      currentActionPaneId = null;
      currentActionPaneTarget = null;
    }

    function showRenameMode(paneId, currentName, dirName) {
      tabActionOptions.replaceChildren();

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tab-rename-input';
      input.id = 'tabRenameInput';
      input.value = currentName; // setting via property, no HTML parsing
      input.placeholder = dirName;
      tabActionOptions.appendChild(input);

      const actions = document.createElement('div');
      actions.className = 'tab-rename-actions';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'tab-rename-cancel';
      cancelBtn.id = 'tabRenameCancel';
      cancelBtn.textContent = 'Cancel';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'tab-rename-save';
      saveBtn.id = 'tabRenameSave';
      saveBtn.textContent = 'Save';
      actions.appendChild(cancelBtn);
      actions.appendChild(saveBtn);
      tabActionOptions.appendChild(actions);

      // Focus and select input
      input.focus();
      input.select();

      // Save handler
      const saveRename = () => {
        const newName = input.value.trim();
        if (newName && newName !== dirName) {
          storage.set(STORAGE_KEYS.tabName(paneId), newName);
        } else {
          // If empty or same as dir name, remove custom name
          storage.remove(STORAGE_KEYS.tabName(paneId));
        }
        closeTabActionSheet();
        renderPaneTabs();
      };

      saveBtn.addEventListener('click', saveRename);
      cancelBtn.addEventListener('click', closeTabActionSheet);

      // Enter to save, Escape to cancel
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveRename();
        } else if (e.key === 'Escape') {
          closeTabActionSheet();
        }
      });
    }

    // Close action sheet when clicking backdrop
    tabActionBackdrop.addEventListener('click', closeTabActionSheet);

    // Close a window
    async function closeWindow(target) {
      // Don't allow closing the last window
      if (allPanes.length <= 1) {
        return;
      }

      try {
        const res = await fetch('/api/panes/close', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target })
        });
        const data = await res.json();

        if (data.success) {
          // Handle pane list update (will switch pane if needed)
          handlePaneList(data.panes);
        } else {
          console.error('Failed to close window:', data.error);
        }
      } catch (error) {
        console.error('Error closing window:', error);
      }
    }

    // Create a new window
    async function createNewWindow() {
      try {
        // Get current pane's cwd to use as default for new window
        const currentState = paneStates.get(activePaneId);
        const cwd = currentState?.cwd || undefined;

        const res = await fetch('/api/panes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cwd })
        });
        const data = await res.json();

        if (data.success && data.pane) {
          // Update pane list
          handlePaneList(data.panes);
          // Switch to the new pane
          switchPane(data.pane.id);
        } else {
          console.error('Failed to create window:', data.error);
        }
      } catch (error) {
        console.error('Error creating window:', error);
      }
    }

    // Switch to a different pane
    function switchPane(paneId) {
      const pane = allPanes.find(p => p.id === paneId);
      if (!pane) return;

      // Save current pane state
      if (activePaneId) {
        savePaneState(activePaneId);
      }

      // Set new active pane
      activePaneId = pane.id;
      activePaneTarget = pane.target;
      storage.set(STORAGE_KEYS.activePane, paneId);

      // Restore state for new pane
      restorePaneState(paneId);

      // Update tab UI - just toggle active class, don't re-render (preserves animation)
      paneTabs.querySelectorAll('.pane-tab').forEach(t => {
        if (t.dataset.paneId === paneId) {
          t.classList.add('active');
        } else {
          t.classList.remove('active');
        }
      });

      // Request output for this pane via WebSocket
      if (ws && connected) {
        ws.send(JSON.stringify({ type: 'switchPane', paneId }));
        // Force resize the new window to match phone width
        lastCols = 0; // Reset so sendResize() will send
        sendResize();
      }

      // Fetch commands for this pane's cwd
      fetchCommands(pane.cwd);

      // Re-render with the new pane's lines
      updateVirtualHeight();
      renderVisibleLines(true);
      scrollToBottom();
    }

    // Save current pane state
    function savePaneState(paneId) {
      const state = paneStates.get(paneId);
      if (!state) return;

      state.inputText = messageInput.value;
      state.selectedLanguage = selectedLanguage;
      state.scrollPosition = output.scrollTop;

      // Save to localStorage
      storage.set(STORAGE_KEYS.inputText(paneId), state.inputText);
      if (state.selectedLanguage && state.selectedLanguage.code) {
        storage.set(STORAGE_KEYS.language(paneId), state.selectedLanguage.code);
      }
    }

    // Restore pane state
    function restorePaneState(paneId) {
      const state = paneStates.get(paneId);
      if (!state) return;

      // Restore from localStorage if available
      const savedInput = storage.get(STORAGE_KEYS.inputText(paneId));
      const savedLang = storage.get(STORAGE_KEYS.language(paneId));

      if (savedInput !== null) {
        state.inputText = savedInput;
      }
      if (savedLang) {
        const lang = languages.find(l => l.code === savedLang);
        if (lang) state.selectedLanguage = lang;
      }

      // Default to first language if not set
      if (!state.selectedLanguage) {
        state.selectedLanguage = languages[0];
      }

      // Update UI
      messageInput.value = state.inputText;
      selectedLanguage = state.selectedLanguage;
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
      updateButtonState();

      // Restore commands if cached, or fetch fresh
      if (state.commands.length > 0) {
        allCommands = state.commands;
      } else {
        // Fetch commands for this pane's cwd
        fetchCommands(state.cwd);
      }
    }

    function animateButton(btn) {
      btn.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(0.85)' },
        { transform: 'scale(1.08)' },
        { transform: 'scale(1)' }
      ], {
        duration: 350,
        easing: 'ease-in-out'
      });
    }

    // Apply tap animation to all buttons
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => animateButton(btn));
    });

    function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || !connected) return;

      // Optimistic UI: clear input immediately
      messageInput.value = '';
      messageInput.style.height = 'auto';
      updateButtonState();

      ws.send(JSON.stringify({ type: 'send', content: message }));
    }


    function sendKey(key) {
      if (!connected) return;
      ws.send(JSON.stringify({ type: 'key', key: key }));
    }

    // ============================================
    // VOICE RECOGNITION (Web Speech API)
    // ============================================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    // Check if speech recognition is supported
    const speechSupported = !!SpeechRecognition;

    // Available languages
    const languages = [
      { code: 'en-US', name: 'English', flag: '🇺🇸' },
      { code: 'es-ES', name: 'Spanish', flag: '🇪🇸' },
      { code: 'fr-FR', name: 'French', flag: '🇫🇷' },
      { code: 'de-DE', name: 'German', flag: '🇩🇪' },
      { code: 'it-IT', name: 'Italian', flag: '🇮🇹' },
      { code: 'pt-BR', name: 'Portuguese', flag: '🇧🇷' },
      { code: 'zh-CN', name: 'Chinese', flag: '🇨🇳' },
      { code: 'ja-JP', name: 'Japanese', flag: '🇯🇵' },
      { code: 'ko-KR', name: 'Korean', flag: '🇰🇷' },
    ];

    // Language action sheet state
    const languageActionSheet = document.getElementById('languageActionSheet');
    const languageActionBackdrop = document.getElementById('languageActionBackdrop');
    const languageActionCurrent = document.getElementById('languageActionCurrent');
    const languageList = document.getElementById('languageList');
    let languageSheetOpen = false;
    let selectedLanguage = languages[0]; // Default to English

    // Render language options
    function renderLanguages() {
      languageActionCurrent.textContent = `${selectedLanguage.flag} ${selectedLanguage.name}`;
      languageList.replaceChildren();

      for (const lang of languages) {
        const item = document.createElement('div');
        item.className = 'language-item' + (lang.code === selectedLanguage.code ? ' selected' : '');
        item.dataset.code = lang.code;

        const flag = document.createElement('span');
        flag.className = 'language-flag';
        flag.textContent = lang.flag;

        const name = document.createElement('span');
        name.className = 'language-name';
        name.textContent = lang.name;

        const check = document.createElementNS(SVG_NS, 'svg');
        check.setAttribute('class', 'language-check');
        check.setAttribute('width', '20');
        check.setAttribute('height', '20');
        check.setAttribute('viewBox', '0 0 24 24');
        check.setAttribute('fill', 'none');
        check.setAttribute('stroke', 'currentColor');
        check.setAttribute('stroke-width', '2.5');
        check.setAttribute('stroke-linecap', 'round');
        check.setAttribute('stroke-linejoin', 'round');
        const poly = document.createElementNS(SVG_NS, 'polyline');
        poly.setAttribute('points', '20 6 9 17 4 12');
        check.appendChild(poly);

        item.appendChild(flag);
        item.appendChild(name);
        item.appendChild(check);
        item.addEventListener('click', () => selectLanguage(lang));
        languageList.appendChild(item);
      }
    }

    // Open language action sheet
    function openLanguageSheet() {
      if (!speechSupported) {
        alert(`Voice input not available.\n\nIf on iOS:\n- Make sure you're in Safari (not a home screen PWA)\n- Siri must be enabled in Settings`);
        return;
      }
      languageSheetOpen = true;
      languageActionSheet.classList.add('open');
      languageActionBackdrop.classList.add('open');
      renderLanguages();
    }

    // Close language action sheet
    function closeLanguageSheet() {
      languageSheetOpen = false;
      languageActionSheet.classList.remove('open');
      languageActionBackdrop.classList.remove('open');
    }

    // Select language
    function selectLanguage(lang) {
      selectedLanguage = lang;
      closeLanguageSheet();
    }

    // Close language sheet when clicking backdrop
    languageActionBackdrop.addEventListener('click', closeLanguageSheet);

    // Start recording in specified language
    function startRecording(langCode) {
      if (!speechSupported) return;

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.lang = langCode;

      recognition.onstart = () => {
        isRecording = true;
        sendBtn.classList.add('recording');
      };

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        messageInput.value = transcript;
        messageInput.dispatchEvent(new Event('input'));
      };

      recognition.onend = () => {
        isRecording = false;
        sendBtn.classList.remove('recording');
        updateButtonState();
      };

      recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        isRecording = false;
        sendBtn.classList.remove('recording');
        updateButtonState();

        if (event.error === 'not-allowed') {
          alert('Microphone access denied. Please enable microphone permissions in your browser settings.');
        } else if (event.error === 'network') {
          alert('Network error during speech recognition. Please check your connection.');
        }
      };

      try {
        recognition.start();
      } catch (e) {
        console.error('Failed to start recognition:', e);
        alert('Could not start voice input. Please try again.');
      }
    }


    // Update button to show mic or send icon based on input state
    // In PWA mode, always show send icon (voice doesn't work in iOS PWA)
    function updateButtonState() {
      const hasText = messageInput.value.trim().length > 0;
      if (hasText || isPWA) {
        sendBtn.classList.remove('show-mic');
        sendBtn.setAttribute('aria-label', 'Send message');
      } else {
        sendBtn.classList.add('show-mic');
        sendBtn.setAttribute('aria-label', 'Voice input');
      }
    }

    // Long-press detection for mic button (disabled in PWA mode)
    let longPressTimer = null;
    let isLongPress = false;
    const LONG_PRESS_DURATION = 400; // ms

    sendBtn.addEventListener('touchstart', (e) => {
      // Skip voice features in PWA mode
      if (isPWA) return;
      // Allow long-press for language selection when not recording and no text
      if (isRecording || messageInput.value.trim().length > 0) return;
      isLongPress = false;
      longPressTimer = setTimeout(() => {
        isLongPress = true;
        triggerHaptic();
        openLanguageSheet();
      }, LONG_PRESS_DURATION);
    }, { passive: true });

    sendBtn.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);

      // Skip voice features in PWA mode
      if (isPWA) return;

      // If recording, always allow stopping
      if (isRecording && recognition) {
        e.preventDefault();
        recognition.stop();
        return;
      }

      // If has text and not recording, let click handler send
      if (messageInput.value.trim().length > 0) return;

      // No text, not recording
      if (!isLongPress) {
        e.preventDefault();
        if (languageSheetOpen) {
          closeLanguageSheet();
        } else {
          startRecording(selectedLanguage.code);
        }
      }
    });

    sendBtn.addEventListener('touchcancel', () => {
      clearTimeout(longPressTimer);
    });

    // Handle send button click (for desktop and send mode)
    function handleSendButton() {
      const hasText = messageInput.value.trim().length > 0;

      if (hasText) {
        sendMessage();
      }
      // Touch events handle mic interactions on mobile
    }

    // ============================================
    // DYNAMIC INPUT AREA PADDING
    // ============================================
    const CONTENT_GAP = 16; // Space between last line of content and input area

    function updateOutputPadding(forceScroll = false) {
      // Check if we're currently at the bottom before changing padding
      const wasAtBottom = forceScroll || (output.scrollHeight - output.scrollTop - output.clientHeight) < 50;

      const inputAreaHeight = inputArea.offsetHeight;
      // Account for input area's bottom position (keyboard pushes it up)
      const inputAreaBottom = parseInt(inputArea.style.bottom) || 0;
      output.style.paddingBottom = (inputAreaHeight + inputAreaBottom + CONTENT_GAP) + 'px';

      // After padding changes, scroll to keep content visible
      if (wasAtBottom) {
        const scrollToEnd = () => { output.scrollTop = output.scrollHeight; };
        scrollToEnd();
        // Follow any transitions with multiple updates
        requestAnimationFrame(scrollToEnd);
        setTimeout(scrollToEnd, 50);
        setTimeout(scrollToEnd, 100);
        setTimeout(scrollToEnd, 150);
      }
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    output.addEventListener('scroll', handleScroll, { passive: true });

    messageInput.addEventListener('input', function() {
      const textarea = this;
      requestAnimationFrame(() => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        updateOutputPadding();
        updateButtonState();
      });
    });

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener('resize', handleResize);

    window.addEventListener('load', () => {
      if (window.innerWidth > 768) {
        messageInput.focus();
      }
    });

    // ============================================
    // CONNECTION RECOVERY
    // ============================================
    // iOS Safari silently kills WebSocket sockets when the tab is backgrounded
    // but leaves ws.readyState reporting OPEN, producing a zombie connection.
    // So we don't trust readyState on resume — we rely on message freshness.
    // The server sends a ping every 15s; any message (ping or real) refreshes
    // lastRxTime. If we haven't heard from the server recently, assume the
    // socket is dead and force a reconnect.
    const FRESHNESS_THRESHOLD_MS = 20000; // no message in 20s -> assume dead
    const WATCHDOG_INTERVAL_MS = 5000;

    function forceReconnect() {
      if (ws) {
        ws.onclose = null;
        ws.onmessage = null;
        ws.onerror = null;
        try { ws.close(); } catch {}
        ws = null;
      }
      connected = false;
      updateStatus();
      reconnectDelay = RECONNECT_MIN;
      initializeFromREST();
      connect();
    }

    function recoverIfStale() {
      const stale = Date.now() - lastRxTime > FRESHNESS_THRESHOLD_MS;
      const noSocket = !ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING;
      if (stale || noSocket) forceReconnect();
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') recoverIfStale();
    });
    window.addEventListener('pageshow', () => recoverIfStale());
    window.addEventListener('focus', () => recoverIfStale());
    window.addEventListener('online', () => recoverIfStale());

    // Background watchdog: catches zombie sockets even without visibility events
    setInterval(() => {
      if (document.visibilityState === 'visible') recoverIfStale();
    }, WATCHDOG_INTERVAL_MS);

    // ============================================
    // iOS SCROLL FIXES
    // ============================================
    const inputArea = document.querySelector('.input-area');

    // Prevent all touch scrolling except in specific containers
    document.addEventListener('touchmove', (e) => {
      // Allow scrolling in output container
      if (output.contains(e.target)) {
        // Prevent overscroll at boundaries
        const atTop = output.scrollTop <= 0;
        const atBottom = output.scrollTop >= output.scrollHeight - output.clientHeight;

        // Get touch direction
        if (e.touches.length === 1) {
          const touch = e.touches[0];
          const lastY = output._lastTouchY || touch.clientY;
          const deltaY = touch.clientY - lastY;
          output._lastTouchY = touch.clientY;

          // Prevent scroll if at boundary and trying to scroll further
          if ((atTop && deltaY > 0) || (atBottom && deltaY < 0)) {
            e.preventDefault();
          }
        }
        return;
      }

      // Allow scrolling in command list
      if (commandList.contains(e.target)) {
        return;
      }

      // Allow scrolling in language list
      if (languageList.contains(e.target)) {
        return;
      }

      // Allow scrolling in textarea if it has overflow
      if (e.target === messageInput && messageInput.scrollHeight > messageInput.clientHeight) {
        return;
      }

      // Block all other touch scrolling
      e.preventDefault();
    }, { passive: false });

    // Track touch start for direction detection
    output.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        output._lastTouchY = e.touches[0].clientY;
      }
    }, { passive: true });

    // ============================================
    // KEYBOARD DETECTION - Position input above keyboard on iOS
    // Only applies on actual mobile touch devices, not desktop with mobile viewport
    // ============================================
    let lastKeyboardState = null;
    let initialViewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;

    function updateKeyboardPosition() {
      // Only do keyboard detection on actual mobile devices
      if (!isMobile) {
        inputArea.classList.add('keyboard-closed');
        return;
      }

      if (window.visualViewport) {
        const vv = window.visualViewport;
        // Track max height seen (keyboard closed state)
        initialViewportHeight = Math.max(initialViewportHeight, vv.height);

        // Keyboard height is how much smaller the viewport is now
        const keyboardHeight = initialViewportHeight - vv.height;
        const keyboardOpen = keyboardHeight > 150;

        if (keyboardOpen) {
          // Position at bottom of visual viewport
          const bottomPos = window.innerHeight - vv.height - vv.offsetTop;
          inputArea.style.bottom = Math.max(0, bottomPos) + 'px';
          inputArea.classList.remove('keyboard-closed');
        } else {
          inputArea.style.bottom = '0';
          inputArea.classList.add('keyboard-closed');
        }

        if (lastKeyboardState !== keyboardOpen) {
          lastKeyboardState = keyboardOpen;
          updateOutputPadding(true);
        }
      }
    }

    if (isMobile && window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateKeyboardPosition);
      window.visualViewport.addEventListener('scroll', updateKeyboardPosition);
      updateKeyboardPosition();
    } else {
      inputArea.classList.add('keyboard-closed');
    }

    // Initial padding calculation
    updateOutputPadding();

    // ============================================
    // LOCAL STORAGE PERSISTENCE
    // ============================================
    const STORAGE_KEYS = {
      // Per-pane keys
      inputText: (paneId) => `claude-relay-input-${paneId}`,
      language: (paneId) => `claude-relay-language-${paneId}`,
      tabName: (paneId) => `claude-relay-tabname-${paneId}`,
      // Global keys
      activePane: 'claude-relay-active-pane'
    };

    // Note: Input text and language are now restored per-pane in restorePaneState()
    // The initial restore happens after paneList is received from server

    // Save input text on change (debounced) - now per-pane
    let inputSaveTimer = null;
    messageInput.addEventListener('input', () => {
      clearTimeout(inputSaveTimer);
      inputSaveTimer = setTimeout(() => {
        if (!activePaneId) return;
        const text = messageInput.value;
        if (text) {
          storage.set(STORAGE_KEYS.inputText(activePaneId), text);
        } else {
          storage.remove(STORAGE_KEYS.inputText(activePaneId));
        }
        // Also update pane state
        const state = paneStates.get(activePaneId);
        if (state) state.inputText = text;
      }, 300);
    });

    // Clear saved input when message is sent
    const originalSendMessage = sendMessage;
    sendMessage = function() {
      if (activePaneId) {
        storage.remove(STORAGE_KEYS.inputText(activePaneId));
        const state = paneStates.get(activePaneId);
        if (state) state.inputText = '';
      }
      originalSendMessage();
    };

    // Save language when changed - now per-pane
    const originalSelectLanguage = selectLanguage;
    selectLanguage = function(lang) {
      if (activePaneId) {
        storage.set(STORAGE_KEYS.language(activePaneId), lang.code);
        const state = paneStates.get(activePaneId);
        if (state) state.selectedLanguage = lang;
      }
      originalSelectLanguage(lang);
    };

    // ============================================
    // START
    // ============================================
    // Initialize button state (show mic if no text)
    updateButtonState();

    // Immediately fetch everything via REST - don't wait for WebSocket
    async function initializeFromREST() {
      try {
        // Fetch pane list
        const panesRes = await fetch('/api/panes');
        const panesData = await panesRes.json();
        handlePaneList(panesData.panes);

        // Fetch output for active pane
        if (activePaneTarget) {
          const outputRes = await fetch(`/api/output?target=${encodeURIComponent(activePaneTarget)}`);
          const outputData = await outputRes.json();
          if (outputData.output) {
            applyLinesUpdate(outputData.output.split('\n'), null, activePaneId);
          }
        }

        // Mark as connected once REST succeeds
        connected = true;
        updateStatus();
      } catch (e) {
        console.error('REST init failed:', e);
      }
    }

    // Initialize immediately via REST, then connect WebSocket for live updates
    initializeFromREST();
    connect();
  </script>
</body>
</html>
