<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1915">
  <title>Claude Relay</title>
  <link rel="stylesheet" href="global.css">
  <style>
    /* Nerd Font for the terminal canvas. Iosevka NF was picked over
       JetBrainsMono NF because its Dingbats/Misc-Technical coverage is
       complete — Claude Code's bullet glyph (⏺ U+23FA) and thinking-star
       (✻ U+273B) are both absent from JetBrainsMono's patched build.
       Subset to the ranges the terminal actually uses, compressed to
       woff2 (~430 KB). Scoped to .terminal-content only. */
    @font-face {
      font-family: 'Terminal Nerd Font';
      src: url('fonts/IosevkaNerdFont-subset.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      touch-action: none;
    }

    body {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: none;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
    }

    /* Pane tabs */
    .pane-tabs {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 49;
      scrollbar-width: none;
    }

    .pane-tabs::-webkit-scrollbar {
      display: none;
    }

    .pane-tabs.hidden {
      display: none;
    }

    .pane-tab {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      color: var(--text-secondary);
      /* Prevent text selection on long press */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .pane-tab:active {
      transform: scale(0.97);
    }

    /* Long press feedback animation */
    @keyframes longPressPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    .pane-tab.long-press-feedback {
      animation: longPressPulse 0.2s ease-out;
    }

    .pane-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    @media (hover: hover) {
      .pane-tab:hover:not(.active) {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .pane-tab-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    /* Add window button - matches shortcut-btn style */
    .pane-tab-add {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .pane-tab-add:active {
      transform: scale(0.97);
    }

    @media (hover: hover) {
      .pane-tab-add:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    /* Tab action sheet */
    .tab-action-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
    }

    .tab-action-sheet.open {
      transform: translateY(0);
    }

    .tab-action-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .tab-action-sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .tab-action-sheet-content {
      background: var(--bg-secondary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    .tab-action-sheet-header {
      text-align: center;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .tab-action-sheet-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .tab-action-sheet-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .tab-action-sheet-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tab-action-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-action-option:active {
      transform: scale(0.98);
    }

    .tab-action-option svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .tab-action-option.danger {
      color: #e53935;
    }

    .tab-action-option.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    @media (hover: hover) {
      .tab-action-option:hover {
        border-color: var(--accent);
        background: rgba(215, 118, 85, 0.1);
      }
      .tab-action-option.danger:hover {
        border-color: #e53935;
        background: rgba(229, 57, 53, 0.1);
      }
    }

    /* Rename input mode */
    .tab-rename-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }

    .tab-rename-input:focus {
      border-color: var(--accent);
    }

    .tab-rename-actions {
      display: flex;
      gap: 8px;
    }

    .tab-rename-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-rename-cancel {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .tab-rename-save {
      background: var(--accent);
      border: none;
      color: white;
    }

    .tab-rename-save:active,
    .tab-rename-cancel:active {
      transform: scale(0.98);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #D77655;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.connected {
      background: var(--success);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Output area - virtual scrolling container */
    .output-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-primary);
      color: #e6edf3;
      -webkit-overflow-scrolling: touch;
      position: relative;
      padding-top: 76px; /* 60px header + 16px gap (matches CONTENT_GAP) */
      /* padding-bottom is set dynamically by JS based on input area height */
      touch-action: pan-y; /* Allow vertical scroll only in this container */
      overscroll-behavior: contain; /* Prevent scroll chaining to parent */
    }

    .output-container.with-tabs {
      padding-top: 120px; /* 60px header + 44px tabs + 16px gap */
    }

    .output-container::-webkit-scrollbar {
      width: 6px;
    }

    .output-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .output-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    @media (hover: hover) {
      .output-container::-webkit-scrollbar-thumb:hover {
        background: var(--border-light);
      }
    }

    .terminal-content {
      padding: 0 16px;
      font-family: 'Terminal Nerd Font', ui-monospace, 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
    }

    /* Individual terminal line */
    .terminal-line {
      min-height: 16.8px; /* 12px * 1.4 line-height */
    }


    /* Input area - extends .fixed-bar-bottom from global.css. */
    .input-area {
      padding: 8px 16px 12px 16px;
      background: var(--bg-primary);
      touch-action: none; /* Prevent dragging */
    }

    /* Extra padding when keyboard is closed - need safe area for home indicator */
    .input-area.keyboard-closed {
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    /* Shortcuts row above textarea */
    .shortcuts-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .shortcut-btn {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .shortcut-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .shortcut-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .shortcut-btn:active {
      transform: scale(0.97);
    }

    .shortcut-btn:disabled,
    .shortcut-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: var(--border);
      color: var(--text-muted);
      background: var(--bg-tertiary);
      transform: none;
    }


    /* Shown in place of .input-row when a dev server is running in the
       active pane. Each .port-chip opens http://<relay-host>:<port>. */
    .server-ports-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 2px;
      flex-wrap: wrap;
      min-height: 44px;
    }

    .server-ports-row.empty {
      color: var(--text-muted);
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      padding-left: 14px;
    }

    .port-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: 'Terminal Nerd Font', ui-monospace, 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .port-chip svg {
      width: 14px;
      height: 14px;
      color: var(--text-secondary);
    }

    @media (hover: hover) {
      .port-chip:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.08);
      }
      .port-chip:hover svg {
        color: var(--accent-hover);
      }
    }

    .port-chip:active {
      transform: scale(0.97);
    }

    /* Input row - this IS the styled input field */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px 6px 6px 14px;
      border: 1px solid transparent;
      border-radius: 22px;
      background: var(--bg-input);
      transition: all 0.2s ease;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      min-height: 28px;
      max-height: 120px;
      padding: 2px 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.1px;
      line-height: 24px;
      resize: none;
      outline: none;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 28px;
      flex-shrink: 0;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #FCF2EE; /* Match Claude icon color */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* Prevent text selection on long press */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    /* Paperclip attach button, mirrors send-btn sizing but transparent. */
    .attach-btn {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .attach-btn svg {
      width: 18px;
      height: 18px;
    }

    @media (hover: hover) {
      .attach-btn:hover {
        color: var(--text-primary);
      }
    }

    /* Image preview row above the shortcuts row. Left padding and
       bottom margin mirror .shortcuts-row so all three rows
       (preview / shortcuts / input) stack with matching gutters. */
    .attach-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-left: 4px;
      margin-bottom: 10px;
    }

    /* UA [hidden] rule is trumped by author display:flex — restate. */
    .attach-preview[hidden] {
      display: none;
    }

    .attach-preview-inner {
      position: relative;
      width: fit-content;
    }

    /* Visible feedback while an upload is in flight (image dimmed until
       the server returns a token). Errored uploads get a subtle red
       border instead. */
    .attach-preview-inner.is-uploading img {
      opacity: 0.5;
    }

    .attach-preview-inner.is-errored img {
      border-color: rgb(248, 113, 113);
    }

    /* Circular progress ring rendered over the image while uploading.
       Track is the full faint circle; indicator is the bright arc that
       grows via stroke-dashoffset updates from XHR upload events. */
    .upload-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .upload-ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 3;
    }

    .upload-ring-indicator {
      fill: none;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 3;
      stroke-linecap: round;
      /* Dasharray + dashoffset set inline via JS — depends on circle
         circumference (2π × r). */
    }

    /* Each image wears the same 1px var(--border) as .shortcut-btn.
       box-sizing: border-box keeps the rendered size at exactly 72×72
       so the border replaces the outer 1px of image pixels instead of
       expanding the element — i.e., the border paints on top of the
       image edge. */
    .attach-preview img {
      width: 72px;
      height: 72px;
      box-sizing: border-box;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-tertiary);
      display: block;
    }

    .attach-clear {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .attach-clear svg {
      width: 12px;
      height: 12px;
    }

    .attach-error[hidden] {
      display: none;
    }

    /* Inline error row for attach failures. */
    .attach-error {
      margin: 0 10px 4px;
      padding: 6px 10px;
      background: rgba(220, 38, 38, 0.12);
      color: rgb(248, 113, 113);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.3;
    }

    .send-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .send-btn:hover {
        background: var(--accent-hover);
      }
    }

    .send-btn:active {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      border-color: var(--border);
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Command palette button */
    .commands-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (hover: hover) {
      .commands-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .commands-btn:active {
      transform: scale(0.97);
    }

    .commands-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(215, 118, 85, 0.15);
    }

    /* Command palette drawer - using grid for smooth height animation */
    .command-palette {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s ease-out, opacity 0.2s ease-out;
      opacity: 0;
      margin-bottom: 0;
    }

    .command-palette.open {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-bottom: 10px;
    }

    .command-palette-inner {
      overflow: hidden;
    }

    .command-palette-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      /* Max height is set dynamically by JS to account for keyboard and input height */
      max-height: 300px;
    }

    .command-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 0;
    }

    .command-list::-webkit-scrollbar {
      width: 6px;
    }

    .command-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .command-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .command-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    @media (hover: hover) {
      .command-item:hover {
        background: var(--bg-tertiary);
      }
    }

    .command-item:active {
      background: var(--bg-tertiary);
    }

    .command-name {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .command-description {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .command-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 509.64"><path fill="#FCF2EE" fill-rule="nonzero" d="M142.27 316.619l73.655-41.326 1.238-3.589-1.238-1.996-3.589-.001-12.31-.759-42.084-1.138-36.498-1.516-35.361-1.896-8.897-1.895-8.34-10.995.859-5.484 7.482-5.03 10.717.935 23.683 1.617 35.537 2.452 25.782 1.517 38.193 3.968h6.064l.86-2.451-2.073-1.517-1.618-1.517-36.776-24.922-39.81-26.338-20.852-15.166-11.273-7.683-5.687-7.204-2.451-15.721 10.237-11.273 13.75.935 3.513.936 13.928 10.716 29.749 23.027 38.848 28.612 5.687 4.727 2.275-1.617.278-1.138-2.553-4.271-21.13-38.193-22.546-38.848-10.035-16.101-2.654-9.655c-.935-3.968-1.617-7.304-1.617-11.374l11.652-15.823 6.445-2.073 15.545 2.073 6.547 5.687 9.655 22.092 15.646 34.78 24.265 47.291 7.103 14.028 3.791 12.992 1.416 3.968 2.449-.001v-2.275l1.997-26.641 3.69-32.707 3.589-42.084 1.239-11.854 5.863-14.206 11.652-7.683 9.099 4.348 7.482 10.716-1.036 6.926-4.449 28.915-8.72 45.294-5.687 30.331h3.313l3.792-3.791 15.342-20.372 25.782-32.227 11.374-12.789 13.27-14.129 8.517-6.724 16.1-.001 11.854 17.617-5.307 18.199-16.581 21.029-13.75 17.819-19.716 26.54-12.309 21.231 1.138 1.694 2.932-.278 44.536-9.479 24.062-4.347 28.714-4.928 12.992 6.066 1.416 6.167-5.106 12.613-30.71 7.583-36.018 7.204-53.636 12.689-.657.48.758.935 24.164 2.275 10.337.556h25.301l47.114 3.514 12.309 8.139 7.381 9.959-1.238 7.583-18.957 9.655-25.579-6.066-59.702-14.205-20.474-5.106-2.83-.001v1.694l17.061 16.682 31.266 28.233 39.152 36.397 1.997 8.999-5.03 7.102-5.307-.758-34.401-25.883-13.27-11.651-30.053-25.302-1.996-.001v2.654l6.926 10.136 36.574 54.975 1.895 16.859-2.653 5.485-9.479 3.311-10.414-1.895-21.408-30.054-22.092-33.844-17.819-30.331-2.173 1.238-10.515 113.261-4.929 5.788-11.374 4.348-9.478-7.204-5.03-11.652 5.03-23.027 6.066-30.052 4.928-23.886 4.449-29.674 2.654-9.858-.177-.657-2.173.278-22.37 30.71-34.021 45.977-26.919 28.815-6.445 2.553-11.173-5.789 1.037-10.337 6.243-9.2 37.257-47.392 22.47-29.371 14.508-16.961-.101-2.4
