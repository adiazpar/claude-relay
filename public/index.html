  <script src="lucide.min.js"></script>
  <script>
    // Replace every <i data-lucide="..."> placeholder with the real Lucide SVG.
    // Called again any time we change an icon's data-lucide attribute.
    if (window.lucide) lucide.createIcons();

    // ============================================
    // POLYFILLS & ANSI CONVERTER
    // ============================================
    window.requestIdleCallback = window.requestIdleCallback || function(callback, options) {
      const start = Date.now();
      return setTimeout(() => {
        callback({
          didTimeout: false,
          timeRemaining: () => Math.max(0, 50 - (Date.now() - start))
        });
      }, options?.timeout ? Math.min(100, options.timeout) : 1);
    };
    window.cancelIdleCallback = window.cancelIdleCallback || function(id) {
      clearTimeout(id);
    };

    // Escape untrusted strings for safe use inside HTML text and attribute values.
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // localStorage wrapper that swallows quota/private-mode errors instead of crashing.
    const storage = {
      get(key) { try { return localStorage.getItem(key); } catch { return null; } },
      set(key, val) { try { localStorage.setItem(key, val); } catch (e) { console.warn('localStorage set failed:', e); } },
      remove(key) { try { localStorage.removeItem(key); } catch {} }
    };

    // ANSI to HTML converter - handles 256 colors and common codes
    const ANSI_COLORS = [
      '#000000', '#cd0000', '#00cd00', '#cdcd00', '#0000ee', '#cd00cd', '#00cdcd', '#e5e5e5',
      '#7f7f7f', '#ff0000', '#00ff00', '#ffff00', '#5c5cff', '#ff00ff', '#00ffff', '#ffffff',
      // 216 color cube (16-231)
      ...(() => {
        const colors = [];
        for (let r = 0; r < 6; r++)
          for (let g = 0; g < 6; g++)
            for (let b = 0; b < 6; b++)
              colors.push(`#${[r,g,b].map(c => (c ? c * 40 + 55 : 0).toString(16).padStart(2,'0')).join('')}`);
        return colors;
      })(),
      // 24 grayscale (232-255)
      ...Array.from({length: 24}, (_, i) => {
        const v = (i * 10 + 8).toString(16).padStart(2, '0');
        return `#${v}${v}${v}`;
      })
    ];

    function ansiToHtml(text) {
      if (!text) return '';

      let result = '';
      let fg = null, bg = null, bold = false, italic = false, underline = false;
      let i = 0;

      function openSpan() {
        const styles = [];
        if (fg) styles.push(`color:${fg}`);
        if (bg) styles.push(`background-color:${bg}`);
        if (bold) styles.push('font-weight:bold');
        if (italic) styles.push('font-style:italic');
        if (underline) styles.push('text-decoration:underline');
        return styles.length ? `<span style="${styles.join(';')}">` : '';
      }

      function closeSpan() {
        return (fg || bg || bold || italic || underline) ? '</span>' : '';
      }

      while (i < text.length) {
        if (text[i] === '\x1b' && text[i+1] === '[') {
          let j = i + 2;
          while (j < text.length && !/[A-Za-z]/.test(text[j])) j++;

          if (text[j] === 'm') {
            result += closeSpan();
            const codes = text.slice(i+2, j).split(';').map(Number);

            for (let k = 0; k < codes.length; k++) {
              const c = codes[k];
              if (c === 0) { fg = bg = null; bold = italic = underline = false; }
              else if (c === 1) bold = true;
              else if (c === 3) italic = true;
              else if (c === 4) underline = true;
              else if (c === 22) bold = false;
              else if (c === 23) italic = false;
              else if (c === 24) underline = false;
              else if (c >= 30 && c <= 37) fg = ANSI_COLORS[c - 30];
              else if (c === 38 && codes[k+1] === 5) { fg = ANSI_COLORS[codes[k+2]] || fg; k += 2; }
              else if (c === 38 && codes[k+1] === 2) { fg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 39) fg = null;
              else if (c >= 40 && c <= 47) bg = ANSI_COLORS[c - 40];
              else if (c === 48 && codes[k+1] === 5) { bg = ANSI_COLORS[codes[k+2]] || bg; k += 2; }
              else if (c === 48 && codes[k+1] === 2) { bg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 49) bg = null;
              else if (c >= 90 && c <= 97) fg = ANSI_COLORS[c - 90 + 8];
              else if (c >= 100 && c <= 107) bg = ANSI_COLORS[c - 100 + 8];
            }
            result += openSpan();
            i = j + 1;
            continue;
          }
          // Skip other CSI sequences
          i = j + 1;
          continue;
        }

        // OSC sequences: ESC ] ... ST. Claude emits OSC 8 hyperlinks around
        // file paths (ESC ] 8 ; id=x ; file:///... ST LABEL ESC ] 8 ; ; ST)
        // and without stripping them the URI payload and ST bytes leak into
        // the rendered output. Terminator is BEL (0x07) or ST (ESC \).
        if (text[i] === '\x1b' && text[i+1] === ']') {
          let j = i + 2;
          while (j < text.length) {
            if (text[j] === '\x07') { j++; break; }
            if (text[j] === '\x1b' && text[j+1] === '\\') { j += 2; break; }
            j++;
          }
          i = j;
          continue;
        }

        // Any other lone escape — skip the ESC and the following byte so a
        // stray C1/charset sequence doesn't render as a box glyph.
        if (text[i] === '\x1b') {
          i += 2;
          continue;
        }

        // Escape HTML
        const ch = text[i];
        if (ch === '&') result += '&amp;';
        else if (ch === '<') result += '&lt;';
        else if (ch === '>') result += '&gt;';
        else result += ch;
        i++;
      }

      result += closeSpan();
      return result;
    }

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const output = document.getElementById('output');
    const terminalContent = document.getElementById('terminalContent');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const commandPalette = document.getElementById('commandPalette');
    const commandPaletteContent = document.getElementById('commandPaletteContent');
    const commandList = document.getElementById('commandList');
    const commandsBtn = document.getElementById('commandsBtn');
    const modeActionBtn = document.getElementById('modeActionBtn');
    const modeActionLabel = document.getElementById('modeActionLabel');
    const serverStopBtn = document.getElementById('serverStopBtn');
    const serverRestartBtn = document.getElementById('serverRestartBtn');
    const serverPortsRow = document.getElementById('serverPortsRow');
    const inputRow = document.getElementById('inputRow');
    const attachFileInput = document.getElementById('attachFileInput');
    const attachPreview = document.getElementById('attachPreview');
    const attachError = document.getElementById('attachError');

    // Currently-staged images waiting to ride along with the next send.
    // Each entry: { id, dataUrl, token?, uploading, error? }. The token
    // arrives from POST /api/upload once the file reaches the server.
    // sendMessage bundles all entries' tokens into one /api/send POST,
    // then clears the array.
    let pendingImages = [];
    let pendingImageSeq = 0;
    const CLIENT_MAX_IMAGE_BYTES = 10 * 1024 * 1024;
    const CLIENT_MAX_ATTACHMENTS = 10;

    function showAttachError(msg) {
      attachError.textContent = msg;
      attachError.hidden = false;
      clearTimeout(showAttachError._t);
      showAttachError._t = setTimeout(() => { attachError.hidden = true; }, 4000);
    }

    function clearAttachError() {
      attachError.hidden = true;
      clearTimeout(showAttachError._t);
    }

    function handleFileSelected(ev) {
      const files = Array.from(ev.target.files || []);
      ev.target.value = ''; // allow re-picking the same file later
      if (files.length === 0) return;

      for (const file of files) {
        if (pendingImages.length >= CLIENT_MAX_ATTACHMENTS) {
          showAttachError(`Max ${CLIENT_MAX_ATTACHMENTS} attachments per message`);
          break;
        }
        if (!file.type.startsWith('image/')) {
          showAttachError(`${file.name || 'File'} is not an image`);
          continue;
        }
        if (file.size > CLIENT_MAX_IMAGE_BYTES) {
          showAttachError(`${file.name || 'Image'} is too large (max 10 MB)`);
          continue;
        }
        stageFile(file);
      }
      clearAttachError();
      renderAttachPreview();
    }

    // If the user picks a big image (either dimension > 2048px, or file
    // size > 2 MB), resize + re-encode as JPEG at 0.85 quality. For
    // smaller images — typically screenshots already well under 2 MB —
    // we upload the original file untouched to preserve fidelity.
    const COMPRESS_MAX_DIM = 2048;
    const COMPRESS_SIZE_TRIGGER = 2 * 1024 * 1024;
    const COMPRESS_QUALITY = 0.85;

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('decode failed')); };
        img.src = url;
      });
    }

    function resizeToJpeg(img, maxDim, quality) {
      const longest = Math.max(img.width, img.height);
      const scale = longest > maxDim ? maxDim / longest : 1;
      const width = Math.round(img.width * scale);
      const height = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      return new Promise((resolve, reject) => {
        canvas.toBlob(
          blob => blob ? resolve(blob) : reject(new Error('encode failed')),
          'image/jpeg',
          quality
        );
      });
    }

    // Decide whether to compress. Returns the Blob that should actually
    // be uploaded (compressed JPEG or the original File, both are Blobs).
    // The caller already has a separate preview URL from the original
    // file, so we don't need to produce any dataUrl here.
    async function prepareForUpload(file) {
      const tooBig = file.size > COMPRESS_SIZE_TRIGGER;
      let img = null;
      try { img = await loadImageFromFile(file); } catch { img = null; }

      const tooLarge = img && Math.max(img.width, img.height) > COMPRESS_MAX_DIM;

      if (!tooBig && !tooLarge) return file;
      if (!img) return file; // couldn't decode — upload original as-is

      return await resizeToJpeg(img, COMPRESS_MAX_DIM, COMPRESS_QUALITY);
    }

    function stageFile(file) {
      // Instant thumbnail via objectURL — no file read into JS memory.
      // Browser holds a reference to the file bytes and decodes lazily.
      const previewUrl = URL.createObjectURL(file);
      const entry = {
        id: ++pendingImageSeq,
        previewUrl,
        token: null,
        uploading: true,
        progress: 0,
        error: null,
      };
      pendingImages.push(entry);
      renderAttachPreview(); // thumbnail visible immediately

      prepareForUpload(file)
        .then(blob => uploadEntry(entry, blob))
        .catch(err => {
          console.error('Prepare failed:', err);
          entry.uploading = false;
          entry.error = 'read failed';
          renderAttachPreview();
          updateSendBtnState();
        });
    }

    // Upload the blob as a raw binary body. The browser pulls exactly
    // the blob's bytes onto the wire — no base64 inflation, no JSON
    // parse, no double FileReader pass. Content-Type comes from the
    // blob's type (set by canvas.toBlob or the original File).
    function uploadEntry(entry, blob) {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');
      xhr.setRequestHeader('Content-Type', blob.type || 'application/octet-stream');

      xhr.upload.addEventListener('progress', (e) => {
        if (!e.lengthComputable) return;
        entry.progress = e.loaded / e.total;
        updateEntryProgress(entry);
      });

      xhr.addEventListener('load', () => {
        entry.uploading = false;
        entry.progress = 1;
        try {
          const parsed = JSON.parse(xhr.responseText || '{}');
          if (xhr.status >= 200 && xhr.status < 300 && parsed.success && parsed.token) {
            entry.token = parsed.token;
          } else {
            entry.error = parsed.error || 'upload failed';
            showAttachError(entry.error);
          }
        } catch {
          entry.error = 'bad response';
          showAttachError(entry.error);
        }
        renderAttachPreview();
        updateSendBtnState();
      });

      xhr.addEventListener('error', () => {
        entry.uploading = false;
        entry.error = 'network error';
        showAttachError('Upload failed: network error');
        renderAttachPreview();
        updateSendBtnState();
      });

      xhr.send(blob);
    }

    // Update progress ring directly on the DOM node for this entry —
    // avoids re-rendering the entire preview list on every progress event.
    function updateEntryProgress(entry) {
      const item = attachPreview.querySelector(`[data-entry-id="${entry.id}"]`);
      if (!item) return;
      const indicator = item.querySelector('.upload-ring-indicator');
      if (!indicator) return;
      const RING_CIRC = 2 * Math.PI * 14; // matches r=14 below
      indicator.style.strokeDashoffset = String(RING_CIRC * (1 - entry.progress));
    }

    function removePendingImage(id) {
      const entry = pendingImages.find(p => p.id === id);
      if (entry && entry.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      pendingImages = pendingImages.filter(p => p.id !== id);
      renderAttachPreview();
      updateSendBtnState();
    }

    function clearPendingImages() {
      for (const e of pendingImages) {
        if (e.previewUrl) URL.revokeObjectURL(e.previewUrl);
      }
      pendingImages = [];
      renderAttachPreview();
      updateSendBtnState();
    }

    function renderAttachPreview() {
      // Clear previous children without using innerHTML to avoid any
      // XSS surface (we only ever inject from trusted local state, but
      // explicit DOM is safer and self-documenting).
      while (attachPreview.firstChild) {
        attachPreview.removeChild(attachPreview.firstChild);
      }

      const RING_R = 14;
      const RING_CIRC = 2 * Math.PI * RING_R;

      for (const entry of pendingImages) {
        const item = document.createElement('div');
        item.className = 'attach-preview-inner';
        item.setAttribute('data-entry-id', String(entry.id));
        if (entry.uploading) item.classList.add('is-uploading');
        if (entry.error) item.classList.add('is-errored');

        const img = document.createElement('img');
        img.alt = 'Attached image';
        img.src = entry.previewUrl;
        item.appendChild(img);

        // Progress ring overlay (centered on the thumb). Built as SVG so
        // the stroke-dashoffset can be updated directly on progress
        // events without re-rendering the list. Empty ring at the
        // start (strokeDashoffset = circumference), full ring at the end
        // (strokeDashoffset = 0).
        if (entry.uploading) {
          const svgNS = 'http://www.w3.org/2000/svg';
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('class', 'upload-ring');
          svg.setAttribute('viewBox', '0 0 36 36');
          const track = document.createElementNS(svgNS, 'circle');
          track.setAttribute('class', 'upload-ring-track');
          track.setAttribute('cx', '18');
          track.setAttribute('cy', '18');
          track.setAttribute('r', String(RING_R));
          svg.appendChild(track);
          const indicator = document.createElementNS(svgNS, 'circle');
          indicator.setAttribute('class', 'upload-ring-indicator');
          indicator.setAttribute('cx', '18');
          indicator.setAttribute('cy', '18');
          indicator.setAttribute('r', String(RING_R));
          indicator.setAttribute('transform', 'rotate(-90 18 18)');
          indicator.style.strokeDasharray = String(RING_CIRC);
          indicator.style.strokeDashoffset = String(RING_CIRC * (1 - (entry.progress || 0)));
          svg.appendChild(indicator);
          item.appendChild(svg);
        }

        const closeBtn = document.createElement('button');
        closeBtn.className = 'attach-clear';
        closeBtn.setAttribute('aria-label', 'Remove image');
        closeBtn.addEventListener('click', () => removePendingImage(entry.id));
        const icon = document.createElement('i');
        icon.setAttribute('data-lucide', 'x');
        closeBtn.appendChild(icon);
        item.appendChild(closeBtn);

        attachPreview.appendChild(item);
      }

      attachPreview.hidden = pendingImages.length === 0;
      if (window.lucide) lucide.createIcons();

      // Input-area height changed — recompute the terminal's bottom
      // padding so the last line of output isn't hidden behind the row.
      if (typeof updateOutputPadding === 'function') {
        updateOutputPadding();
      }
    }

    function updateSendBtnState() {
      // Disable send while any upload is in flight.
      const anyUploading = pendingImages.some(p => p.uploading);
      if (sendBtn) sendBtn.disabled = anyUploading;
    }

    // Swap the Lucide icon inside #modeActionBtn. Lucide replaces <i data-lucide>
    // with an <svg>, so after state changes we restore the placeholder and let
    // lucide.createIcons re-render it.
    function setModeActionIcon(name) {
      const btn = modeActionBtn;
      if (!btn) return;
      let el = btn.querySelector('[data-lucide]') || btn.querySelector('svg.lucide');
      if (!el) return;
      if (el.tagName === 'svg' && el.getAttribute('data-lucide-name') === name) return;
      const placeholder = document.createElement('i');
      placeholder.id = 'modeActionIcon';
      placeholder.setAttribute('data-lucide', name);
      el.replaceWith(placeholder);
      if (window.lucide) lucide.createIcons();
      const rendered = btn.querySelector('svg.lucide');
      if (rendered) rendered.setAttribute('data-lucide-name', name);
    }
    const paneTabs = document.getElementById('paneTabs');

    // ============================================
    // PANE STATE MANAGEMENT
    // ============================================
    // Per-pane state class
    class PaneState {
      constructor(paneId, cwd) {
        this.paneId = paneId;
        this.cwd = cwd;
        this.claudeRunning = false;
        this.shellReady = false;
        this.currentCommand = '';
        this.serverRunning = false;
        this.serverCommand = null;
        this.serverPorts = [];
        this.inputText = '';
        this.allLines = [];
        this.commands = [];
        this.scrollPosition = 0;
      }
    }

    // Global pane state
    let paneStates = new Map();  // paneId -> PaneState
    let activePaneId = null;
    let activePaneTarget = null;
    let allPanes = [];  // List of all panes from server

    // ============================================
    // OUTPUT STATE
    // ============================================
    const MAX_TERMINAL_LINES = 2000;

    // allLines is now stored per-pane in PaneState
    // Helper to get current pane's lines
    function getAllLines() {
      if (!activePaneId) return [];
      const state = paneStates.get(activePaneId);
      return state ? state.allLines : [];
    }

    function getActivePaneState() {
      if (!activePaneId) return null;
      return paneStates.get(activePaneId) || null;
    }

    let followMode = true;   // Auto-scroll to bottom
    let scrollIdleTimer = null;
    let isUserScrolling = false;

    // ============================================
    // CONNECTION STATE
    // ============================================
    let ws = null;
    let connected = false;
    let lastCols = 0;
    let resizeTimeout = null;
    let lastRxTime = Date.now(); // updated on any inbound WS message (incl. pings)

    // ============================================
    // MOBILE DETECTION
    // ============================================
    // Detect if this is a real mobile touch device (not desktop with touch screen)
    function isMobileDevice() {
      // Check for touch capability AND small screen (rules out touch laptops)
      const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const isSmallScreen = window.innerWidth <= 768;
      // Also check user agent for mobile keywords
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return hasTouch && (isSmallScreen || mobileUA);
    }

    const isMobile = isMobileDevice();

    // ============================================
    // COMMAND PALETTE STATE
    // ============================================
    let allCommands = [];
    let paletteOpen = false;

    // Fetch commands from server (optionally for a specific cwd)
    async function fetchCommands(cwd) {
      try {
        const url = cwd ? `/api/commands?cwd=${encodeURIComponent(cwd)}` : '/api/commands';
        const res = await fetch(url);
        const data = await res.json();
        allCommands = data.commands || [];
        // Also store in current pane state
        if (activePaneId && paneStates.has(activePaneId)) {
          paneStates.get(activePaneId).commands = allCommands;
        }
      } catch (error) {
        console.error('Failed to fetch commands:', error);
        allCommands = [];
      }
    }

    // Update palette max-height based on available space
    function updatePaletteHeight() {
      const headerHeight = 60;
      const shortcutsHeight = 38;
      const inputRowHeight = document.querySelector('.input-row').offsetHeight;
      const paletteMargin = 20; // padding/margin allowance

      // Use visual viewport if available (accounts for keyboard on mobile)
      const viewportHeight = (isMobile && window.visualViewport) ? window.visualViewport.height : window.innerHeight;

      // Calculate available space: viewport - header - shortcuts - input row - margins
      const availableHeight = viewportHeight - headerHeight - shortcutsHeight - inputRowHeight - paletteMargin - 60;

      // Cap between 150px and 400px
      const maxHeight = Math.max(150, Math.min(400, availableHeight));
      commandPaletteContent.style.maxHeight = maxHeight + 'px';
    }

    // Render command list
    function renderCommands() {
      commandList.replaceChildren();
      if (allCommands.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'command-empty';
        empty.textContent = 'No commands available';
        commandList.appendChild(empty);
        return;
      }

      for (const cmd of allCommands) {
        const item = document.createElement('div');
        item.className = 'command-item';
        item.dataset.command = cmd.name;

        const name = document.createElement('span');
        name.className = 'command-name';
        name.textContent = '/' + cmd.name;

        const desc = document.createElement('span');
        desc.className = 'command-description';
        desc.textContent = cmd.description;

        item.appendChild(name);
        item.appendChild(desc);
        item.addEventListener('click', () => selectCommand(cmd.name));
        commandList.appendChild(item);
      }
    }

    // Select a command and fill input
    function selectCommand(cmdName) {
      messageInput.value = '/' + cmdName + ' ';
      messageInput.focus();
      // Trigger input event to resize textarea
      messageInput.dispatchEvent(new Event('input'));
      closeCommandPalette();
    }

    // Toggle palette open/close
    function toggleCommandPalette() {
      if (paletteOpen) {
        closeCommandPalette();
      } else {
        openCommandPalette();
      }
    }

    // Open palette
    function openCommandPalette() {
      paletteOpen = true;
      commandPalette.classList.add('open');
      commandsBtn.classList.add('active');
      renderCommands();
      updatePaletteHeight();
      updateOutputPadding();
    }

    // Close palette
    function closeCommandPalette() {
      paletteOpen = false;
      commandPalette.classList.remove('open');
      commandsBtn.classList.remove('active');
      // Wait for the 200ms grid animation to complete before updating padding
      setTimeout(() => updateOutputPadding(), 220);
    }

    // Close palette when clicking outside
    document.addEventListener('click', (e) => {
      if (paletteOpen && !commandPalette.contains(e.target) && e.target !== commandsBtn) {
        closeCommandPalette();
      }
    });

    // Update palette height on viewport changes (keyboard open/close)
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (paletteOpen) {
          updatePaletteHeight();
        }
      });
    }

    function renderOutput() {
      const lines = getAllLines();
      const html = lines.map(line =>
        `<div class="terminal-line">${ansiToHtml(line)}</div>`
      ).join('');
      terminalContent.innerHTML = html;
    }

    function getScrollBottom() {
      return output.scrollHeight - output.scrollTop - output.clientHeight;
    }

    function handleScroll() {
      followMode = getScrollBottom() < 50;
      isUserScrolling = true;
      if (scrollIdleTimer) clearTimeout(scrollIdleTimer);
      scrollIdleTimer = setTimeout(() => {
        isUserScrolling = false;
      }, 120);
    }

    function scrollToBottom() {
      if (followMode) {
        output.scrollTop = output.scrollHeight;
      }
    }

    // ============================================
    // OUTPUT UPDATE FUNCTIONS
    // ============================================
    function trimEmptyLines(lines) {
      // Remove leading and trailing empty lines from tmux output
      let start = 0;
      let end = lines.length;
      while (start < end && lines[start].trim() === '') {
        start++;
      }
      while (end > start && lines[end - 1].trim() === '') {
        end--;
      }
      const trimmed = lines.slice(start, end);
      return trimmed.length > MAX_TERMINAL_LINES
        ? trimmed.slice(-MAX_TERMINAL_LINES)
        : trimmed;
    }

    function applyLinesUpdate(lines, mode, paneId) {
      const trimmedLines = trimEmptyLines(lines);

      // Store lines in the appropriate pane state
      const targetPaneId = paneId || activePaneId;
      if (targetPaneId && paneStates.has(targetPaneId)) {
        paneStates.get(targetPaneId).allLines = trimmedLines;
      }

      // Only update display if this is for the active pane
      if (targetPaneId === activePaneId) {
        renderOutput();
        scrollToBottom();
      }
    }

    function updatePaneRuntimeState(paneId, runtimeState = {}) {
      if (!paneId || !paneStates.has(paneId)) return;
      const state = paneStates.get(paneId);
      if (typeof runtimeState.claudeRunning === 'boolean') {
        state.claudeRunning = runtimeState.claudeRunning;
      }
      if (typeof runtimeState.shellReady === 'boolean') {
        state.shellReady = runtimeState.shellReady;
      }
      if (typeof runtimeState.currentCommand === 'string') {
        state.currentCommand = runtimeState.currentCommand;
      }
      if (typeof runtimeState.serverRunning === 'boolean') {
        state.serverRunning = runtimeState.serverRunning;
      }
      if ('serverCommand' in runtimeState) {
        state.serverCommand = runtimeState.serverCommand || null;
      }
      if (Array.isArray(runtimeState.serverPorts)) {
        state.serverPorts = runtimeState.serverPorts.slice();
      }
      if (paneId === activePaneId) {
        updateModeActionButton();
      }
    }

    function updateModeActionButton() {
      const state = getActivePaneState();
      const claudeRunning = state?.claudeRunning === true;
      const serverRunning = state?.serverRunning === true;
      const serverCommand = state?.serverCommand || '';

      modeActionBtn.disabled = false;
      modeActionBtn.classList.remove('disabled');

      if (serverRunning) {
        // Server-control mode: hide mode-action, slash-commands, and the
        // chat input. Expose Stop + Restart plus a row of tappable port
        // chips so the user can jump straight to whatever the server is
        // serving — the chat input has no reliable purpose here (stdin
        // goes to the server process, not a shell).
        modeActionBtn.style.display = 'none';
        commandsBtn.style.display = 'none';
        serverRestartBtn.style.display = '';
        serverStopBtn.style.display = '';
        const stopTitle = serverCommand ? `Stop: ${serverCommand}` : 'Stop Server';
        const restartTitle = serverCommand ? `Restart: ${serverCommand}` : 'Restart Server';
        serverStopBtn.title = stopTitle;
        serverStopBtn.setAttribute('aria-label', stopTitle);
        serverRestartBtn.title = restartTitle;
        serverRestartBtn.setAttribute('aria-label', restartTitle);
        inputRow.style.display = 'none';
        serverPortsRow.style.display = 'flex';
        renderServerPorts(state?.serverPorts || []);
        if (typeof updateOutputPadding === 'function') updateOutputPadding();
        return;
      }

      // Non-server state — restore the normal mode-action button and chat input.
      modeActionBtn.style.display = '';
      serverStopBtn.style.display = 'none';
      serverRestartBtn.style.display = 'none';
      serverPortsRow.style.display = 'none';
      inputRow.style.display = '';
      if (typeof updateOutputPadding === 'function') updateOutputPadding();
      // Slash-commands only make sense once Claude is accepting input.
      commandsBtn.style.display = claudeRunning ? '' : 'none';

      if (claudeRunning) {
        modeActionLabel.textContent = 'Change mode';
        modeActionBtn.title = 'Switch Mode (Shift+Tab)';
        modeActionBtn.setAttribute('aria-label', 'Change mode');
        setModeActionIcon('repeat');
        messageInput.placeholder = 'Message Claude...';
      } else {
        modeActionLabel.textContent = 'Start Claude';
        modeActionBtn.title = 'Start Claude Code';
        modeActionBtn.setAttribute('aria-label', 'Start Claude');
        setModeActionIcon('play');
        messageInput.placeholder = 'Type a command...';
      }
    }

    function handleServerStop() {
      if (!isSocketUsable()) return;
      ws.send(JSON.stringify({ type: 'serverStop' }));
    }

    function handleServerRestart() {
      if (!isSocketUsable()) return;
      ws.send(JSON.stringify({ type: 'serverRestart' }));
    }

    // Render a tappable chip per detected listening port. The server probes
    // each port's protocol once (TLS handshake -> https, plaintext response
    // -> http) and ships the result with the port, so chips open with the
    // right scheme regardless of whether the relay itself is HTTP or HTTPS
    // and regardless of whether the dev server uses TLS. The hostname
    // inherits from window.location so any access pattern (Tailscale, LAN,
    // localhost, custom hostname) works without configuration.
    function renderServerPorts(ports) {
      serverPortsRow.classList.remove('empty');
      serverPortsRow.replaceChildren();
      if (!ports || ports.length === 0) {
        serverPortsRow.classList.add('empty');
        serverPortsRow.textContent = 'Waiting for port...';
        return;
      }
      const host = window.location.hostname;
      for (const entry of ports) {
        const port = typeof entry === 'number' ? entry : entry?.port;
        const protocol = (typeof entry === 'object' && entry?.protocol === 'https') ? 'https:' : 'http:';
        if (!port) continue;
        const url = `${protocol}//${host}:${port}`;
        const chip = document.createElement('a');
        chip.className = 'port-chip';
        chip.href = url;
        chip.target = '_blank';
        chip.rel = 'noopener noreferrer';
        chip.title = url;
        chip.setAttribute('aria-label', `Open ${url}`);
        const label = document.createElement('span');
        label.textContent = String(port);
        const icon = document.createElement('i');
        icon.setAttribute('data-lucide', 'external-link');
        chip.appendChild(label);
        chip.appendChild(icon);
        serverPortsRow.appendChild(chip);
      }
      if (window.lucide) lucide.createIcons();
    }

    function scheduleOutputUpdate(lines, mode, paneId) {
      // Apply immediately - virtual scrolling is efficient
      applyLinesUpdate(lines, mode, paneId);
    }

    // ============================================
    // UI FUNCTIONS
    // ============================================

    // Measure the actual monospace character advance for the terminal font.
    // Deferred until the Iosevka woff2 finishes loading — measuring with the
    // fallback font and caching that width is what caused the "width flashes
    // correct then shrinks" bug after the JBM -> Iosevka swap.
    let cachedCharWidth = 0;
    let terminalFontReady = !(document.fonts && document.fonts.ready);
    function measureCharWidth() {
      if (cachedCharWidth) return cachedCharWidth;
      const probe = document.createElement('span');
      probe.className = 'terminal-content';
      probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;padding:0;';
      probe.textContent = 'M'.repeat(100);
      document.body.appendChild(probe);
      const width = probe.getBoundingClientRect().width / 100;
      document.body.removeChild(probe);
      // Only cache once we're confident we're measuring the real terminal
      // font, not its fallback — otherwise a stale narrow width would stick.
      const measured = width > 0 ? width : 7.22;
      if (terminalFontReady) cachedCharWidth = measured;
      return measured;
    }

    function calculateColumns() {
      const padding = 32;
      const availableWidth = output.clientWidth - padding;
      const cols = Math.floor(availableWidth / measureCharWidth());
      return Math.max(40, cols);
    }

    // Explicitly request the font load. Using document.fonts.ready here
    // would resolve immediately: the terminal div is empty at script time,
    // so Iosevka hasn't been requested yet and the font set is already in
    // the "loaded" state. .load() kicks off the fetch and resolves only
    // once that specific font is available, so the first cached measurement
    // is guaranteed to use Iosevka, not the fallback.
    if (document.fonts && document.fonts.load) {
      document.fonts.load('12px "Terminal Nerd Font"').then(() => {
        terminalFontReady = true;
        cachedCharWidth = 0;
        if (typeof sendResize === 'function') sendResize();
      });
    }

    function sendResize() {
      if (!ws || !connected) return;
      const cols = calculateColumns();
      if (cols !== lastCols) {
        lastCols = cols;
        ws.send(JSON.stringify({ type: 'resize', cols: cols }));
      }
    }

    function handleResize() {
      if (resizeTimeout) clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        sendResize();
        renderOutput();
      }, 150);
    }

    function updateStatus() {
      if (!connected) {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Reconnecting...';
      } else {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
      }
    }

    // ============================================
    // WEBSOCKET & MESSAGE HANDLING
    // ============================================
    let reconnectDelay = 500;
    const RECONNECT_MIN = 500;
    const RECONNECT_MAX = 30000;
    let reconnectTimer = null;
    let isIntentionalSocketClose = false;
    let resumeSyncTimer = null;
    let lastResumeSyncAt = 0;
    let restInitSeq = 0;

    function isSocketUsable() {
      return !!ws && ws.readyState === WebSocket.OPEN;
    }

    function hasLiveSocket() {
      return !!ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING);
    }

    function closeSocket(intentional = false) {
      if (!ws) return;
      const socket = ws;
      ws = null;
      if (intentional) isIntentionalSocketClose = true;
      socket.onopen = null;
      socket.onmessage = null;
      socket.onerror = null;
      socket.onclose = () => {
        if (intentional) {
          isIntentionalSocketClose = false;
        }
      };
      try { socket.close(); } catch {}
    }

    function syncSocketSession() {
      if (!isSocketUsable()) return;
      if (activePaneId) {
        ws.send(JSON.stringify({ type: 'switchPane', paneId: activePaneId }));
      } else {
        ws.send(JSON.stringify({ type: 'refresh' }));
      }
      sendResize();
    }

    function connect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (hasLiveSocket()) return;

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const socket = new WebSocket(`${protocol}//${window.location.host}`);
      ws = socket;

      socket.onopen = () => {
        if (ws !== socket) {
          try { socket.close(); } catch {}
          return;
        }
        connected = true;
        reconnectDelay = RECONNECT_MIN;
        lastRxTime = Date.now();
        updateStatus();
        syncSocketSession();
      };

      socket.onclose = () => {
        if (ws === socket) {
          ws = null;
        }
        if (isIntentionalSocketClose) {
          isIntentionalSocketClose = false;
          return;
        }
        connected = false;
        updateStatus();
        // Exponential backoff with cap — avoids hammering the server on outage.
        reconnectTimer = setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
      };

      socket.onerror = (error) => {
        console.error('WebSocket error:', error);
      };

      socket.onmessage = (event) => {
        if (ws !== socket) return;
        lastRxTime = Date.now();
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (err) {
          console.error('Invalid WS message:', err);
          return;
        }
        if (msg && msg.type === 'ping') return; // heartbeat only
        handleMessage(msg);
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'paneList':
          // Server sent list of available panes
          handlePaneList(msg.panes);
          break;

        case 'output':
          updatePaneRuntimeState(msg.paneId, msg);
          if (msg.lines) {
            scheduleOutputUpdate(msg.lines, msg.mode, msg.paneId);
          }
          break;

        case 'paneRuntimeList':
          if (Array.isArray(msg.states)) {
            for (const state of msg.states) {
              updatePaneRuntimeState(state.paneId, state);
            }
          }
          break;

        case 'sent':
          if (!msg.success) {
            console.error('Failed to send message');
          }
          break;
      }
    }

    // Handle pane list from server
    function handlePaneList(panes) {
      allPanes = (panes || []).slice().sort((a, b) => a.windowIndex - b.windowIndex);

      // Create state for any new panes
      for (const pane of allPanes) {
        if (!paneStates.has(pane.id)) {
          paneStates.set(pane.id, new PaneState(pane.id, pane.cwd));
        } else {
          // Update cwd in case it changed
          paneStates.get(pane.id).cwd = pane.cwd;
        }
        updatePaneRuntimeState(pane.id, pane);
      }

      // Remove state for panes that no longer exist
      const currentPaneIds = new Set(allPanes.map(p => p.id));
      for (const paneId of paneStates.keys()) {
        if (!currentPaneIds.has(paneId)) {
          paneStates.delete(paneId);
        }
      }

      // Set initial active pane if not set
      if (!activePaneId && allPanes.length > 0) {
        // Try to restore from localStorage
        const savedPaneId = storage.get(STORAGE_KEYS.activePane);
        const savedPane = savedPaneId && allPanes.find(p => p.id === savedPaneId);
        if (savedPane) {
          activePaneId = savedPane.id;
          activePaneTarget = savedPane.target;
        } else {
          activePaneId = allPanes[0].id;
          activePaneTarget = allPanes[0].target;
        }
        // Restore per-pane state from localStorage
        restorePaneState(activePaneId);

        // Sync server's view of our active pane so it sends output for the
        // restored pane, not the default first pane.
        if (isSocketUsable()) {
          ws.send(JSON.stringify({ type: 'switchPane', paneId: activePaneId }));
        }
      }

      // Handle pane closure - switch to first available
      if (activePaneId && !currentPaneIds.has(activePaneId) && allPanes.length > 0) {
        switchPane(allPanes[0].id);
      }

      renderPaneTabs();
      updateModeActionButton();
    }

    // Render pane tabs
    function renderPaneTabs() {
      // Always show tabs (even with one pane, to allow adding more)
      paneTabs.classList.remove('hidden');
      output.classList.add('with-tabs');
      paneTabs.replaceChildren();

      for (const pane of allPanes) {
        const dirName = pane.cwd.split('/').pop() || pane.cwd;
        const customName = storage.get(STORAGE_KEYS.tabName(pane.id));
        const displayName = customName || dirName;
        const isActive = pane.id === activePaneId;

        const tab = document.createElement('div');
        tab.className = 'pane-tab' + (isActive ? ' active' : '');
        tab.dataset.paneId = pane.id;
        tab.dataset.paneTarget = pane.target;
        tab.dataset.dirName = dirName;

        const name = document.createElement('span');
        name.className = 'pane-tab-name';
        name.textContent = displayName;
        tab.appendChild(name);

        const paneId = pane.id;
        const paneTarget = pane.target;
        let longPressTimer = null;
        let isLongPress = false;

        const startLongPress = () => {
          isLongPress = false;
          longPressTimer = setTimeout(() => {
            isLongPress = true;
            triggerHaptic();
            tab.classList.add('long-press-feedback');
            setTimeout(() => tab.classList.remove('long-press-feedback'), 200);
            openTabActionSheet(paneId, paneTarget, dirName);
          }, 500);
        };

        const cancelLongPress = () => clearTimeout(longPressTimer);

        tab.addEventListener('touchstart', startLongPress, { passive: true });
        tab.addEventListener('touchend', () => {
          cancelLongPress();
          if (!isLongPress && paneId !== activePaneId) {
            animateButton(tab);
            switchPane(paneId);
          }
        });
        tab.addEventListener('touchmove', cancelLongPress, { passive: true });
        tab.addEventListener('touchcancel', cancelLongPress);

        tab.addEventListener('mousedown', startLongPress);
        tab.addEventListener('mouseup', () => {
          cancelLongPress();
          if (!isLongPress && paneId !== activePaneId) {
            animateButton(tab);
            switchPane(paneId);
          }
        });
        tab.addEventListener('mouseleave', cancelLongPress);

        paneTabs.appendChild(tab);
      }

      // Add the + button at the end (SVG built with namespaced createElementNS to avoid innerHTML)
      const addBtn = document.createElement('button');
      addBtn.className = 'pane-tab-add';
      addBtn.title = 'New window';
      addBtn.setAttribute('aria-label', 'New window');

      const SVG_NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('width', '14');
      svg.setAttribute('height', '14');
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      const p1 = document.createElementNS(SVG_NS, 'path');
      p1.setAttribute('d', 'M12 5v14');
      const p2 = document.createElementNS(SVG_NS, 'path');
      p2.setAttribute('d', 'M5 12h14');
      svg.appendChild(p1);
      svg.appendChild(p2);
      addBtn.appendChild(svg);

      const addLabel = document.createElement('span');
      addLabel.textContent = 'New';
      addBtn.appendChild(addLabel);

      addBtn.addEventListener('click', () => {
        animateButton(addBtn);
        createNewWindow();
      });
      paneTabs.appendChild(addBtn);
    }

    // ============================================
    // HAPTIC FEEDBACK
    // ============================================
    function triggerHaptic() {
      // Try Vibration API first (Android)
      if (navigator.vibrate) {
        navigator.vibrate(10);
        return;
      }

      // iOS 18+ workaround: create switch checkbox, toggle it, remove it
      // Based on https://github.com/tijnjh/ios-haptics
      // Note: May not work on iOS 26.x due to system haptic bugs
      try {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.setAttribute('switch', '');
        label.appendChild(input);
        label.style.cssText = 'position:fixed;left:-9999px;top:-9999px;pointer-events:none;';
        document.body.appendChild(label);
        input.checked = !input.checked;
        input.dispatchEvent(new Event('change', { bubbles: true }));
        document.body.removeChild(label);
      } catch (e) {
        // Silently fail - haptics are nice-to-have
      }
    }

    // ============================================
    // TAB ACTION SHEET
    // ============================================
    const tabActionSheet = document.getElementById('tabActionSheet');
    const tabActionBackdrop = document.getElementById('tabActionBackdrop');
    const tabActionName = document.getElementById('tabActionName');
    const tabActionOptions = document.getElementById('tabActionOptions');
    let currentActionPaneId = null;
    let currentActionPaneTarget = null;

    const SVG_NS = 'http://www.w3.org/2000/svg';
    function svgEl(attrs, pathDs) {
      const svg = document.createElementNS(SVG_NS, 'svg');
      for (const [k, v] of Object.entries(attrs)) svg.setAttribute(k, v);
      for (const d of pathDs) {
        const p = document.createElementNS(SVG_NS, 'path');
        p.setAttribute('d', d);
        svg.appendChild(p);
      }
      return svg;
    }

    function openTabActionSheet(paneId, paneTarget, dirName) {
      currentActionPaneId = paneId;
      currentActionPaneTarget = paneTarget;

      // Get current display name
      const customName = storage.get(STORAGE_KEYS.tabName(paneId));
      const displayName = customName || dirName;
      tabActionName.textContent = displayName;

      // Build options
      const canClose = allPanes.length > 1;
      tabActionOptions.replaceChildren();

      const renameOpt = document.createElement('div');
      renameOpt.className = 'tab-action-option';
      renameOpt.id = 'tabActionRename';
      renameOpt.appendChild(svgEl(
        { viewBox: '0 0 24 24', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' },
        ['M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z', 'm15 5 4 4']
      ));
      renameOpt.appendChild(document.createTextNode('Rename'));
      renameOpt.addEventListener('click', () => {
        showRenameMode(paneId, displayName, dirName);
      });
      tabActionOptions.appendChild(renameOpt);

      const closeOpt = document.createElement('div');
      closeOpt.className = 'tab-action-option danger' + (canClose ? '' : ' disabled');
      closeOpt.id = 'tabActionClose';
      closeOpt.appendChild(svgEl(
        { viewBox: '0 0 24 24', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' },
        ['M18 6 6 18', 'm6 6 12 12']
      ));
      closeOpt.appendChild(document.createTextNode('Close Tab'));
      if (canClose) {
        closeOpt.addEventListener('click', () => {
          closeTabActionSheet();
          closeWindow(paneTarget);
        });
      }
      tabActionOptions.appendChild(closeOpt);

      // Show sheet
      tabActionSheet.classList.add('open');
      tabActionBackdrop.classList.add('open');
    }

    function closeTabActionSheet() {
      tabActionSheet.classList.remove('open');
      tabActionBackdrop.classList.remove('open');
      currentActionPaneId = null;
      currentActionPaneTarget = null;
    }

    function showRenameMode(paneId, currentName, dirName) {
      tabActionOptions.replaceChildren();

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tab-rename-input';
      input.id = 'tabRenameInput';
      input.value = currentName; // setting via property, no HTML parsing
      input.placeholder = dirName;
      tabActionOptions.appendChild(input);

      const actions = document.createElement('div');
      actions.className = 'tab-rename-actions';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'tab-rename-cancel';
      cancelBtn.id = 'tabRenameCancel';
      cancelBtn.textContent = 'Cancel';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'tab-rename-save';
      saveBtn.id = 'tabRenameSave';
      saveBtn.textContent = 'Save';
      actions.appendChild(cancelBtn);
      actions.appendChild(saveBtn);
      tabActionOptions.appendChild(actions);

      // Focus and select input
      input.focus();
      input.select();

      // Save handler
      const saveRename = () => {
        const newName = input.value.trim();
        if (newName && newName !== dirName) {
          storage.set(STORAGE_KEYS.tabName(paneId), newName);
        } else {
          // If empty or same as dir name, remove custom name
          storage.remove(STORAGE_KEYS.tabName(paneId));
        }
        closeTabActionSheet();
        renderPaneTabs();
      };

      saveBtn.addEventListener('click', saveRename);
      cancelBtn.addEventListener('click', closeTabActionSheet);

      // Enter to save, Escape to cancel
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveRename();
        } else if (e.key === 'Escape') {
          closeTabActionSheet();
        }
      });
    }

    // Close action sheet when clicking backdrop
    tabActionBackdrop.addEventListener('click', closeTabActionSheet);

    // Close a window
    async function closeWindow(target) {
      // Don't allow closing the last window
      if (allPanes.length <= 1) {
        return;
      }

      try {
        const res = await fetch('/api/panes/close', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target })
        });
        const data = await res.json();

        if (data.success) {
          // Handle pane list update (will switch pane if needed)
          handlePaneList(data.panes);
        } else {
          console.error('Failed to close window:', data.error);
        }
      } catch (error) {
        console.error('Error closing window:', error);
      }
    }

    // Create a new window
    async function createNewWindow() {
      try {
        // Send our column count so the new pane is sized correctly before the
        // shell paints its first prompt — otherwise tmux creates the window at
        // its default width and the first prompt's ruler line wraps visibly.
        const cols = calculateColumns();
        const res = await fetch('/api/panes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cols })
        });
        const data = await res.json();

        if (data.success && data.pane) {
          // Update pane list
          handlePaneList(data.panes);
          // Switch to the new pane
          switchPane(data.pane.id);
        } else {
          console.error('Failed to create window:', data.error);
        }
      } catch (error) {
        console.error('Error creating window:', error);
      }
    }

    // Switch to a different pane
    function switchPane(paneId) {
      const pane = allPanes.find(p => p.id === paneId);
      if (!pane) return;

      // Save current pane state
      if (activePaneId) {
        savePaneState(activePaneId);
      }

      // Set new active pane
      activePaneId = pane.id;
      activePaneTarget = pane.target;
      storage.set(STORAGE_KEYS.activePane, paneId);

      // Restore state for new pane
      restorePaneState(paneId);

      // Repaint button immediately from cached state so it doesn't flash the
      // previous pane's label while waiting for the server switchPane response.
      updateModeActionButton();

      // Update tab UI - just toggle active class, don't re-render (preserves animation)
      paneTabs.querySelectorAll('.pane-tab').forEach(t => {
        if (t.dataset.paneId === paneId) {
          t.classList.add('active');
          t.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
        } else {
          t.classList.remove('active');
        }
      });

      // Request output for this pane via WebSocket
      if (isSocketUsable()) {
        ws.send(JSON.stringify({ type: 'switchPane', paneId }));
      } else if (pane.target) {
        fetch(`/api/output?target=${encodeURIComponent(pane.target)}`)
          .then(res => res.json())
          .then(data => {
            if (data.output) {
              applyLinesUpdate(data.output.split('\n'), null, paneId);
            }
          })
          .catch(error => console.error('Failed to fetch pane output:', error));
      }

      // Force resize the new window to match phone width
      lastCols = 0; // Reset so sendResize() will send
      sendResize();

      // Fetch commands for this pane's cwd
      fetchCommands(pane.cwd);

      // Re-render with the new pane's lines
      renderOutput();
      scrollToBottom();
    }

    // Save current pane state
    function savePaneState(paneId) {
      const state = paneStates.get(paneId);
      if (!state) return;

      state.inputText = messageInput.value;
      state.scrollPosition = output.scrollTop;

      // Save to localStorage
      storage.set(STORAGE_KEYS.inputText(paneId), state.inputText);
    }

    // Restore pane state
    function restorePaneState(paneId) {
      const state = paneStates.get(paneId);
      if (!state) return;

      // Restore from localStorage if available
      const savedInput = storage.get(STORAGE_KEYS.inputText(paneId));

      if (savedInput !== null) {
        state.inputText = savedInput;
      }

      // Update UI
      messageInput.value = state.inputText;
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';

      // Restore commands if cached, or fetch fresh
      if (state.commands.length > 0) {
        allCommands = state.commands;
      } else {
        // Fetch commands for this pane's cwd
        fetchCommands(state.cwd);
      }
    }

    function animateButton(btn) {
      btn.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(0.85)' },
        { transform: 'scale(1.08)' },
        { transform: 'scale(1)' }
      ], {
        duration: 350,
        easing: 'ease-in-out'
      });
    }

    // Apply tap animation to all buttons
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => animateButton(btn));
    });

    function sendTerminalCommand(command, target = activePaneTarget) {
      if (!command || !target) return Promise.resolve(false);

      if (isSocketUsable()) {
        ws.send(JSON.stringify({ type: 'send', content: command, paneTarget: target }));
        return Promise.resolve(true);
      }

      return fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: command, target })
      })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            console.error('Failed to send command');
          }
          scheduleResumeSync('sendTerminalCommand');
          return data.success === true;
        })
        .catch(error => {
          console.error('Failed to send command via REST:', error);
          return false;
        });
    }

    async function startClaudeInActivePane() {
      const target = activePaneTarget;
      if (!target) return;

      await sendTerminalCommand('clear', target);
      await sendTerminalCommand('claude --dangerously-skip-permissions', target);

      // Give Claude's TUI a moment to paint, then drop the command echoes
      // that preceded it from tmux scrollback so the canvas shows only the
      // Claude UI instead of "> claude --dangerously-skip-permissions" first.
      setTimeout(() => {
        fetch('/api/clear-history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ target })
        }).catch(() => {});
      }, 1500);
    }

    function handleModeAction() {
      const state = getActivePaneState();
      if (state?.claudeRunning) {
        sendKey('S-Tab');
        return;
      }
      startClaudeInActivePane();
    }

    function sendMessage() {
      const message = messageInput.value.trim();

      // Refuse to send while any upload is still in flight — sending now
      // would silently drop the still-uploading images from the message,
      // which is confusing UX. Better to no-op until they finish.
      if (pendingImages.some(p => p.uploading)) return;

      // Collect tokens from uploaded entries only. Errored entries are
      // skipped (user sees the red border and can retry/remove).
      const tokens = pendingImages
        .filter(p => p.token && !p.error)
        .map(p => p.token);

      if (!message && tokens.length === 0) return;

      // Optimistic UI: clear input and thumbnails immediately.
      messageInput.value = '';
      messageInput.style.height = 'auto';
      clearPendingImages();

      // Image-attached sends go through POST (the WS hot path is unchanged
      // for text-only and keys). The tokens payload is tiny — just string
      // IDs — so the 16 KB-scale global JSON limit is plenty.
      if (tokens.length > 0) {
        fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message,
            target: activePaneTarget,
            tokens,
          })
        })
          .then(res => res.json())
          .then(data => {
            if (!data.success) {
              showAttachError(data.error || 'Send failed');
            }
            scheduleResumeSync('sendMessage');
          })
          .catch(err => {
            console.error('Image send failed:', err);
            showAttachError('Network error');
          });
        return;
      }

      if (isSocketUsable()) {
        ws.send(JSON.stringify({ type: 'send', content: message }));
        return;
      }

      fetch('/api/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, target: activePaneTarget })
      })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            console.error('Failed to send message');
          }
          scheduleResumeSync('sendMessage');
        })
        .catch(error => {
          console.error('Failed to send message via REST:', error);
        });
    }


    function sendKey(key) {
      if (isSocketUsable()) {
        ws.send(JSON.stringify({ type: 'key', key: key }));
        return;
      }

      fetch('/api/key', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key, target: activePaneTarget })
      })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            console.error('Failed to send key');
          }
          scheduleResumeSync('sendKey');
        })
        .catch(error => {
          console.error('Failed to send key via REST:', error);
        });
    }

    // Handle send button click
    function handleSendButton() {
      // Ignore clicks while any upload is still in flight — the button
      // is disabled in that state but a keyboard shortcut could still
      // fire this.
      if (pendingImages.some(p => p.uploading)) return;
      const hasReadyImage = pendingImages.some(p => p.token && !p.error);
      if (messageInput.value.trim().length > 0 || hasReadyImage) {
        sendMessage();
      }
    }

    // ============================================
    // DYNAMIC INPUT AREA PADDING
    // ============================================
    const CONTENT_GAP = 16; // Space between last line of content and input area

    function updateOutputPadding(forceScroll = false) {
      // Check if we're currently at the bottom before changing padding
      const wasAtBottom = forceScroll || getScrollBottom() < 50;

      const inputAreaHeight = inputArea.offsetHeight;
      // Account for input area's bottom position (keyboard pushes it up)
      const inputAreaBottom = parseInt(inputArea.style.bottom) || 0;
      output.style.paddingBottom = (inputAreaHeight + inputAreaBottom + CONTENT_GAP) + 'px';

      // Scroll to bottom once after the layout settles. Running this multiple
      // times during the keyboard animation fights with iOS Safari's own
      // auto-scroll and causes the output to shoot off-screen.
      if (wasAtBottom && (forceScroll || !isUserScrolling)) {
        requestAnimationFrame(() => { output.scrollTop = output.scrollHeight; });
      }
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    output.addEventListener('scroll', handleScroll, { passive: true });

    messageInput.addEventListener('input', function() {
      const textarea = this;
      requestAnimationFrame(() => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        updateOutputPadding();
      });
    });

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener('resize', handleResize);

    window.addEventListener('load', () => {
      if (window.innerWidth > 768) {
        messageInput.focus();
      }
    });

    // ============================================
    // CONNECTION RECOVERY
    // ============================================
    // iOS Safari silently kills WebSocket sockets when the tab is backgrounded
    // but leaves ws.readyState reporting OPEN, producing a zombie connection.
    // So we don't trust readyState on resume — we rely on message freshness.
    // The server sends a ping every 15s; any message (ping or real) refreshes
    // lastRxTime. If we haven't heard from the server recently, assume the
    // socket is dead and force a reconnect.
    function scheduleResumeSync(reason) {
      const now = Date.now();
      if (now - lastResumeSyncAt < 250) return;
      lastResumeSyncAt = now;

      if (resumeSyncTimer) clearTimeout(resumeSyncTimer);
      resumeSyncTimer = setTimeout(() => {
        reconnectDelay = RECONNECT_MIN;
        connected = false;
        updateStatus();
        closeSocket(true);
        connect();
        initializeFromREST({ timeoutMs: 2500, background: true });
      }, 0);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        scheduleResumeSync('visibilitychange');
      } else {
        closeSocket(true);
      }
    });
    window.addEventListener('pageshow', () => scheduleResumeSync('pageshow'));
    window.addEventListener('focus', () => scheduleResumeSync('focus'));
    window.addEventListener('online', () => scheduleResumeSync('online'));
    window.addEventListener('pagehide', () => closeSocket(true));

    // Foreground watchdog. The event-based scheduleResumeSync hooks above
    // only fire when the tab backgrounds/refocuses or the network flips.
    // If the tab stays foregrounded the whole time and the underlying TCP
    // dies silently (mobile carrier NAT reset, iOS Safari drop), readyState
    // stays OPEN and onclose never fires — the canvas just freezes. Server
    // sends a ping every 15s and a paneRuntimeList every 2s, so >30s of
    // radio silence means the socket is zombied regardless of what
    // readyState claims. Trip the existing resume path.
    const RX_STALE_MS = 30000;
    setInterval(() => {
      if (!connected) return; // exponential-backoff reconnect already running
      if (Date.now() - lastRxTime > RX_STALE_MS) {
        scheduleResumeSync('stale-rx');
      }
    }, 5000);

    // ============================================
    // iOS SCROLL FIXES
    // ============================================
    const inputArea = document.querySelector('.input-area');

    // Prevent all touch scrolling except in specific containers
    document.addEventListener('touchmove', (e) => {
      // Allow scrolling in output container
      if (output.contains(e.target)) {
        // Prevent overscroll at boundaries
        const atTop = output.scrollTop <= 0;
        const atBottom = output.scrollTop >= output.scrollHeight - output.clientHeight;

        // Get touch direction
        if (e.touches.length === 1) {
          const touch = e.touches[0];
          const lastY = output._lastTouchY || touch.clientY;
          const deltaY = touch.clientY - lastY;
          output._lastTouchY = touch.clientY;

          // Prevent scroll if at boundary and trying to scroll further
          if ((atTop && deltaY > 0) || (atBottom && deltaY < 0)) {
            e.preventDefault();
          }
        }
        return;
      }

      // Allow scrolling in command list
      if (commandList.contains(e.target)) {
        return;
      }

      // Allow scrolling in textarea if it has overflow
      if (e.target === messageInput && messageInput.scrollHeight > messageInput.clientHeight) {
        return;
      }

      // Block all other touch scrolling
      e.preventDefault();
    }, { passive: false });

    // Track touch start for direction detection
    output.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        output._lastTouchY = e.touches[0].clientY;
      }
    }, { passive: true });

    // ============================================
    // KEYBOARD DETECTION - Position input above keyboard on iOS
    // Only applies on actual mobile touch devices, not desktop with mobile viewport
    // ============================================
    // Compute keyboard height from the *live* viewport delta. Previously we
    // tracked the max-ever-seen viewport height as "initial", which could lock
    // in a stale value after rotation or window resize and produce wrong
    // keyboard heights.
    let lastKeyboardOpen = false;
    let lastKeyboardHeightPx = -1;

    function updateKeyboardPosition() {
      if (!isMobile) {
        inputArea.classList.add('keyboard-closed');
        return;
      }
      if (!window.visualViewport) return;

      const vv = window.visualViewport;
      // Keyboard height = how far the visual viewport bottom sits above the
      // layout viewport bottom. Clamp to zero for safety during pinch-zoom.
      const keyboardHeight = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      const keyboardOpen = keyboardHeight > 100;

      // Only touch the DOM when the keyboard height actually changed, to avoid
      // thrashing during the open/close animation.
      if (keyboardHeight !== lastKeyboardHeightPx) {
        lastKeyboardHeightPx = keyboardHeight;
        inputArea.style.bottom = keyboardHeight + 'px';
        inputArea.classList.toggle('keyboard-closed', !keyboardOpen);
        // Recompute output padding so the input bar doesn't occlude content.
        // Only force-scroll on the open<->closed transition, not on every
        // intermediate animation frame.
        updateOutputPadding(keyboardOpen !== lastKeyboardOpen);
        lastKeyboardOpen = keyboardOpen;
      }
    }

    if (isMobile && window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateKeyboardPosition);
      window.visualViewport.addEventListener('scroll', updateKeyboardPosition);
      updateKeyboardPosition();
    } else {
      inputArea.classList.add('keyboard-closed');
    }

    // Initial padding calculation
    updateOutputPadding();

    // ============================================
    // LOCAL STORAGE PERSISTENCE
    // ============================================
    const STORAGE_KEYS = {
      // Per-pane keys
      inputText: (paneId) => `claude-relay-input-${paneId}`,
      tabName: (paneId) => `claude-relay-tabname-${paneId}`,
      // Global keys
      activePane: 'claude-relay-active-pane'
    };

    // Note: Input text is now restored per-pane in restorePaneState()
    // The initial restore happens after paneList is received from server

    // Save input text on change (debounced) - now per-pane
    let inputSaveTimer = null;
    messageInput.addEventListener('input', () => {
      clearTimeout(inputSaveTimer);
      inputSaveTimer = setTimeout(() => {
        if (!activePaneId) return;
        const text = messageInput.value;
        if (text) {
          storage.set(STORAGE_KEYS.inputText(activePaneId), text);
        } else {
          storage.remove(STORAGE_KEYS.inputText(activePaneId));
        }
        // Also update pane state
        const state = paneStates.get(activePaneId);
        if (state) state.inputText = text;
      }, 300);
    });

    // Clear saved input when message is sent
    const originalSendMessage = sendMessage;
    sendMessage = function() {
      if (activePaneId) {
        storage.remove(STORAGE_KEYS.inputText(activePaneId));
        const state = paneStates.get(activePaneId);
        if (state) state.inputText = '';
      }
      originalSendMessage();
    };

    // ============================================
    // START
    // ============================================

    // Immediately fetch everything via REST - don't wait for WebSocket
    async function initializeFromREST(options = {}) {
      const { timeoutMs = 5000, background = false } = options;
      const seq = ++restInitSeq;
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
      try {
        // Fetch pane list
        const panesRes = await fetch('/api/panes', { signal: controller.signal, cache: 'no-store' });
        const panesData = await panesRes.json();
        if (seq !== restInitSeq) return;
        handlePaneList(panesData.panes);

        // Fetch output for active pane
        if (activePaneTarget) {
          const outputRes = await fetch(`/api/output?target=${encodeURIComponent(activePaneTarget)}`, {
            signal: controller.signal,
            cache: 'no-store'
          });
          const outputData = await outputRes.json();
          if (seq !== restInitSeq) return;
          if (outputData.output) {
            applyLinesUpdate(outputData.output.split('\n'), null, activePaneId);
          }
        }

      } catch (e) {
        if (e.name !== 'AbortError') {
          console.error('REST init failed:', e);
        }
      } finally {
        clearTimeout(timeoutId);
        if (!background && seq === restInitSeq && isSocketUsable()) {
          connected = true;
          updateStatus();
        }
      }
    }

    // Initialize immediately via REST, then connect WebSocket for live updates
    initializeFromREST();
    connect();
  </script>
</body>
</html>
