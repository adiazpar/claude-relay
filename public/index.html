<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1915">
  <title>Claude Relay</title>
  <link rel="stylesheet" href="global.css">
  <style>
    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      touch-action: none;
    }

    body {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: none;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #D77655;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(215, 118, 85, 0.3);
      padding: 6px;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      box-shadow: 0 0 8px var(--error);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Output area - virtual scrolling container */
    .output-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-primary);
      color: #e6edf3;
      -webkit-overflow-scrolling: touch;
      position: relative;
      padding-top: 60px; /* Space for fixed header */
      /* padding-bottom is set dynamically by JS based on input area height */
      touch-action: pan-y; /* Allow vertical scroll only in this container */
      overscroll-behavior: contain; /* Prevent scroll chaining to parent */
    }

    .output-container::-webkit-scrollbar {
      width: 6px;
    }

    .output-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .output-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    @media (hover: hover) {
      .output-container::-webkit-scrollbar-thumb:hover {
        background: var(--border-light);
      }
    }

    /* Virtual scroll spacer - creates scrollable height */
    .virtual-spacer {
      width: 100%;
      pointer-events: none;
    }

    /* Visible rows container - positioned absolutely */
    .virtual-content {
      position: absolute;
      left: 0;
      right: 0;
      padding: 0 16px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
    }

    /* Individual terminal line */
    .terminal-line {
      min-height: 16.8px; /* 12px * 1.4 line-height */
    }


    /* Input area - extends .fixed-bar-bottom from global.css */
    .input-area {
      padding: 24px 16px 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      touch-action: none; /* Prevent dragging */
    }

    /* Extra padding when keyboard is closed */
    .input-area.keyboard-closed {
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    /* Shortcuts row above textarea */
    .shortcuts-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .shortcut-btn {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .shortcut-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .shortcut-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .shortcut-btn:active {
      transform: scale(0.97);
    }


    /* Input row - this IS the styled input field */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px 6px 6px 14px;
      border: 1px solid transparent;
      border-radius: 22px;
      background: var(--bg-input);
      box-shadow: 0 2px 8px var(--shadow);
      transition: all 0.2s ease;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      min-height: 28px;
      max-height: 120px;
      padding: 2px 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.1px;
      line-height: 24px;
      resize: none;
      outline: none;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 28px;
      flex-shrink: 0;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #FCF2EE; /* Match Claude icon color */
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(215, 118, 85, 0.3);
      position: relative;
    }

    .send-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .send-btn:hover {
        background: var(--accent-hover);
      }
    }

    .send-btn:active {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      border-color: var(--border);
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Voice recording state */
    .send-btn.recording {
      background: #e53935;
      animation: recording-pulse 1.2s ease-in-out infinite;
    }

    @keyframes recording-pulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(229, 57, 53, 0);
      }
    }

    .send-btn .icon-send,
    .send-btn .icon-mic {
      position: absolute;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .send-btn .icon-send {
      opacity: 1;
      transform: scale(1);
    }

    .send-btn .icon-mic {
      opacity: 0;
      transform: scale(0.8);
    }

    .send-btn.show-mic .icon-send {
      opacity: 0;
      transform: scale(0.8);
    }

    .send-btn.show-mic .icon-mic {
      opacity: 1;
      transform: scale(1);
    }

    /* Command palette button */
    .commands-btn {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (hover: hover) {
      .commands-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .commands-btn:active {
      transform: scale(0.97);
    }

    .commands-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(215, 118, 85, 0.15);
    }

    /* Command palette drawer - using grid for smooth height animation */
    .command-palette {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s ease-out, opacity 0.2s ease-out;
      opacity: 0;
      margin-bottom: 0;
    }

    .command-palette.open {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-bottom: 10px;
    }

    .command-palette-inner {
      overflow: hidden;
    }

    .command-palette-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      /* Max height is set dynamically by JS to account for keyboard and input height */
      max-height: 300px;
    }

    .command-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px 0;
    }

    .command-list::-webkit-scrollbar {
      width: 6px;
    }

    .command-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .command-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .command-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    @media (hover: hover) {
      .command-item:hover {
        background: var(--bg-tertiary);
      }
    }

    .command-item:active {
      background: var(--bg-tertiary);
    }

    .command-name {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .command-description {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .command-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Language drawer - similar to command palette */
    .language-drawer {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.2s ease-out, opacity 0.2s ease-out;
      opacity: 0;
      margin-bottom: 0;
    }

    .language-drawer.open {
      grid-template-rows: 1fr;
      opacity: 1;
      margin-bottom: 10px;
    }

    .language-drawer-inner {
      overflow: hidden;
    }

    .language-drawer-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
    }

    .language-drawer-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 8px 4px;
    }

    .language-drawer-desc {
      font-size: 12px;
      color: var(--text-muted);
      padding: 0 8px 10px;
    }

    .language-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .language-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 13px;
    }

    .language-item:active {
      transform: scale(0.97);
    }

    .language-item.selected {
      border-color: var(--accent);
      background: rgba(215, 118, 85, 0.15);
    }

    .language-flag {
      font-size: 16px;
    }

    .language-name {
      color: var(--text-primary);
    }

    .language-code {
      color: var(--text-secondary);
      font-size: 11px;
    }

  </style>
</head>

    <div class="header-left">
      <div class="logo">

      </div>
      <div class="header-title">
        <h1>Claude Relay</h1>
        <div class="status-badge">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Starting...</span>
        </div>
      </div>
    </div>
  </div>

  <div class="output-container" id="output">
    <div class="virtual-spacer" id="virtualSpacer"></div>
    <div class="virtual-content" id="virtualContent"></div>
  </div>

  <div class="input-area fixed-bar-bottom">
    <!-- Shortcuts row -->
    <div class="shortcuts-row">
      <button class="shortcut-btn" onclick="sendKey('Escape')" title="Escape">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6L6 18"/>
          <path d="M6 6l12 12"/>
        </svg>
        <span>Escape</span>
      </button>
      <button class="shortcut-btn" onclick="sendKey('Enter')" title="Enter">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 10l-5 5 5 5"/>
          <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
        </svg>
        <span>Enter</span>
      </button>
      <button class="shortcut-btn" onclick="sendKey('S-Tab')" title="Switch Mode (Shift+Tab)" style="margin-left: auto;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 2.1l4 4-4 4"/>
          <path d="M3 12.2v-2a4 4 0 0 1 4-4h12.8"/>
          <path d="M7 21.9l-4-4 4-4"/>
          <path d="M21 11.8v2a4 4 0 0 1-4 4H4.2"/>
        </svg>
        <span>Change mode</span>
      </button>
      <button class="commands-btn" id="commandsBtn" onclick="toggleCommandPalette()" title="Slash Commands">/</button>
    </div>
    <!-- Command palette drawer -->
    <div class="command-palette" id="commandPalette">
      <div class="command-palette-inner">
        <div class="command-palette-content" id="commandPaletteContent">
          <div class="command-list" id="commandList"></div>
        </div>
      </div>
    </div>
    <!-- Language drawer -->
    <div class="language-drawer" id="languageDrawer">
      <div class="language-drawer-inner">
        <div class="language-drawer-content">
          <div class="language-drawer-title">Voice Language</div>
          <div class="language-drawer-desc">Choose the language you'll speak into the microphone</div>
          <div class="language-list" id="languageList"></div>
        </div>
      </div>
    </div>
    <!-- Input row -->
    <div class="input-row">
      <textarea
        id="messageInput"
        placeholder="Message Claude..."
        rows="1"
        autocomplete="off"
        autocorrect="on"
        autocapitalize="sentences"
        spellcheck="true"
        data-form-type="other"
      ></textarea>
      <button class="send-btn show-mic" id="sendBtn" onclick="handleSendButton()">
        <!-- Send arrow icon -->
        <svg class="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

        <!-- Microphone icon -->
        <svg class="icon-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
    </div>
  </div>


  <script>
    // ============================================
    // POLYFILLS & ANSI CONVERTER
    // ============================================
    window.requestIdleCallback = window.requestIdleCallback || function(callback, options) {
      const start = Date.now();
      return setTimeout(() => {
        callback({
          didTimeout: false,
          timeRemaining: () => Math.max(0, 50 - (Date.now() - start))
        });
      }, options?.timeout ? Math.min(100, options.timeout) : 1);
    };
    window.cancelIdleCallback = window.cancelIdleCallback || function(id) {
      clearTimeout(id);
    };

    // ANSI to HTML converter - handles 256 colors and common codes
    const ANSI_COLORS = [
      '#000000', '#cd0000', '#00cd00', '#cdcd00', '#0000ee', '#cd00cd', '#00cdcd', '#e5e5e5',
      '#7f7f7f', '#ff0000', '#00ff00', '#ffff00', '#5c5cff', '#ff00ff', '#00ffff', '#ffffff',
      // 216 color cube (16-231)
      ...(() => {
        const colors = [];
        for (let r = 0; r < 6; r++)
          for (let g = 0; g < 6; g++)
            for (let b = 0; b < 6; b++)
              colors.push(`#${[r,g,b].map(c => (c ? c * 40 + 55 : 0).toString(16).padStart(2,'0')).join('')}`);
        return colors;
      })(),
      // 24 grayscale (232-255)
      ...Array.from({length: 24}, (_, i) => {
        const v = (i * 10 + 8).toString(16).padStart(2, '0');
        return `#${v}${v}${v}`;
      })
    ];

    function ansiToHtml(text) {
      if (!text) return '';

      let result = '';
      let fg = null, bg = null, bold = false, italic = false, underline = false;
      let i = 0;

      function openSpan() {
        const styles = [];
        if (fg) styles.push(`color:${fg}`);
        if (bg) styles.push(`background-color:${bg}`);
        if (bold) styles.push('font-weight:bold');
        if (italic) styles.push('font-style:italic');
        if (underline) styles.push('text-decoration:underline');
        return styles.length ? `<span style="${styles.join(';')}">` : '';
      }

      function closeSpan() {
        return (fg || bg || bold || italic || underline) ? '</span>' : '';
      }

      while (i < text.length) {
        if (text[i] === '\x1b' && text[i+1] === '[') {
          let j = i + 2;
          while (j < text.length && !/[A-Za-z]/.test(text[j])) j++;

          if (text[j] === 'm') {
            result += closeSpan();
            const codes = text.slice(i+2, j).split(';').map(Number);

            for (let k = 0; k < codes.length; k++) {
              const c = codes[k];
              if (c === 0) { fg = bg = null; bold = italic = underline = false; }
              else if (c === 1) bold = true;
              else if (c === 3) italic = true;
              else if (c === 4) underline = true;
              else if (c === 22) bold = false;
              else if (c === 23) italic = false;
              else if (c === 24) underline = false;
              else if (c >= 30 && c <= 37) fg = ANSI_COLORS[c - 30];
              else if (c === 38 && codes[k+1] === 5) { fg = ANSI_COLORS[codes[k+2]] || fg; k += 2; }
              else if (c === 38 && codes[k+1] === 2) { fg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 39) fg = null;
              else if (c >= 40 && c <= 47) bg = ANSI_COLORS[c - 40];
              else if (c === 48 && codes[k+1] === 5) { bg = ANSI_COLORS[codes[k+2]] || bg; k += 2; }
              else if (c === 48 && codes[k+1] === 2) { bg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 49) bg = null;
              else if (c >= 90 && c <= 97) fg = ANSI_COLORS[c - 90 + 8];
              else if (c >= 100 && c <= 107) bg = ANSI_COLORS[c - 100 + 8];
            }
            result += openSpan();
            i = j + 1;
            continue;
          }
          // Skip other escape sequences
          i = j + 1;
          continue;
        }

        // Escape HTML
        const ch = text[i];
        if (ch === '&') result += '&amp;';
        else if (ch === '<') result += '&lt;';
        else if (ch === '>') result += '&gt;';
        else result += ch;
        i++;
      }

      result += closeSpan();
      return result;
    }

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const output = document.getElementById('output');
    const virtualSpacer = document.getElementById('virtualSpacer');
    const virtualContent = document.getElementById('virtualContent');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const commandPalette = document.getElementById('commandPalette');
    const commandPaletteContent = document.getElementById('commandPaletteContent');
    const commandList = document.getElementById('commandList');
    const commandsBtn = document.getElementById('commandsBtn');

    // ============================================
    // PWA DETECTION
    // ============================================
    // Detect if running as installed PWA (standalone mode)
    // Voice input doesn't work in iOS PWA mode due to WebKit limitations
    const isPWA = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true  // iOS Safari
      || document.referrer.includes('android-app://');

    if (isPWA) {
      console.log('Running in PWA mode - voice input disabled');
    }

    // ============================================
    // VIRTUAL SCROLLING STATE
    // ============================================
    const ROW_HEIGHT = 16.8; // 12px font * 1.4 line-height
    const BUFFER_ROWS = 5;   // Extra rows above/below viewport

    let allLines = [];       // All lines from server (raw ANSI)
    let renderedRange = { start: 0, end: 0 };
    let followMode = true;   // Auto-scroll to bottom
    let scrollRAF = null;    // RequestAnimationFrame for scroll handling

    // ============================================
    // CONNECTION STATE
    // ============================================
    let ws = null;
    let connected = false;
    let lastCols = 0;
    let resizeTimeout = null;

    // ============================================
    // MOBILE DETECTION
    // ============================================
    // Detect if this is a real mobile touch device (not desktop with touch screen)
    function isMobileDevice() {
      // Check for touch capability AND small screen (rules out touch laptops)
      const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const isSmallScreen = window.innerWidth <= 768;
      // Also check user agent for mobile keywords
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return hasTouch && (isSmallScreen || mobileUA);
    }

    const isMobile = isMobileDevice();

    // ============================================
    // COMMAND PALETTE STATE
    // ============================================
    let allCommands = [];
    let paletteOpen = false;

    // Fetch commands from server
    async function fetchCommands() {
      try {
        const res = await fetch('/api/commands');
        const data = await res.json();
        allCommands = data.commands || [];
      } catch (error) {
        console.error('Failed to fetch commands:', error);
        allCommands = [];
      }
    }

    // Update palette max-height based on available space
    function updatePaletteHeight() {
      const headerHeight = 60;
      const shortcutsHeight = 38;
      const inputRowHeight = document.querySelector('.input-row').offsetHeight;
      const paletteMargin = 20; // padding/margin allowance

      // Use visual viewport if available (accounts for keyboard on mobile)
      const viewportHeight = (isMobile && window.visualViewport) ? window.visualViewport.height : window.innerHeight;

      // Calculate available space: viewport - header - shortcuts - input row - margins
      const availableHeight = viewportHeight - headerHeight - shortcutsHeight - inputRowHeight - paletteMargin - 60;

      // Cap between 150px and 400px
      const maxHeight = Math.max(150, Math.min(400, availableHeight));
      commandPaletteContent.style.maxHeight = maxHeight + 'px';
    }

    // Render command list
    function renderCommands() {
      if (allCommands.length === 0) {
        commandList.innerHTML = '<div class="command-empty">No commands available</div>';
        return;
      }

      commandList.innerHTML = allCommands.map(cmd => `
        <div class="command-item" data-command="${cmd.name}">
          <span class="command-name">/${cmd.name}</span>
          <span class="command-description">${cmd.description}</span>
        </div>
      `).join('');

      // Add click handlers
      commandList.querySelectorAll('.command-item').forEach(item => {
        item.addEventListener('click', () => {
          const cmdName = item.dataset.command;
          selectCommand(cmdName);
        });
      });
    }

    // Select a command and fill input
    function selectCommand(cmdName) {
      messageInput.value = '/' + cmdName + ' ';
      messageInput.focus();
      // Trigger input event to resize textarea
      messageInput.dispatchEvent(new Event('input'));
      closeCommandPalette();
    }

    // Toggle palette open/close
    function toggleCommandPalette() {
      if (paletteOpen) {
        closeCommandPalette();
      } else {
        openCommandPalette();
      }
    }

    // Open palette
    function openCommandPalette() {
      paletteOpen = true;
      commandPalette.classList.add('open');
      commandsBtn.classList.add('active');
      renderCommands();
      updatePaletteHeight();
      updateOutputPadding();
    }

    // Close palette
    function closeCommandPalette() {
      paletteOpen = false;
      commandPalette.classList.remove('open');
      commandsBtn.classList.remove('active');
      // Wait for the 200ms grid animation to complete before updating padding
      setTimeout(() => updateOutputPadding(), 220);
    }

    // Close palette when clicking outside
    document.addEventListener('click', (e) => {
      if (paletteOpen && !commandPalette.contains(e.target) && e.target !== commandsBtn) {
        closeCommandPalette();
      }
    });

    // Update palette height on viewport changes (keyboard open/close)
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        if (paletteOpen) {
          updatePaletteHeight();
        }
      });
    }

    // ============================================
    // VIRTUAL SCROLLING FUNCTIONS
    // ============================================
    const PADDING_TOP = 60; // Space for fixed header

    function getVisibleRange() {
      const scrollTop = output.scrollTop;
      const viewportHeight = output.clientHeight;

      const startRow = Math.max(0, Math.floor((scrollTop - PADDING_TOP) / ROW_HEIGHT) - BUFFER_ROWS);
      const endRow = Math.min(allLines.length, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT) + BUFFER_ROWS);

      return { start: startRow, end: endRow };
    }

    let lastContentVersion = 0; // Track when content changes

    function renderVisibleLines(forceRender = false) {
      const range = getVisibleRange();

      // Skip if range hasn't changed AND we're not forcing a render
      if (!forceRender &&
          range.start === renderedRange.start &&
          range.end === renderedRange.end) {
        return;
      }

      renderedRange = range;

      // Build HTML for visible lines only (convert ANSI to HTML client-side)
      const visibleLines = allLines.slice(range.start, range.end);
      const html = visibleLines.map(line =>
        `<div class="terminal-line">${ansiToHtml(line)}</div>`
      ).join('');

      // Position the content
      virtualContent.style.top = (PADDING_TOP + range.start * ROW_HEIGHT) + 'px';
      virtualContent.innerHTML = html;
    }

    function updateVirtualHeight() {
      // Don't add PADDING_TOP here - the CSS padding-top on the container already creates that space
      // Adding it here creates a 60px gap at the bottom of the content
      const totalHeight = allLines.length * ROW_HEIGHT;
      virtualSpacer.style.height = totalHeight + 'px';
    }

    function handleScroll() {
      // Cancel any pending RAF
      if (scrollRAF) cancelAnimationFrame(scrollRAF);

      // Use RAF to batch scroll handling
      scrollRAF = requestAnimationFrame(() => {
        // Check if user scrolled away from bottom
        const scrollBottom = output.scrollHeight - output.scrollTop - output.clientHeight;
        followMode = scrollBottom < 50; // Within 50px of bottom = follow mode

        renderVisibleLines();
      });
    }

    function scrollToBottom() {
      if (followMode) {
        output.scrollTop = output.scrollHeight;
      }
    }

    // ============================================
    // OUTPUT UPDATE FUNCTIONS
    // ============================================
    function trimEmptyLines(lines) {
      // Remove leading and trailing empty lines from tmux output
      let start = 0;
      let end = lines.length;
      while (start < end && lines[start].trim() === '') {
        start++;
      }
      while (end > start && lines[end - 1].trim() === '') {
        end--;
      }
      return lines.slice(start, end);
    }

    function applyLinesUpdate(lines, mode) {
      allLines = trimEmptyLines(lines);
      updateVirtualHeight();
      renderVisibleLines(true); // Force re-render since content changed
      scrollToBottom();
    }

    function scheduleOutputUpdate(lines, mode) {
      // Apply immediately - virtual scrolling is efficient
      applyLinesUpdate(lines, mode);
    }

    // ============================================
    // UI FUNCTIONS
    // ============================================

    function calculateColumns() {
      const padding = 32;
      const availableWidth = output.clientWidth - padding;
      const charWidth = 7.22;
      const cols = Math.floor(availableWidth / charWidth);
      return Math.max(40, cols);
    }

    function sendResize() {
      if (!ws || !connected) return;
      const cols = calculateColumns();
      if (cols !== lastCols) {
        lastCols = cols;
        ws.send(JSON.stringify({ type: 'resize', cols: cols }));
      }
    }

    function handleResize() {
      if (resizeTimeout) clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        sendResize();
        renderVisibleLines(); // Re-render on resize
      }, 150);
    }

    function updateStatus() {
      if (!connected) {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Reconnecting...';
      } else {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
      }
    }

    // ============================================
    // WEBSOCKET & MESSAGE HANDLING
    // ============================================
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        connected = true;
        updateStatus();
        setTimeout(sendResize, 100);
      };

      ws.onclose = () => {
        connected = false;
        updateStatus();
        setTimeout(connect, 500);
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleMessage(msg);
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'output':
          if (msg.lines) {
            scheduleOutputUpdate(msg.lines, msg.mode);
          }
          break;

        case 'sent':
          if (!msg.success) {
            console.error('Failed to send message');
          }
          break;
      }
    }

    function animateButton(btn) {
      btn.animate([
        { transform: 'scale(1)' },
        { transform: 'scale(0.85)' },
        { transform: 'scale(1.08)' },
        { transform: 'scale(1)' }
      ], {
        duration: 350,
        easing: 'ease-in-out'
      });
    }

    // Apply tap animation to all buttons
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => animateButton(btn));
    });

    function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || !connected) return;

      // Optimistic UI: clear input immediately
      messageInput.value = '';
      messageInput.style.height = 'auto';
      updateButtonState();

      ws.send(JSON.stringify({ type: 'send', content: message }));
    }


    function sendKey(key) {
      if (!connected) return;
      ws.send(JSON.stringify({ type: 'key', key: key }));
    }

    // ============================================
    // VOICE RECOGNITION (Web Speech API)
    // ============================================
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecording = false;

    // Check if speech recognition is supported
    const speechSupported = !!SpeechRecognition;

    // Available languages
    const languages = [
      { code: 'en-US', name: 'English', flag: '🇺🇸' },
      { code: 'es-ES', name: 'Spanish', flag: '🇪🇸' },
      { code: 'fr-FR', name: 'French', flag: '🇫🇷' },
      { code: 'de-DE', name: 'German', flag: '🇩🇪' },
      { code: 'it-IT', name: 'Italian', flag: '🇮🇹' },
      { code: 'pt-BR', name: 'Portuguese', flag: '🇧🇷' },
      { code: 'zh-CN', name: 'Chinese', flag: '🇨🇳' },
      { code: 'ja-JP', name: 'Japanese', flag: '🇯🇵' },
      { code: 'ko-KR', name: 'Korean', flag: '🇰🇷' },
    ];

    // Language drawer state
    const languageDrawer = document.getElementById('languageDrawer');
    const languageList = document.getElementById('languageList');
    let languageDrawerOpen = false;
    let selectedLanguage = languages[0]; // Default to English

    // Debug: log speech support status
    console.log('Speech API check:', {
      SpeechRecognition: !!window.SpeechRecognition,
      webkitSpeechRecognition: !!window.webkitSpeechRecognition,
      supported: speechSupported
    });

    // Render language options
    function renderLanguages() {
      languageList.innerHTML = languages.map(lang => `
        <div class="language-item ${lang.code === selectedLanguage.code ? 'selected' : ''}" data-code="${lang.code}">
          <span class="language-flag">${lang.flag}</span>
          <span class="language-name">${lang.name}</span>
        </div>
      `).join('');

      // Add click handlers
      languageList.querySelectorAll('.language-item').forEach(item => {
        item.addEventListener('click', () => {
          const code = item.dataset.code;
          const lang = languages.find(l => l.code === code);
          if (lang) {
            selectLanguage(lang);
          }
        });
      });
    }

    // Open language drawer
    function openLanguageDrawer() {
      if (!speechSupported) {
        const debugInfo = `SpeechRecognition: ${!!window.SpeechRecognition}, webkitSpeechRecognition: ${!!window.webkitSpeechRecognition}`;
        alert(`Voice input not available.\n\nDebug: ${debugInfo}\n\nIf on iOS:\n- Make sure you're in Safari (not a home screen PWA)\n- Siri must be enabled in Settings`);
        return;
      }
      languageDrawerOpen = true;
      languageDrawer.classList.add('open');
      closeCommandPalette(); // Close command palette if open
      renderLanguages();
      updateOutputPadding();
    }

    // Close language drawer
    function closeLanguageDrawer() {
      languageDrawerOpen = false;
      languageDrawer.classList.remove('open');
      setTimeout(() => updateOutputPadding(), 220);
    }

    // Select language (just saves selection, doesn't start recording)
    function selectLanguage(lang) {
      selectedLanguage = lang;
      closeLanguageDrawer();
    }

    // Start recording in specified language
    function startRecording(langCode) {
      if (!speechSupported) return;

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      recognition.lang = langCode;

      recognition.onstart = () => {
        isRecording = true;
        sendBtn.classList.add('recording');
      };

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = 0; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        messageInput.value = transcript;
        messageInput.dispatchEvent(new Event('input'));
      };

      recognition.onend = () => {
        isRecording = false;
        sendBtn.classList.remove('recording');
        updateButtonState();
      };

      recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        isRecording = false;
        sendBtn.classList.remove('recording');
        updateButtonState();

        if (event.error === 'not-allowed') {
          alert('Microphone access denied. Please enable microphone permissions in your browser settings.');
        } else if (event.error === 'network') {
          alert('Network error during speech recognition. Please check your connection.');
        }
      };

      try {
        recognition.start();
      } catch (e) {
        console.error('Failed to start recognition:', e);
        alert('Could not start voice input. Please try again.');
      }
    }

    // Close language drawer when clicking outside
    document.addEventListener('click', (e) => {
      if (languageDrawerOpen && !languageDrawer.contains(e.target) && e.target !== sendBtn && !sendBtn.contains(e.target)) {
        closeLanguageDrawer();
      }
    });

    // Update button to show mic or send icon based on input state
    // In PWA mode, always show send icon (voice doesn't work in iOS PWA)
    function updateButtonState() {
      const hasText = messageInput.value.trim().length > 0;
      if (hasText || isPWA) {
        sendBtn.classList.remove('show-mic');
      } else {
        sendBtn.classList.add('show-mic');
      }
    }

    // Long-press detection for mic button (disabled in PWA mode)
    let longPressTimer = null;
    let isLongPress = false;
    const LONG_PRESS_DURATION = 400; // ms

    sendBtn.addEventListener('touchstart', (e) => {
      // Skip voice features in PWA mode
      if (isPWA) return;
      // Allow long-press for language selection when not recording and no text
      if (isRecording || messageInput.value.trim().length > 0) return;
      isLongPress = false;
      longPressTimer = setTimeout(() => {
        isLongPress = true;
        openLanguageDrawer();
      }, LONG_PRESS_DURATION);
    }, { passive: true });

    sendBtn.addEventListener('touchend', (e) => {
      clearTimeout(longPressTimer);

      // Skip voice features in PWA mode
      if (isPWA) return;

      // If recording, always allow stopping
      if (isRecording && recognition) {
        e.preventDefault();
        recognition.stop();
        return;
      }

      // If has text and not recording, let click handler send
      if (messageInput.value.trim().length > 0) return;

      // No text, not recording
      if (!isLongPress) {
        e.preventDefault();
        if (languageDrawerOpen) {
          closeLanguageDrawer();
        } else {
          startRecording(selectedLanguage.code);
        }
      }
    });

    sendBtn.addEventListener('touchcancel', () => {
      clearTimeout(longPressTimer);
    });

    // Handle send button click (for desktop and send mode)
    function handleSendButton() {
      const hasText = messageInput.value.trim().length > 0;

      if (hasText) {
        sendMessage();
      }
      // Touch events handle mic interactions on mobile
    }

    // ============================================
    // DYNAMIC INPUT AREA PADDING
    // ============================================
    const CONTENT_GAP = 16; // Space between last line of content and input area

    function updateOutputPadding(forceScroll = false) {
      // Check if we're currently at the bottom before changing padding
      const wasAtBottom = forceScroll || (output.scrollHeight - output.scrollTop - output.clientHeight) < 50;

      const inputAreaHeight = inputArea.offsetHeight;
      output.style.paddingBottom = (inputAreaHeight + CONTENT_GAP) + 'px';

      // After padding changes, scroll smoothly during the 150ms transition
      if (wasAtBottom) {
        const scrollToEnd = () => { output.scrollTop = output.scrollHeight; };
        scrollToEnd();
        // Follow the transition with multiple updates
        requestAnimationFrame(scrollToEnd);
        setTimeout(scrollToEnd, 50);
        setTimeout(scrollToEnd, 100);
        setTimeout(scrollToEnd, 150);
      }
    }

    // ============================================
    // EVENT LISTENERS
    // ============================================
    output.addEventListener('scroll', handleScroll, { passive: true });

    messageInput.addEventListener('input', function() {
      const textarea = this;
      requestAnimationFrame(() => {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        updateOutputPadding();
        updateButtonState();
      });
    });

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener('resize', handleResize);

    window.addEventListener('load', () => {
      if (window.innerWidth > 768) {
        messageInput.focus();
      }
    });

    // ============================================
    // VISIBILITY CHANGE - Reconnect when returning to app
    // ============================================
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        // Immediately show connected status - don't flash "Reconnecting"
        // WebSocket will update status if it actually fails
        connected = true;
        updateStatus();

        // iOS kills WebSocket connections in background but readyState may lie
        // Always fetch content via REST immediately and force reconnect
        fetch('/api/output')
          .then(res => res.json())
          .then(data => {
            if (data.output) {
              applyLinesUpdate(data.output.split('\n'), null);
            }
          })
          .catch(() => {});

        // Force close and reconnect - don't trust existing connection state
        if (ws) {
          ws.onclose = null; // Prevent auto-reconnect from old socket
          ws.close();
        }
        connect();
      }
    });

    // ============================================
    // iOS SCROLL FIXES
    // ============================================
    const inputArea = document.querySelector('.input-area');

    // Prevent all touch scrolling except in the output container
    document.addEventListener('touchmove', (e) => {
      // Allow scrolling in output container
      if (output.contains(e.target)) {
        // Prevent overscroll at boundaries
        const atTop = output.scrollTop <= 0;
        const atBottom = output.scrollTop >= output.scrollHeight - output.clientHeight;

        // Get touch direction
        if (e.touches.length === 1) {
          const touch = e.touches[0];
          const lastY = output._lastTouchY || touch.clientY;
          const deltaY = touch.clientY - lastY;
          output._lastTouchY = touch.clientY;

          // Prevent scroll if at boundary and trying to scroll further
          if ((atTop && deltaY > 0) || (atBottom && deltaY < 0)) {
            e.preventDefault();
          }
        }
        return;
      }

      // Allow scrolling in command list
      if (commandList.contains(e.target)) {
        return;
      }

      // Allow scrolling in textarea if it has overflow
      if (e.target === messageInput && messageInput.scrollHeight > messageInput.clientHeight) {
        return;
      }

      // Block all other touch scrolling
      e.preventDefault();
    }, { passive: false });

    // Track touch start for direction detection
    output.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        output._lastTouchY = e.touches[0].clientY;
      }
    }, { passive: true });

    // ============================================
    // KEYBOARD DETECTION - Add extra padding when keyboard is closed
    // Only applies on actual mobile touch devices, not desktop with mobile viewport
    // ============================================
    let maxViewportHeight = 0;
    let lastKeyboardState = null;

    function updateKeyboardState() {
      // Only do keyboard detection on actual mobile devices
      if (!isMobile) {
        inputArea.classList.add('keyboard-closed');
        return;
      }

      if (window.visualViewport) {
        const currentHeight = window.visualViewport.height;
        // Track max height (represents keyboard closed state)
        maxViewportHeight = Math.max(maxViewportHeight, currentHeight);
        // Keyboard is open if current height is significantly less than max
        const keyboardOpen = (maxViewportHeight - currentHeight) > 150;

        // Only update if state actually changed
        if (lastKeyboardState !== keyboardOpen) {
          lastKeyboardState = keyboardOpen;
          inputArea.classList.toggle('keyboard-closed', !keyboardOpen);
          // Update padding immediately (no CSS transition to wait for)
          updateOutputPadding(true);
        }
      }
    }

    if (isMobile && window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateKeyboardState);
      // Initial state
      updateKeyboardState();
    } else {
      // Desktop or unsupported browsers: always use keyboard-closed padding
      inputArea.classList.add('keyboard-closed');
    }

    // Initial padding calculation
    updateOutputPadding();

    // ============================================
    // LOCAL STORAGE PERSISTENCE
    // ============================================
    const STORAGE_KEYS = {
      inputText: 'claude-relay-input',
      language: 'claude-relay-language'
    };

    // Restore input text from localStorage
    const savedInput = localStorage.getItem(STORAGE_KEYS.inputText);
    if (savedInput) {
      messageInput.value = savedInput;
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    }

    // Restore selected language from localStorage
    const savedLang = localStorage.getItem(STORAGE_KEYS.language);
    if (savedLang) {
      const lang = languages.find(l => l.code === savedLang);
      if (lang) selectedLanguage = lang;
    }

    // Save input text on change (debounced)
    let inputSaveTimer = null;
    messageInput.addEventListener('input', () => {
      clearTimeout(inputSaveTimer);
      inputSaveTimer = setTimeout(() => {
        const text = messageInput.value;
        if (text) {
          localStorage.setItem(STORAGE_KEYS.inputText, text);
        } else {
          localStorage.removeItem(STORAGE_KEYS.inputText);
        }
      }, 300);
    });

    // Clear saved input when message is sent
    const originalSendMessage = sendMessage;
    sendMessage = function() {
      localStorage.removeItem(STORAGE_KEYS.inputText);
      originalSendMessage();
    };

    // Save language when changed
    const originalSelectLanguage = selectLanguage;
    selectLanguage = function(lang) {
      localStorage.setItem(STORAGE_KEYS.language, lang.code);
      originalSelectLanguage(lang);
    };

    // ============================================
    // START
    // ============================================
    // Initialize button state (show mic if no text)
    updateButtonState();

    // Fetch commands for palette on load
    fetchCommands();

    // Fetch initial content immediately via REST while WebSocket connects
    fetch('/api/output')
      .then(res => res.json())
      .then(data => {
        if (data.output && allLines.length === 0) {
          applyLinesUpdate(data.output.split('\n'), null);
        }
      })
      .catch(() => {}); // Ignore errors, WebSocket will handle it

    connect();
  </script>
</body>
</html>
