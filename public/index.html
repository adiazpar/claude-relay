<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1915">
  <title>Claude Relay</title>
  <link rel="stylesheet" href="global.css">
  <style>
    /* Nerd Font for the terminal canvas. Iosevka NF was picked over
       JetBrainsMono NF because its Dingbats/Misc-Technical coverage is
       complete — Claude Code's bullet glyph (⏺ U+23FA) and thinking-star
       (✻ U+273B) are both absent from JetBrainsMono's patched build.
       Subset to the ranges the terminal actually uses, compressed to
       woff2 (~430 KB). Scoped to .terminal-content only. */
    @font-face {
      font-family: 'Terminal Nerd Font';
      src: url('fonts/IosevkaNerdFont-subset.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    html {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      touch-action: none;
    }

    body {
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: none;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 50;
    }

    /* Pane tabs */
    .pane-tabs {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 49;
      scrollbar-width: none;
    }

    .pane-tabs::-webkit-scrollbar {
      display: none;
    }

    .pane-tabs.hidden {
      display: none;
    }

    .pane-tab {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      color: var(--text-secondary);
      /* Prevent text selection on long press */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .pane-tab:active {
      transform: scale(0.97);
    }

    /* Long press feedback animation */
    @keyframes longPressPulse {
      0% { transform: scale(1); }
      50% { transform: scale(0.92); }
      100% { transform: scale(1); }
    }

    .pane-tab.long-press-feedback {
      animation: longPressPulse 0.2s ease-out;
    }

    .pane-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    @media (hover: hover) {
      .pane-tab:hover:not(.active) {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .pane-tab-name {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }


    /* Add window button - matches shortcut-btn style */
    .pane-tab-add {
      height: 28px;
      padding: 0 12px;
      border-radius: 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .pane-tab-add:active {
      transform: scale(0.97);
    }

    @media (hover: hover) {
      .pane-tab-add:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    /* Tab action sheet */
    .tab-action-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
    }

    .tab-action-sheet.open {
      transform: translateY(0);
    }

    .tab-action-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .tab-action-sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .tab-action-sheet-content {
      background: var(--bg-secondary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      padding: 20px 16px;
      /* Generous bottom padding lifts the last option clear of the home
         indicator / screen edge. */
      padding-bottom: calc(36px + env(safe-area-inset-bottom));
    }

    .tab-action-sheet-header {
      text-align: center;
      padding-bottom: 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .tab-action-sheet-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .tab-action-sheet-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .tab-action-sheet-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tab-action-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-action-option:active {
      transform: scale(0.98);
    }

    .tab-action-option svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      flex-shrink: 0;
    }

    /* Brand logos (agent picker) are filled paths, not stroked outlines. */
    .tab-action-option svg.agent-logo {
      fill: currentColor;
      stroke: none;
    }

    .tab-action-option.danger {
      color: #e53935;
    }

    .tab-action-option.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    @media (hover: hover) {
      .tab-action-option:hover {
        border-color: var(--accent);
        background: rgba(215, 118, 85, 0.1);
      }
      .tab-action-option.danger:hover {
        border-color: #e53935;
        background: rgba(229, 57, 53, 0.1);
      }
    }

    /* Rename input mode */
    .tab-rename-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }

    .tab-rename-input:focus {
      border-color: var(--accent);
    }

    .tab-rename-actions {
      display: flex;
      gap: 8px;
    }

    .tab-rename-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-rename-cancel {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .tab-rename-save {
      background: var(--accent);
      border: none;
      color: white;
    }

    .tab-rename-save:active,
    .tab-rename-cancel:active {
      transform: scale(0.98);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    /* Device switcher button (header right side) */
    .device-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 1;
      min-width: 0;
      max-width: 45vw;
    }

    .device-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .device-btn span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .device-btn:active {
      transform: scale(0.97);
    }

    @media (hover: hover) {
      .device-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    /* Device rows inside the switcher sheet */
    .device-option-label {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .device-option-host {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Probed-unreachable device: dimmed but still tappable, so the user
       can retry it (machine may be waking up) or remove it. */
    .tab-action-option.device-offline {
      opacity: 0.45;
    }

    .tab-action-option svg.device-option-check {
      margin-left: auto;
      color: var(--accent);
      stroke: currentColor;
    }

    .device-option-remove {
      margin-left: auto;
      padding: 6px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    .device-option-remove svg {
      width: 16px;
      height: 16px;
    }

    @media (hover: hover) {
      .device-option-remove:hover {
        color: #e53935;
      }
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #D77655;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--error);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.connected {
      background: var(--success);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Output area - virtual scrolling container */
    .output-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg-primary);
      color: #e6edf3;
      -webkit-overflow-scrolling: touch;
      position: relative;
      padding-top: 76px; /* 60px header + 16px gap (matches CONTENT_GAP) */
      /* padding-bottom is set dynamically by JS based on input area height */
      touch-action: pan-y; /* Allow vertical scroll only in this container */
      overscroll-behavior: contain; /* Prevent scroll chaining to parent */
    }

    .output-container.with-tabs {
      padding-top: 120px; /* 60px header + 44px tabs + 16px gap */
    }

    .output-container::-webkit-scrollbar {
      width: 6px;
    }

    .output-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .output-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    @media (hover: hover) {
      .output-container::-webkit-scrollbar-thumb:hover {
        background: var(--border-light);
      }
    }

    .terminal-content {
      padding: 0 16px;
      font-family: 'Terminal Nerd Font', ui-monospace, 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      word-break: break-word;
    }

    /* Individual terminal line */
    .terminal-line {
      min-height: 16.8px; /* 12px * 1.4 line-height */
    }


    /* Input area - extends .fixed-bar-bottom from global.css. */
    .input-area {
      padding: 8px 16px 12px 16px;
      background: var(--bg-primary);
      touch-action: none; /* Prevent dragging */
    }

    /* Extra padding when keyboard is closed - need safe area for home indicator */
    .input-area.keyboard-closed {
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    /* Shortcuts row above textarea */
    .shortcuts-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .shortcut-btn {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 12px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .shortcut-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .shortcut-btn:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.1);
      }
    }

    .shortcut-btn:active {
      transform: scale(0.97);
    }

    .shortcut-btn:disabled,
    .shortcut-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: var(--border);
      color: var(--text-muted);
      background: var(--bg-tertiary);
      transform: none;
    }


    /* Shown in place of .input-row when a dev server is running in the
       active pane. Each .port-chip opens http://<relay-host>:<port>. */
    .server-ports-row {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 2px;
      flex-wrap: wrap;
      min-height: 44px;
    }

    .server-ports-row.empty {
      color: var(--text-muted);
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      padding-left: 14px;
    }

    .port-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-family: 'Terminal Nerd Font', ui-monospace, 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .port-chip svg {
      width: 14px;
      height: 14px;
      color: var(--text-secondary);
    }

    @media (hover: hover) {
      .port-chip:hover {
        border-color: var(--accent);
        color: var(--accent-hover);
        background: rgba(215, 118, 85, 0.08);
      }
      .port-chip:hover svg {
        color: var(--accent-hover);
      }
    }

    .port-chip:active {
      transform: scale(0.97);
    }

    /* Input row - this IS the styled input field */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 6px 6px 6px 14px;
      border: 1px solid transparent;
      border-radius: 22px;
      background: var(--bg-input);
      transition: all 0.2s ease;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    textarea {
      flex: 1;
      min-height: 28px;
      max-height: 120px;
      padding: 2px 0;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: -0.1px;
      line-height: 24px;
      resize: none;
      outline: none;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 28px;
      flex-shrink: 0;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #FCF2EE; /* Match Claude icon color */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* Prevent text selection on long press */
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    /* Paperclip attach button, mirrors send-btn sizing but transparent. */
    .attach-btn {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      border: none;
      border-radius: 14px;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .attach-btn svg {
      width: 18px;
      height: 18px;
    }

    @media (hover: hover) {
      .attach-btn:hover {
        color: var(--text-primary);
      }
    }

    /* Image preview row above the shortcuts row. Left padding and
       bottom margin mirror .shortcuts-row so all three rows
       (preview / shortcuts / input) stack with matching gutters. */
    .attach-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-left: 4px;
      margin-bottom: 10px;
    }

    /* UA [hidden] rule is trumped by author display:flex — restate. */
    .attach-preview[hidden] {
      display: none;
    }

    .attach-preview-inner {
      position: relative;
      width: fit-content;
    }

    /* Visible feedback while an upload is in flight (image dimmed until
       the server returns a token). Errored uploads get a subtle red
       border instead. */
    .attach-preview-inner.is-uploading img {
      opacity: 0.5;
    }

    .attach-preview-inner.is-errored img {
      border-color: rgb(248, 113, 113);
    }

    /* Circular progress ring rendered over the image while uploading.
       Track is the full faint circle; indicator is the bright arc that
       grows via stroke-dashoffset updates from XHR upload events. */
    .upload-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;
      height: 32px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .upload-ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.2);
      stroke-width: 3;
    }

    .upload-ring-indicator {
      fill: none;
      stroke: rgba(255, 255, 255, 0.95);
      stroke-width: 3;
      stroke-linecap: round;
      /* Dasharray + dashoffset set inline via JS — depends on circle
         circumference (2π × r). */
    }

    /* Each image wears the same 1px var(--border) as .shortcut-btn.
       box-sizing: border-box keeps the rendered size at exactly 72×72
       so the border replaces the outer 1px of image pixels instead of
       expanding the element — i.e., the border paints on top of the
       image edge. */
    .attach-preview img {
      width: 72px;
      height: 72px;
      box-sizing: border-box;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-tertiary);
      display: block;
    }

    .attach-clear {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .attach-clear svg {
      width: 12px;
      height: 12px;
    }

    .attach-error[hidden] {
      display: none;
    }

    /* Inline error row for attach failures. */
    .attach-error {
      margin: 0 10px 4px;
      padding: 6px 10px;
      background: rgba(220, 38, 38, 0.12);
      color: rgb(248, 113, 113);
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.3;
    }

    .send-btn svg {
      width: 14px;
      height: 14px;
    }

    @media (hover: hover) {
      .send-btn:hover {
        background: var(--accent-hover);
      }
    }

    .send-btn:active {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      border-color: var(--border);
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 509.64"><path fill="#FCF2EE" fill-rule="nonzero" d="M142.27 316.619l73.655-41.326 1.238-3.589-1.238-1.996-3.589-.001-12.31-.759-42.084-1.138-36.498-1.516-35.361-1.896-8.897-1.895-8.34-10.995.859-5.484 7.482-5.03 10.717.935 23.683 1.617 35.537 2.452 25.782 1.517 38.193 3.968h6.064l.86-2.451-2.073-1.517-1.618-1.517-36.776-24.922-39.81-26.338-20.852-15.166-11.273-7.683-5.687-7.204-2.451-15.721 10.237-11.273 13.75.935 3.513.936 13.928 10.716 29.749 23.027 38.848 28.612 5.687 4.727 2.275-1.617.278-1.138-2.553-4.271-21.13-38.193-22.546-38.848-10.035-16.101-2.654-9.655c-.935-3.968-1.617-7.304-1.617-11.374l11.652-15.823 6.445-2.073 15.545 2.073 6.547 5.687 9.655 22.092 15.646 34.78 24.265 47.291 7.103 14.028 3.791 12.992 1.416 3.968 2.449-.001v-2.275l1.997-26.641 3.69-32.707 3.589-42.084 1.239-11.854 5.863-14.206 11.652-7.683 9.099 4.348 7.482 10.716-1.036 6.926-4.449 28.915-8.72 45.294-5.687 30.331h3.313l3.792-3.791 15.342-20.372 25.782-32.227 11.374-12.789 13.27-14.129 8.517-6.724 16.1-.001 11.854 17.617-5.307 18.199-16.581 21.029-13.75 17.819-19.716 26.54-12.309 21.231 1.138 1.694 2.932-.278 44.536-9.479 24.062-4.347 28.714-4.928 12.992 6.066 1.416 6.167-5.106 12.613-30.71 7.583-36.018 7.204-53.636 12.689-.657.48.758.935 24.164 2.275 10.337.556h25.301l47.114 3.514 12.309 8.139 7.381 9.959-1.238 7.583-18.957 9.655-25.579-6.066-59.702-14.205-20.474-5.106-2.83-.001v1.694l17.061 16.682 31.266 28.233 39.152 36.397 1.997 8.999-5.03 7.102-5.307-.758-34.401-25.883-13.27-11.651-30.053-25.302-1.996-.001v2.654l6.926 10.136 36.574 54.975 1.895 16.859-2.653 5.485-9.479 3.311-10.414-1.895-21.408-30.054-22.092-33.844-17.819-30.331-2.173 1.238-10.515 113.261-4.929 5.788-11.374 4.348-9.478-7.204-5.03-11.652 5.03-23.027 6.066-30.052 4.928-23.886 4.449-29.674 2.654-9.858-.177-.657-2.173.278-22.37 30.71-34.021 45.977-26.919 28.815-6.445 2.553-11.173-5.789 1.037-10.337 6.243-9.2 37.257-47.392 22.47-29.371 14.508-16.961-.101-2.4   <script src="lucide.min.js"></script>
  <script>
    // Replace every <i data-lucide="..."> placeholder with the real Lucide SVG.
    // Called again any time we change an icon's data-lucide attribute.
    if (window.lucide) lucide.createIcons();

    // ============================================
    // POLYFILLS & ANSI CONVERTER
    // ============================================
    window.requestIdleCallback = window.requestIdleCallback || function(callback, options) {
      const start = Date.now();
      return setTimeout(() => {
        callback({
          didTimeout: false,
          timeRemaining: () => Math.max(0, 50 - (Date.now() - start))
        });
      }, options?.timeout ? Math.min(100, options.timeout) : 1);
    };
    window.cancelIdleCallback = window.cancelIdleCallback || function(id) {
      clearTimeout(id);
    };

    // Escape untrusted strings for safe use inside HTML text and attribute values.
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // localStorage wrapper that swallows quota/private-mode errors instead of crashing.
    const storage = {
      get(key) { try { return localStorage.getItem(key); } catch { return null; } },
      set(key, val) { try { localStorage.setItem(key, val); } catch (e) { console.warn('localStorage set failed:', e); } },
      remove(key) { try { localStorage.removeItem(key); } catch {} }
    };

    // ============================================
    // DEVICE REGISTRY (multi-device switcher)
    // ============================================
    // Each device is another machine running its own claude-relay (own tmux
    // server, own panes, own agent CLIs). The page stays loaded from one
    // origin; switching devices re-points every API call and the WebSocket
    // at the chosen relay. Remote relays allow this via tailnet-scoped CORS.
    const DEVICE_STORAGE_KEY = 'claude-relay-devices';
    const ACTIVE_DEVICE_STORAGE_KEY = 'claude-relay-active-device';

    // The relay this page was served from. Always first in the list, can't
    // be removed, and keeps v1's same-origin behavior exactly.
    const LOCAL_DEVICE = {
      id: 'local',
      name: window.location.hostname.split('.')[0] || 'This device',
      host: window.location.hostname,
      port: Number(window.location.port) || (window.location.protocol === 'https:' ? 443 : 80),
      protocol: window.location.protocol === 'https:' ? 'https' : 'http',
    };

    function loadCustomDevices() {
      try {
        const parsed = JSON.parse(storage.get(DEVICE_STORAGE_KEY) || '[]');
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(d =>
          d && typeof d.id === 'string' && d.id !== 'local'
          && typeof d.name === 'string' && d.name.length > 0
          && typeof d.host === 'string' && /^[A-Za-z0-9.\-:\[\]]+$/.test(d.host)
          && Number.isInteger(d.port) && d.port >= 1 && d.port <= 65535
        );
      } catch {
        return [];
      }
    }

    let customDevices = loadCustomDevices();
    let activeDeviceId = storage.get(ACTIVE_DEVICE_STORAGE_KEY) || 'local';

    function allDevices() {
      return [LOCAL_DEVICE, ...customDevices];
    }

    // A stale persisted id (device since removed) falls back to local.
    if (!allDevices().some(d => d.id === activeDeviceId)) {
      activeDeviceId = 'local';
    }

    function saveCustomDevices() {
      storage.set(DEVICE_STORAGE_KEY, JSON.stringify(customDevices));
    }

    function getActiveDevice() {
      return allDevices().find(d => d.id === activeDeviceId) || LOCAL_DEVICE;
    }

    // Build an API URL against the active device. The local device keeps
    // same-origin relative URLs (identical to single-device behavior);
    // remote devices get absolute URLs.
    function apiUrl(path) {
      const dev = getActiveDevice();
      if (dev.id === 'local') return path;
      return `${dev.protocol === 'https' ? 'https' : 'http'}://${dev.host}:${dev.port}${path}`;
    }

    function wsUrl() {
      const dev = getActiveDevice();
      if (dev.id === 'local') {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${window.location.host}`;
      }
      return `${dev.protocol === 'https' ? 'wss' : 'ws'}://${dev.host}:${dev.port}`;
    }

    // ANSI to HTML converter - handles 256 colors and common codes
    const ANSI_COLORS = [
      '#000000', '#cd0000', '#00cd00', '#cdcd00', '#0000ee', '#cd00cd', '#00cdcd', '#e5e5e5',
      '#7f7f7f', '#ff0000', '#00ff00', '#ffff00', '#5c5cff', '#ff00ff', '#00ffff', '#ffffff',
      // 216 color cube (16-231)
      ...(() => {
        const colors = [];
        for (let r = 0; r < 6; r++)
          for (let g = 0; g < 6; g++)
            for (let b = 0; b < 6; b++)
              colors.push(`#${[r,g,b].map(c => (c ? c * 40 + 55 : 0).toString(16).padStart(2,'0')).join('')}`);
        return colors;
      })(),
      // 24 grayscale (232-255)
      ...Array.from({length: 24}, (_, i) => {
        const v = (i * 10 + 8).toString(16).padStart(2, '0');
        return `#${v}${v}${v}`;
      })
    ];

    function ansiToHtml(text) {
      if (!text) return '';

      let result = '';
      let fg = null, bg = null, bold = false, italic = false, underline = false;
      let i = 0;

      function openSpan() {
        const styles = [];
        if (fg) styles.push(`color:${fg}`);
        if (bg) styles.push(`background-color:${bg}`);
        if (bold) styles.push('font-weight:bold');
        if (italic) styles.push('font-style:italic');
        if (underline) styles.push('text-decoration:underline');
        return styles.length ? `<span style="${styles.join(';')}">` : '';
      }

      function closeSpan() {
        return (fg || bg || bold || italic || underline) ? '</span>' : '';
      }

      while (i < text.length) {
        if (text[i] === '\x1b' && text[i+1] === '[') {
          let j = i + 2;
          while (j < text.length && !/[A-Za-z]/.test(text[j])) j++;

          if (text[j] === 'm') {
            result += closeSpan();
            const codes = text.slice(i+2, j).split(';').map(Number);

            for (let k = 0; k < codes.length; k++) {
              const c = codes[k];
              if (c === 0) { fg = bg = null; bold = italic = underline = false; }
              else if (c === 1) bold = true;
              else if (c === 3) italic = true;
              else if (c === 4) underline = true;
              else if (c === 22) bold = false;
              else if (c === 23) italic = false;
              else if (c === 24) underline = false;
              else if (c >= 30 && c <= 37) fg = ANSI_COLORS[c - 30];
              else if (c === 38 && codes[k+1] === 5) { fg = ANSI_COLORS[codes[k+2]] || fg; k += 2; }
              else if (c === 38 && codes[k+1] === 2) { fg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 39) fg = null;
              else if (c >= 40 && c <= 47) bg = ANSI_COLORS[c - 40];
              else if (c === 48 && codes[k+1] === 5) { bg = ANSI_COLORS[codes[k+2]] || bg; k += 2; }
              else if (c === 48 && codes[k+1] === 2) { bg = `rgb(${codes[k+2]},${codes[k+3]},${codes[k+4]})`; k += 4; }
              else if (c === 49) bg = null;
              else if (c >= 90 && c <= 97) fg = ANSI_COLORS[c - 90 + 8];
              else if (c >= 100 && c <= 107) bg = ANSI_COLORS[c - 100 + 8];
            }
            result += openSpan();
            i = j + 1;
            continue;
          }
          // Skip other CSI sequences
          i = j + 1;
          continue;
        }

        // OSC sequences: ESC ] ... ST. Claude emits OSC 8 hyperlinks around
        // file paths (ESC ] 8 ; id=x ; file:///... ST LABEL ESC ] 8 ; ; ST)
        // and without stripping them the URI payload and ST bytes leak into
        // the rendered output. Terminator is BEL (0x07) or ST (ESC \).
        if (text[i] === '\x1b' && text[i+1] === ']') {
          let j = i + 2;
          while (j < text.length) {
            if (text[j] === '\x07') { j++; break; }
            if (text[j] === '\x1b' && text[j+1] === '\\') { j += 2; break; }
            j++;
          }
          i = j;
          continue;
        }

        // Any other lone escape — skip the ESC and the following byte so a
        // stray C1/charset sequence doesn't render as a box glyph.
        if (text[i] === '\x1b') {
          i += 2;
          continue;
        }

        // Escape HTML
        const ch = text[i];
        if (ch === '&') result += '&amp;';
        else if (ch === '<') result += '&lt;';
        else if (ch === '>') result += '&gt;';
        else result += ch;
        i++;
      }

      result += closeSpan();
      return result;
    }

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const output = document.getElementById('output');
    const terminalContent = document.getElementById('terminalContent');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const modeActionBtn = document.getElementById('modeActionBtn');
    const modeActionLabel = document.getElementById('modeActionLabel');
    const serverStopBtn = document.getElementById('serverStopBtn');
    const serverRestartBtn = document.getElementById('serverRestartBtn');
    const serverPortsRow = document.getElementById('serverPortsRow');
    const inputRow = document.getElementById('inputRow');
    const attachBtn = document.getElementById('attachBtn');
    const attachFileInput = document.getElementById('attachFileInput');
    const attachPreview = document.getElementById('attachPreview');
    const attachError = document.getElementById('attachError');

    // Currently-staged images waiting to ride along with the next send.
    // Each entry: { id, dataUrl, token?, uploading, error? }. The token
    // arrives from POST /api/upload once the file reaches the server.
    // sendMessage bundles all entries' tokens into one /api/send POST,
    // then clears the array.
    let pendingImages = [];
    let pendingImageSeq = 0;
    const CLIENT_MAX_IMAGE_BYTES = 10 * 1024 * 1024;
    const CLIENT_MAX_ATTACHMENTS = 10;

    function showAttachError(msg) {
      attachError.textContent = msg;
      attachError.hidden = false;
      clearTimeout(showAttachError._t);
      showAttachError._t = setTimeout(() => { attachError.hidden = true; }, 4000);
    }

    function clearAttachError() {
      attachError.hidden = true;
      clearTimeout(showAttachError._t);
    }

    function handleFileSelected(ev) {
      const files = Array.from(ev.target.files || []);
      ev.target.value = ''; // allow re-picking the same file later
      if (files.length === 0) return;

      for (const file of files) {
        if (pendingImages.length >= CLIENT_MAX_ATTACHMENTS) {
          showAttachError(`Max ${CLIENT_MAX_ATTACHMENTS} attachments per message`);
          break;
        }
        if (!file.type.startsWith('image/')) {
          showAttachError(`${file.name || 'File'} is not an image`);
          continue;
        }
        if (file.size > CLIENT_MAX_IMAGE_BYTES) {
          showAttachError(`${file.name || 'Image'} is too large (max 10 MB)`);
          continue;
        }
        stageFile(file);
      }
      clearAttachError();
      renderAttachPreview();
    }

    // If the user picks a big image (either dimension > 1536px, or file
    // size > 1.5 MB), resize + re-encode as JPEG at 0.80 quality. Tuned
    // for phone-over-cellular: Claude's own API resizes to 2000px when
    // many images are attached, so our 1536 target loses nothing Claude
    // can actually use. Smaller images — typically screenshots already
    // under 1.5 MB — upload untouched to preserve fidelity.
    const COMPRESS_MAX_DIM = 1536;
    const COMPRESS_SIZE_TRIGGER = 1.5 * 1024 * 1024;
    const COMPRESS_QUALITY = 0.80;

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('decode failed')); };
        img.src = url;
      });
    }

    function resizeToJpeg(img, maxDim, quality) {
      const longest = Math.max(img.width, img.height);
      const scale = longest > maxDim ? maxDim / longest : 1;
      const width = Math.round(img.width * scale);
      const height = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      return new Promise((resolve, reject) => {
        canvas.toBlob(
          blob => blob ? resolve(blob) : reject(new Error('encode failed')),
          'image/jpeg',
          quality
        );
      });
    }

    // Decide whether to compress. Returns the Blob that should actually
    // be uploaded (compressed JPEG or the original File, both are Blobs).
    // The caller already has a separate preview URL from the original
    // file, so we don't need to produce any dataUrl here.
    async function prepareForUpload(file) {
      const tooBig = file.size > COMPRESS_SIZE_TRIGGER;
      let img = null;
      try { img = await loadImageFromFile(file); } catch { img = null; }

      const tooLarge = img && Math.max(img.width, img.height) > COMPRESS_MAX_DIM;

      if (!tooBig && !tooLarge) return file;
      if (!img) return file; // couldn't decode — upload original as-is

      return await resizeToJpeg(img, COMPRESS_MAX_DIM, COMPRESS_QUALITY);
    }

    function stageFile(file) {
      // Instant thumbnail via objectURL — no file read into JS memory.
      // Browser holds a reference to the file bytes and decodes lazily.
      const previewUrl = URL.createObjectURL(file);
      const entry = {
        id: ++pendingImageSeq,
        previewUrl,
        token: null,
        uploading: true,
        progress: 0,
        error: null,
      };
      pendingImages.push(entry);
      renderAttachPreview(); // thumbnail visible immediately

      prepareForUpload(file)
        .then(blob => uploadEntry(entry, blob))
        .catch(err => {
          console.error('Prepare failed:', err);
          entry.uploading = false;
          entry.error = 'read failed';
          renderAttachPreview();
          updateSendBtnState();
        });
    }

    // Upload the blob as a raw binary body. The browser pulls exactly
    // the blob's bytes onto the wire — no base64 inflation, no JSON
    // parse, no double FileReader pass. Content-Type comes from the
    // blob's type (set by canvas.toBlob or the original File).
    function uploadEntry(entry, blob) {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', apiUrl('/api/upload'));
      xhr.setRequestHeader('Content-Type', blob.type || 'application/octet-stream');

      xhr.upload.addEventListener('progress', (e) => {
        if (!e.lengthComputable) return;
        entry.progress = e.loaded / e.total;
        updateEntryProgress(entry);
      });

      xhr.addEventListener('load', () => {
        entry.uploading = false;
        entry.progress = 1;
        try {
          const parsed = JSON.parse(xhr.responseText || '{}');
          if (xhr.status >= 200 && xhr.status < 300 && parsed.success && parsed.token) {
            entry.token = parsed.token;
          } else {
            entry.error = parsed.error || 'upload failed';
            showAttachError(entry.error);
          }
        } catch {
          entry.error = 'bad response';
          showAttachError(entry.error);
        }
        renderAttachPreview();
        updateSendBtnState();
      });

      xhr.addEventListener('error', () => {
        entry.uploading = false;
        entry.error = 'network error';
        showAttachError('Upload failed: network error');
        renderAttachPreview();
        updateSendBtnState();
      });

      xhr.send(blob);
    }

    // Update progress ring directly on the DOM node for this entry —
    // avoids re-rendering the entire preview list on every progress event.
    function updateEntryProgress(entry) {
      const item = attachPreview.querySelector(`[data-entry-id="${entry.id}"]`);
      if (!item) return;
      const indicator = item.querySelector('.upload-ring-indicator');
      if (!indicator) return;
      const RING_CIRC = 2 * Math.PI * 14; // matches r=14 below
      indicator.style.strokeDashoffset = String(RING_CIRC * (1 - entry.progress));
    }

    function removePendingImage(id) {
      const entry = pendingImages.find(p => p.id === id);
      if (entry && entry.previewUrl) URL.revokeObjectURL(entry.previewUrl);
      pendingImages = pendingImages.filter(p => p.id !== id);
      renderAttachPreview();
      updateSendBtnState();
    }

    function clearPendingImages() {
      for (const e of pendingImages) {
        if (e.previewUrl) URL.revokeObjectURL(e.previewUrl);
      }
      pendingImages = [];
      renderAttachPreview();
      updateSendBtnState();
    }

    function renderAttachPreview() {
      // Clear previous children without using innerHTML to avoid any
      // XSS surface (we only ever inject from trusted local state, but
      // explicit DOM is safer and self-documenting).
      while (attachPreview.firstChild) {
        attachPreview.removeChild(attachPreview.firstChild);
      }

      const RING_R = 14;
      const RING_CIRC = 2 * Math.PI * RING_R;

      for (const entry of pendingImages) {
        const item = document.createElement('div');
        item.className = 'attach-preview-inner';
        item.setAttribute('data-entry-id', String(entry.id));
        if (entry.uploading) item.classList.add('is-uploading');
        if (entry.error) item.classList.add('is-errored');

        const img = document.createElement('img');
        img.alt = 'Attached image';
        img.src = entry.previewUrl;
        item.appendChild(img);

        // Progress ring overlay (centered on the thumb). Built as SVG so
        // the stroke-dashoffset can be updated directly on progress
        // events without re-rendering the list. Empty ring at the
        // start (strokeDashoffset = circumference), full ring at the end
        // (strokeDashoffset = 0).
        if (entry.uploading) {
          const svgNS = 'http://www.w3.org/2000/svg';
          const svg = document.createElementNS(svgNS, 'svg');
          svg.setAttribute('class', 'upload-ring');
          svg.setAttribute('viewBox', '0 0 36 36');
          const track = document.createElementNS(svgNS, 'circle');
          track.setAttribute('class', 'upload-ring-track');
          track.setAttribute('cx', '18');
          track.setAttribute('cy', '18');
          track.setAttribute('r', String(RING_R));
          svg.appendChild(track);
          const indicator = document.createElementNS(svgNS, 'circle');
          indicator.setAttribute('class', 'upload-ring-indicator');
          indicator.setAttribute('cx', '18');
          indicator.setAttribute('cy', '18');
          indicator.setAttribute('r', String(RING_R));
          indicator.setAttribute('transform', 'rotate(-90 18 18)');
          indicator.style.strokeDasharray = String(RING_CIRC);
          indicator.style.strokeDashoffset = String(RING_CIRC * (1 - (entry.progress || 0)));
          svg.appendChild(indicator);
          item.appendChild(svg);
        }

        const closeBtn = document.createElement('button');
        closeBtn.className = 'attach-clear';
        closeBtn.setAttribute('aria-label', 'Remove image');
        closeBtn.addEventListener('click', () => removePendingImage(entry.id));
        const icon = document.createElement('i');
        icon.setAttribute('data-lucide', 'x');
        closeBtn.appendChild(icon);
        item.appendChild(closeBtn);

        attachPreview.appendChild(item);
      }

      attachPreview.hidden = pendingImages.length === 0;
      if (window.lucide) lucide.createIcons();

      // Input-area height changed — recompute the terminal's bottom
      // padding so the last line of output isn't hidden behind the row.
      if (typeof updateOutputPadding === 'function') {
        updateOutputPadding();
      }
    }

    function updateSendBtnState() {
      // Disable send while any upload is in flight.
      const anyUploading = pendingImages.some(p => p.uploading);
      if (sendBtn) sendBtn.disabled = anyUploading;
    }

    // Swap the Lucide icon inside #modeActionBtn. Lucide replaces <i data-lucide>
    // with an <svg>, so after state changes we restore the placeholder and let
    // lucide.createIcons re-render it.
    function setModeActionIcon(name) {
      const btn = modeActionBtn;
      if (!btn) return;
      let el = btn.querySelector('[data-lucide]') || btn.querySelector('svg.lucide');
      if (!el) return;
      if (el.tagName === 'svg' && el.getAttribute('data-lucide-name') === name) return;
      const placeholder = document.createElement('i');
      placeholder.id = 'modeActionIcon';
      placeholder.setAttribute('data-lucide', name);
      el.replaceWith(placeholder);
      if (window.lucide) lucide.createIcons();
      const rendered = btn.querySelector('svg.lucide');
      if (rendered) rendered.setAttribute('data-lucide-name', name);
    }
    const paneTabs = document.getElementById('paneTabs');

    // ============================================
    // PANE STATE MANAGEMENT
    // ============================================
    // Per-pane state class
    class PaneState {
      constructor(paneId, cwd) {
        this.paneId = paneId;
        this.cwd = cwd;
        this.agentId = null;
        this.shellReady = false;
        this.currentCommand = '';
        this.serverRunning = false;
        this.serverCommand = null;
        this.serverPorts = [];
        this.inputText = '';
        this.allLines = [];
        this.scrollPosition = 0;
      }
    }

    // Global pane state
    let paneStates = new Map();  // paneId -> PaneState
    let activePaneId = null;
    let activePaneTarget = null;
    let allPanes = [];  // List of all panes from server

    // ============================================
    // OUTPUT STATE
    // ============================================
    const MAX_TERMINAL_LINES = 2000;

    // allLines is now stored per-pane in PaneState
    // Helper to get current pane's lines
    function getAllLines() {
      if (!activePaneId) return [];
      const state = paneStates.get(activePaneId);
      return state ? state.allLines : [];
    }

    function getActivePaneState() {
      if (!activePaneId) return null;
      return paneStates.get(activePaneId) || null;
    }

    let followMode = true;   // Auto-scroll to bottom
    let scrollIdleTimer = null;
    let isUserScrolling = false;

    // ============================================
    // CONNECTION STATE
    // ============================================
    let ws = null;
    let connected = false;
    let lastCols = 0;
    let resizeTimeout = null;
    let lastRxTime = Date.now(); // updated on any inbound WS message (incl. pings)

    // ============================================
    // MOBILE DETECTION
    // ============================================
    // Detect if this is a real mobile touch device (not desktop with touch screen)
    function isMobileDevice() {
      // Check for touch capability AND small screen (rules out touch laptops)
      const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      const isSmallScreen = window.innerWidth <= 768;
      // Also check user agent for mobile keywords
      const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return hasTouch && (isSmallScreen || mobileUA);
    }

    const isMobile = isMobileDevice();

    // ============================================
    // AGENT REGISTRY
    // ============================================
    // Seeded with Claude as a safe default so the Start button works even
    // if /api/agents hasn't answered yet; replaced by the server's list.
    // Re-seeded on every device switch — each machine probes its own
    // installed agent CLIs, so the list is per-device.
    function defaultAgents() {
      return [{
        id: 'claude',
        name: 'Claude',
        command: 'claude --dangerously-skip-permissions',
        modeCycleKey: 'S-Tab',
        imageAttach: true,
        available: null
      }];
    }
    let agents = defaultAgents();
    let agentsFetched = false;

    async function fetchAgents() {
      try {
        const res = await fetch(apiUrl('/api/agents'), { cache: 'no-store' });
        const data = await res.json();
        if (Array.isArray(data.agents) && data.agents.length > 0) {
          agents = data.agents;
          agentsFetched = true;
          updateModeActionButton();
        }
      } catch (error) {
        console.error('Failed to fetch agents:', error);
      }
    }

    // Resolve an agentId from a runtime-state broadcast. Falls back to a
    // bare entry so a pane running an agent that was since removed from the
    // registry still renders sanely (named input, no mode/attach buttons).
    function getAgentById(id) {
      return agents.find(a => a.id === id)
        || { id, name: id, command: null, modeCycleKey: null, imageAttach: false };
    }

    function renderOutput() {
      const lines = getAllLines();
      const html = lines.map(line =>
        `<div class="terminal-line">${ansiToHtml(line)}</div>`
      ).join('');
      terminalContent.innerHTML = html;
    }

    function getScrollBottom() {
      return output.scrollHeight - output.scrollTop - output.clientHeight;
    }

    function handleScroll() {
      followMode = getScrollBottom() < 50;
      isUserScrolling = true;
      if (scrollIdleTimer) clearTimeout(scrollIdleTimer);
      scrollIdleTimer = setTimeout(() => {
        isUserScrolling = false;
      }, 120);
    }

    function scrollToBottom() {
      if (followMode) {
        output.scrollTop = output.scrollHeight;
      }
    }

    // ============================================
    // OUTPUT UPDATE FUNCTIONS
    // ============================================
    function trimEmptyLines(lines) {
      // Remove leading and trailing empty lines from tmux output
      let start = 0;
      let end = lines.length;
      while (start < end && lines[start].trim() === '') {
        start++;
      }
      while (end > start && lines[end - 1].trim() === '') {
        end--;
      }
      const trimmed = lines.slice(start, end);
      return trimmed.length > MAX_TERMINAL_LINES
        ? trimmed.slice(-MAX_TERMINAL_LINES)
        : trimmed;
    }

    function applyLinesUpdate(lines, mode, paneId) {
      const trimmedLines = trimEmptyLines(lines);

      // Store lines in the appropriate pane state
      const targetPaneId = paneId || activePaneId;
      if (targetPaneId && paneStates.has(targetPaneId)) {
        paneStates.get(targetPaneId).allLines = trimmedLines;
      }

      // Only update display if this is for the active pane
      if (targetPaneId === activePaneId) {
        renderOutput();
        scrollToBottom();
      }
    }

    function updatePaneRuntimeState(paneId, runtimeState = {}) {
      if (!paneId || !paneStates.has(paneId)) return;
      const state = paneStates.get(paneId);
      if ('agentId' in runtimeState) {
        state.agentId = typeof runtimeState.agentId === 'string' ? runtimeState.agentId : null;
      }
      if (typeof runtimeState.shellReady === 'boolean') {
        state.shellReady = runtimeState.shellReady;
      }
      if (typeof runtimeState.currentCommand === 'string') {
        state.currentCommand = runtimeState.currentCommand;
      }
      if (typeof runtimeState.serverRunning === 'boolean') {
        state.serverRunning = runtimeState.serverRunning;
      }
      if ('serverCommand' in runtimeState) {
        state.serverCommand = runtimeState.serverCommand || null;
      }
      if (Array.isArray(runtimeState.serverPorts)) {
        state.serverPorts = runtimeState.serverPorts.slice();
      }
      if (paneId === activePaneId) {
        updateModeActionButton();
      }
    }

    function updateModeActionButton() {
      const state = getActivePaneState();
      const agent = state?.agentId ? getAgentById(state.agentId) : null;
      const serverRunning = state?.serverRunning === true;
      const serverCommand = state?.serverCommand || '';

      modeActionBtn.disabled = false;
      modeActionBtn.classList.remove('disabled');

      if (serverRunning) {
        // Server-control mode: hide the mode-action button and the chat
        // input. Expose Stop + Restart plus a row of tappable port chips
        // so the user can jump straight to whatever the server is
        // serving — the chat input has no reliable purpose here (stdin
        // goes to the server process, not a shell).
        modeActionBtn.style.display = 'none';
        serverRestartBtn.style.display = '';
        serverStopBtn.style.display = '';
        const stopTitle = serverCommand ? `Stop: ${serverCommand}` : 'Stop Server';
        const restartTitle = serverCommand ? `Restart: ${serverCommand}` : 'Restart Server';
        serverStopBtn.title = stopTitle;
        serverStopBtn.setAttribute('aria-label', stopTitle);
        serverRestartBtn.title = restartTitle;
        serverRestartBtn.setAttribute('aria-label', restartTitle);
        inputRow.style.display = 'none';
        serverPortsRow.style.display = 'flex';
        renderServerPorts(state?.serverPorts || []);
        if (typeof updateOutputPadding === 'function') updateOutputPadding();
        return;
      }

      // Non-server state — restore the normal mode-action button and chat input.
      serverStopBtn.style.display = 'none';
      serverRestartBtn.style.display = 'none';
      serverPortsRow.style.display = 'none';
      inputRow.style.display = '';
      if (typeof updateOutputPadding === 'function') updateOutputPadding();

      // Image attachments only make sense when an agent that auto-detects
      // typed paths is accepting input — a shell prompt would just echo
      // the path and error.
      if (attachBtn) attachBtn.style.display = (agent && agent.imageAttach) ? '' : 'none';

      if (agent) {
        if (agent.modeCycleKey) {
          modeActionBtn.style.display = '';
          modeActionLabel.textContent = 'Change mode';
          modeActionBtn.title = `Switch Mode (${agent.modeCycleKey})`;
          modeActionBtn.setAttribute('aria-label', 'Change mode');
          setModeActionIcon('repeat');
        } else {
          // Agent has no mode-cycle key — nothing for the button to do.
          modeActionBtn.style.display = 'none';
        }
        messageInput.placeholder = `Message ${agent.name}...`;
      } else {
        modeActionBtn.style.display = '';
        const label = agents.length === 1 ? `Start ${agents[0].name}` : 'Start agent';
        modeActionLabel.textContent = label;
        modeActionBtn.title = label;
        modeActionBtn.setAttribute('aria-label', label);
        setModeActionIcon('play');
        messageInput.placeholder = 'Type a command...';
      }
    }

    function handleServerStop() {
      if (!isSocketUsable()) return;
      ws.send(JSON.stringify({ type: 'serverStop' }));
    }

    function handleServerRestart() {
      if (!isSocketUsable()) return;
      ws.send(JSON.stringify({ type: 'serverRestart' }));
    }

    // Render a tappable chip per detected listening port. The server probes
    // each port's protocol once (TLS handshake -> https, plaintext response
    // -> http) and ships the result with the port, so chips open with the
    // right scheme regardless of whether the relay itself is HTTP or HTTPS
    // and regardless of whether the dev server uses TLS. The hostname is the
    // active device's — a dev server detected on a remote relay is reachable
    // at that machine's hostname, not this page's origin.
    function renderServerPorts(ports) {
      serverPortsRow.classList.remove('empty');
      serverPortsRow.replaceChildren();
      if (!ports || ports.length === 0) {
        serverPortsRow.classList.add('empty');
        serverPortsRow.textContent = 'Waiting for port...';
        return;
      }
      const host = getActiveDevice().host;
      for (const entry of ports) {
        const port = typeof entry === 'number' ? entry : entry?.port;
        const protocol = (typeof entry === 'object' && entry?.protocol === 'https') ? 'https:' : 'http:';
        if (!port) continue;
        const url = `${protocol}//${host}:${port}`;
        const chip = document.createElement('a');
        chip.className = 'port-chip';
        chip.href = url;
        chip.target = '_blank';
        chip.rel = 'noopener noreferrer';
        chip.title = url;
        chip.setAttribute('aria-label', `Open ${url}`);
        const label = document.createElement('span');
        label.textContent = String(port);
        const icon = document.createElement('i');
        icon.setAttribute('data-lucide', 'external-link');
        chip.appendChild(label);
        chip.appendChild(icon);
        serverPortsRow.appendChild(chip);
      }
      if (window.lucide) lucide.createIcons();
    }

    function scheduleOutputUpdate(lines, mode, paneId) {
      // Apply immediately - virtual scrolling is efficient
      applyLinesUpdate(lines, mode, paneId);
    }

    // ============================================
    // UI FUNCTIONS
    // ============================================

    // Measure the actual monospace character advance for the terminal font.
    // Deferred until the Iosevka woff2 finishes loading — measuring with the
    // fallback font and caching that width is what caused the "width flashes
    // correct then shrinks" bug after the JBM -> Iosevka swap.
    let cachedCharWidth = 0;
    let terminalFontReady = !(document.fonts && document.fonts.ready);
    function measureCharWidth() {
      if (cachedCharWidth) return cachedCharWidth;
      const probe = document.createElement('span');
      probe.className = 'terminal-content';
      probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;padding:0;';
      probe.textContent = 'M'.repeat(100);
      document.body.appendChild(probe);
      const width = probe.getBoundingClientRect().width / 100;
      document.body.removeChild(probe);
      // Only cache once we're confident we're measuring the real terminal
      // font, not its fallback — otherwise a stale narrow width would stick.
      const measured = width > 0 ? width : 7.22;
      if (terminalFontReady) cachedCharWidth = measured;
      return measured;
    }

    function calculateColumns() {
      const padding = 32;
      const availableWidth = output.clientWidth - padding;
      const cols = Math.floor(availableWidth / measureCharWidth());
      return Math.max(40, cols);
    }

    // Explicitly request the font load. Using document.fonts.ready here
    // would resolve immediately: the terminal div is empty at script time,
    // so Iosevka hasn't been requested yet and the font set is already in
    // the "loaded" state. .load() kicks off the fetch and resolves only
    // once that specific font is available, so the first cached measurement
    // is guaranteed to use Iosevka, not the fallback.
    if (document.fonts && document.fonts.load) {
      document.fonts.load('12px "Terminal Nerd Font"').then(() => {
        terminalFontReady = true;
        cachedCharWidth = 0;
        if (typeof sendResize === 'function') sendResize();
      });
    }

    function sendResize() {
      if (!ws || !connected) return;
      const cols = calculateColumns();
      if (cols !== lastCols) {
        lastCols = cols;
        ws.send(JSON.stringify({ type: 'resize', cols: cols }));
      }
    }

    function handleResize() {
      if (resizeTimeout) clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        sendResize();
        renderOutput();
      }, 150);
    }

    function updateStatus() {
      if (!connected) {
        statusDot.classList.remove('connected');
        statusText.textContent = 'Reconnecting...';
      } else {
        statusDot.classList.add('connected');
        statusText.textContent = 'Connected';
      }
    }

    // ============================================
    // WEBSOCKET & MESSAGE HANDLING
    // ============================================
    let reconnectDelay = 500;
    const RECONNECT_MIN = 500;
    const RECONNECT_MAX = 30000;
    let reconnectTimer = null;
    let isIntentionalSocketClose = false;
    let resumeSyncTimer = null;
    let lastResumeSyncAt = 0;
    let restInitSeq = 0;

    function isSocketUsable() {
      return !!ws && ws.readyState === WebSocket.OPEN;
    }

    function hasLiveSocket() {
      return !!ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING);
    }

    function closeSocket(intentional = false) {
      if (!ws) return;
      const socket = ws;
      ws = null;
      if (intentional) isIntentionalSocketClose = true;
      socket.onopen = null;
      socket.onmessage = null;
      socket.onerror = null;
      socket.onclose = () => {
        if (intentional) {
          isIntentionalSocketClose = false;
        }
      };
      try { socket.close(); } catch {}
    }

    function syncSocketSession() {
      if (!isSocketUsable()) return;
      if (activePaneId) {
        ws.send(JSON.stringify({ type: 'switchPane', paneId: activePaneId }));
      } else {
        ws.send(JSON.stringify({ type: 'refresh' }));
      }
      sendResize();
    }

    function connect() {
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
      if (hasLiveSocket()) return;

      const socket = new WebSocket(wsUrl());
      ws = socket;

      socket.onopen = () => {
        if (ws !== socket) {
          try { socket.close(); } catch {}
          return;
        }
        connected = true;
        reconnectDelay = RECONNECT_MIN;
        lastRxTime = Date.now();
        updateStatus();
        syncSocketSession();
      };

      socket.onclose = () => {
        if (ws === socket) {
          ws = null;
        }
        if (isIntentionalSocketClose) {
          isIntentionalSocketClose = false;
          return;
        }
        connected = false;
        updateStatus();
        // Exponential backoff with cap — avoids hammering the server on outage.
        reconnectTimer = setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
      };

      socket.onerror = (error) => {
        console.error('WebSocket error:', error);
      };

      socket.onmessage = (event) => {
        if (ws !== socket) return;
        lastRxTime = Date.now();
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (err) {
          console.error('Invalid WS message:', err);
          return;
        }
        if (msg && msg.type === 'ping') return; // heartbeat only
        handleMessage(msg);
      };
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'paneList':
          // Server sent list of available panes
          handlePaneList(msg.panes);
          break;

        case 'output':
          updatePaneRuntimeState(msg.paneId, msg);
          if (msg.lines) {
            scheduleOutputUpdate(msg.lines, msg.mode, msg.paneId);
          }
          break;

        case 'paneRuntimeList':
          if (Array.isArray(msg.states)) {
            for (const state of msg.states) {
              updatePaneRuntimeState(state.paneId, state);
            }
          }
          break;

        case 'sent':
          if (!msg.success) {
            console.error('Failed to send message');
          }
          break;
      }
    }

    // Handle pane list from server
    function handlePaneList(panes) {
      allPanes = (panes || []).slice().sort((a, b) => a.windowIndex - b.windowIndex);

      // Create state for any new panes
      for (const pane of allPanes) {
        if (!paneStates.has(pane.id)) {
          paneStates.set(pane.id, new PaneState(pane.id, pane.cwd));
        } else {
          // Update cwd in case it changed
          paneStates.get(pane.id).cwd = pane.cwd;
        }
        updatePaneRuntimeState(pane.id, pane);
      }

      // Remove state for panes that no longer exist
      const currentPaneIds = new Set(allPanes.map(p => p.id));
      for (const paneId of paneStates.keys()) {
        if (!currentPaneIds.has(paneId)) {
          paneStates.delete(paneId);
        }
      }

      // Set initial active pane if not set
      if (!activePaneId && allPanes.length > 0) {
        // Try to restore from localStorage
        const savedPaneId = storage.get(STORAGE_KEYS.activePane());
        const savedPane = savedPaneId && allPanes.find(p => p.id === savedPaneId);
        if (savedPane) {
          activePaneId = savedPane.id;
          activePaneTarget = savedPane.target;
        } else {
          activePaneId = allPanes[0].id;
          activePaneTarget = allPanes[0].target;
        }
        // Restore per-pane state from localStorage
        restorePaneState(activePaneId);

        // Sync server's view of our active pane so it sends output for the
        // restored pane, not the default first pane.
        if (isSocketUsable()) {
          ws.send(JSON.stringify({ type: 'switchPane', paneId: activePaneId }));
        }
      }

      // Handle pane closure - switch to first available
      if (activePaneId && !currentPaneIds.has(activePaneId) && allPanes.length > 0) {
        switchPane(allPanes[0].id);
      }

      renderPaneTabs();
      updateModeActionButton();
    }

    // Render pane tabs
    function renderPaneTabs() {
      // Always show tabs (even with one pane, to allow adding more)
      paneTabs.classList.remove('hidden');
      output.classList.add('with-tabs');
      paneTabs.replaceChildren();

      for (const pane of allPanes) {
        const dirName = pane.cwd.split('/').pop() || pane.cwd;
        const customName = storage.get(STORAGE_KEYS.tabName(pane.id));
        const displayName = customName || dirName;
        const isActive = pane.id === activePaneId;

        const tab = document.createElement('div');
        tab.className = 'pane-tab' + (isActive ? ' active' : '');
        tab.dataset.paneId = pane.id;
        tab.dataset.paneTarget = pane.target;
        tab.dataset.dirName = dirName;

        const name = document.createElement('span');
        name.className = 'pane-tab-name';
        name.textContent = displayName;
        tab.appendChild(name);

        const paneId = pane.id;
        const paneTarget = pane.target;
        let longPressTimer = null;
        let isLongPress = false;

        const startLongPress = () => {
          isLongPress = false;
          longPressTimer = setTimeout(() => {
            isLongPress = true;
            triggerHaptic();
            tab.classList.add('long-press-feedback');
            setTimeout(() => tab.classList.remove('long-press-feedback'), 200);
            openTabActionSheet(paneId, paneTarget, dirName);
          }, 500);
        };

        const cancelLongPress = () => clearTimeout(longPressTimer);

        tab.addEventListener('touchstart', startLongPress, { passive: true });
        tab.addEventListener('touchend', () => {
          cancelLongPress();
          if (!isLongPress && paneId !== activePaneId) {
            animateButton(tab);
            switchPane(paneId);
          }
        });
        tab.addEventListener('touchmove', cancelLongPress, { passive: true });
        tab.addEventListener('touchcancel', cancelLongPress);

        tab.addEventListener('mousedown', startLongPress);
        tab.addEventListener('mouseup', () => {
          cancelLongPress();

    function triggerHaptic() {
      // Try Vibration API first (Android)
      if (navigator.vibrate) {
        navigator.vibrate(10);
        return;
      }

      // iOS 18+ workaround: create switch checkbox, toggle it, remove it
      // Based on https://github.com/tijnjh/ios-haptics
      // Note: May not work on iOS 26.x due to system haptic bugs
      try {
        const label = document.createElement('label');
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.setAttribute('switch', '');
        label.appendChild(input);
        label.style.cssText = 'position:fixed;left:-9999px;top:-9999px;pointer-events:none;';
        document.body.appendChild(label);
        input.checked = !input.checked;
        input.dispatchEvent(new Event('change', { bubbles: true }));
        document.body.removeChild(label);
      } catch (e) {
        // Silently fail - haptics are nice-to-have
      }
    }

    function showRenameMode(paneId, currentName, dirName) {
      tabActionOptions.replaceChildren();

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'tab-rename-input';
      input.id = 'tabRenameInput';
      input.value = currentName; // setting via property, no HTML parsing
      input.placeholder = dirName;
      tabActionOptions.appendChild(input);

      const actions = document.createElement('div');
      actions.className = 'tab-rename-actions';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'tab-rename-cancel';
      cancelBtn.id = 'tabRenameCancel';
      cancelBtn.textContent = 'Cancel';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'tab-rename-save';
      saveBtn.id = 'tabRenameSave';
      saveBtn.textContent = 'Save';
      actions.appendChild(cancelBtn);
      actions.appendChild(saveBtn);
      tabActionOptions.appendChild(actions);

      // Focus and select input
      input.focus();
      input.select();

      // Save handler
      const saveRename = () => {
        const newName = input.value.trim();
        if (newName && newName !== dirName) {
          storage.set(STORAGE_KEYS.tabName(paneId), newName);
        } else {
          // If empty or same as dir name, remove custom name
          storage.remove(STORAGE_KEYS.tabName(paneId));
        }
        closeTabActionSheet();
        renderPaneTabs();
      };

      saveBtn.addEventListener('click', saveRename);
      cancelBtn.addEventListener('click', closeTabActionSheet);

      // Enter to save, Escape to cancel
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveRename();
        } else if (e.key === 'Escape') {
          closeTabActionSheet();
        }
